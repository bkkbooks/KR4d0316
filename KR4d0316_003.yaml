body:
  text: 東澗集卷三宋許應龍撰批答中大夫參知政事李宗勉上表再辭免特授通奉大夫左丞相兼樞密使不允批答立政立事既資參預之司善斷善謀密效彌縫之力疇若豫采無以踰卿擢居冡揆之尊仍總洪樞之寄明廷孚號寰宇均歡謂公而無私必能開衆正而杜羣枉仁而有勇豈難撫百姓而鎮四夷已允穆於師言盍亟攄於逺略謙以自牧竟荐陳遜避之章豫欲汝為宜仰體眷知之意令行弗反卿毋固辭端明殿學士通議大夫簽書樞密院事余天錫上表再辭免除參知政事不允批答善謀善斷既密運於洪樞允武允文宜晉參於大政以昭隆委式副具瞻胡未體於至懷乃荐形於巽牘豫欲汝翼令出惟行當協恭而和衷共圖逺略庶理內而御外亟底丕平兹乃序遷毋庸多遜中奉大夫游似上表再辭免端明殿學士簽書樞密院事不允仍斷來章批答朕勵精思治立政惟人敬老尊賢既畀當軸處中之任運籌决勝尚資隨機應變之才以卿持銓衡則僉謂清通居瑣闥則屢嘗駁正至於進讀尤切納忠以若所為可當大任肆豫命汝俾贊洪樞胡守一謙至形再牘其體眷知之意亟圖康濟之勳余天錫上表再辭免除同簽書樞密院事恩命不允仍斷來章批答安邉境以立功方思長䇿任舊人而共政俾贊廟謨何明命之載頒乃固辭而未已雖欲表謙冲之意然當明緩急之宜顧今何時正圖共濟勉出乃力庶能有成毋曲狥於小亷盍亟祇於新渥其殫忠藎以副倚毗所辭宜不允仍斷來章者觀文殿大學士金紫光祿大夫醴泉觀使兼侍讀喬行簡辭免特進左丞相兼樞密使進封肅國公加食邑食實封恩命不允批答進退不失其正雖欲全名節之髙輔弼以成厥功當盡展經綸之藴比莫回於雅志姑屈侍於經帷咸欣大老之來歸傾徯真儒之復用亟揚渙號晉陟元台天日為之開明中外聞而呼舞既上下之叶應豈勳業之難為進英俊則可以彊本朝擇將帥則可以安邉境總庶職則無茍且之弊開衆正則絶僥幸之私况善斷而善謀復同心而同德從欲以治永孚于休毋固執於謙辭盍勉狥於大義所辭宜不允宰執赴經筵聽講三朝寶訓終篇奏謝宣答詞聖緒紹休求多聞而建事皇祖有訓已勸誦以終篇實自弼諧奚勞稱謝侍讀官進讀終篇奏賀謝宣答詞祖訓昭垂莫非懿範邇英進讀已遂終篇有喜啓沃之勤猶賴發揮之廣宰執率侍讀侍講說書侍立官奏賀訖宣答詞誦祖訓以徹章端自贊襄之力率儒臣而稱慶足知懇欵之忱方思洪業之遵尚冀朕心之沃文武百僚宰臣喬行簡等三上表奏請皇帝御正殿復膳聽樂宜允批答朕自御便朝倐更纍月日不遑食期咸和於萬民豫欲納言奚暇聞於六律務側身而修行將以實而應天比覽封章冀復彛典雖不惟不敢愈殫抑畏之思然至再至三重咈䖍拳之請勉循衆志深惕豫懷尚資協恭而和衷勿憚格王而正事庶䝉孚佑亟底輯寧所請宜允文武百僚宰臣喬行簡等詣文德殿三上表奏請皇帝御正殿復膳宜允批答省表具知寅畏嚴恭冀獲帝心之眷起居飲食敢從已欲之私俟咎證之寢銷復常儀而未晚然抗章以請既勤至再以至三而承天所為當不以文而以實茍務盡忠而補過必能轉妖而為祥勉循所陳益思加謹所請宜允文武百僚宰臣喬行簡等三上表奏請皇帝上夀宜允批答理內御外方圖再安而再寧勞思焦心幾至不寢而不食雖當誕節亦輟彛儀一札賜頒俾免效華封之祝三章來上猶欲同嵩嶽之呼意則彌勤理難固拒然歸美報上豈惟稱萬夀之觴而補過盡忠尤冀獻千秋之鑑資政殿學士朝奉大夫前知紹興府李鳴復上表再辭免新除參知政事恩命不允仍斷來章批答賁然來思己體眷知之意亦既見止獲聞經濟之言宜益罄於精忠以輔成於台德比因遜牘嘗諭至懷胡云就列以不能尚欲辭榮而避寵卿言雖力朕志弗移圖任舊人正欲贊萬幾之務欽豫時命當共凝庶績之熙毋狥小亷以辜衆望所辭宜不允仍斷來章文武百僚參知政事鄭性之等上表奏請皇帝御正殿不允批答省表具知翼翼小心方嚴蕆祀􅖙􅖙震電倐爾動威既垂警戒之機敢替寅恭之念側身修行下詔求賢圖所以銷弭而感格者不遑寧處避正殿減膳羞徹音樂益加貶損以示夙夜畏威之忱乃若指陳時弊啓沃朕心以輔其不逮者實惟公卿百執是賴庶形聲和而天地應以永孚于休便坐疇咨治固無壅若御正寧誠非所安所請宜不允文武百僚宰臣喬行簡等奏請皇帝御正殿復膳聽樂不允批答遇災而懼盍圖銷弭之方思德以承當盡寅恭之實悉從貶損冀補過愆尚虞民瘼之未蘇莫致天心之昭格曷遽陳於奏牘欲亟復於舊章意則彌勤義難曲狥嗟爾有衆方謀爰處以爰居其在朕躬詎可求安而求飽未暇聽聲音之奏將期致枹鼓之和其體至懷毋庸固請所請宜不允再請御正殿復膳聽樂不允批答比以鬱攸為沴怵惕興思謂經德秉哲以畏天斯盡感通之實非避殿減膳而撤樂曷昭抑損之忱雖舉彛章尚多闕政輔豫不逮賴爾交修胡未喻於至懷猶洊陳於奏牘勞來安集俟舊觀之悉還飲食起居庶常儀之可復卿言雖力朕意不移所請宜不允文武百僚宰臣喬行簡等詣文德殿拜表奏請皇帝御正殿復膳不允批答省表具知以日星而為紀每虞帝度之差非夙夜以畏威曷格皇穹之眷比太史預占於薄蝕而朕心益致於嚴恭下詔而發德音避殿而減常膳冀圖銷弭用集休祥雲滃而興倐廣垂於覆冒日中至昃竟莫見於盈虧敢云有感以必通尤賴交修其不逮曷遽陳於奏牘祈即復於彛章意則雖勤義難曲狥所請宜不允文武百僚宰臣喬行簡等詣文德殿再拜表奏請皇帝御正殿復膳不允批答省表具知朕側身修行以實應天其在燕閒尚軫不睹不聞之懼矧當變異敢懷求安求飽之心爰御便朝仍減常膳胡甫踰於半浹荐冀復於舊章雖太陽交蝕之時已因雲而弗見然上天難諶之意當靡日以不恭其體至懷母勞固請所請宜不允文武百僚宰臣喬行簡等再上表奏請皇帝上夀不允批答載震載夙式臨誕日之期是究是圖方急安邉之務將運籌而决勝猶暇食以不遑難徇彛章舉行慶禮頒十行之札已諭至懷上萬夀之觴曷形再牘雖備悉䖍拳之意然恐非宴樂之時宜略繁文共成偉績所請宜不允文武百僚宰臣喬行簡等上表奏請皇帝御正殿復膳聽樂不允批答風雨震凌既垂警戒夙夜祇懼詎敢康寧將正事建中以承天當避殿減膳而撤樂冀消咎證以召至和雖轉隂為晴幸免浸淫之患然側身修行盍堅終始之誠曽未越於數旬乃祈復於常典倘求安求飽遽欲聞六律之音是弗慮弗圖何以格兩閒之佑勉思修輔毋洊控陳文武百僚宰臣喬行簡等再上表奏請皇帝御正殿復膳聽樂不允批答仁愛人君既示譴告扶持之意恪謹天戒敢求起居飲食之安矧未致形氣之和又奚暇聲音之聽已嘗諭意曷荐抗章茍徇卿之所陳是重吾之不德小心翼翼方勤政事以飭躬百僚師師當務盡忠而補過惟交修其不逮庶有感以必通俟休證之若時復常儀而未晚毋勞固請其體至懷左丞相喬行簡再上表辭免特授少傅平章軍國重事進封益國公不允仍斷來章批答朕參稽成憲褒寵耆英晉升亞傅之尊獨冠台司之任豫欲汝翼正資經濟之逺圖復閔其勞特命平章於重事庶朕不失典刑之助而卿亦獲泮奐之休既揆義以兩全曷抗章而三遜期豫于治益殫元老之壯猷時乃之功罔俾前賢之専美參知政事李宗勉再上表辭免特授通奉大夫左丞相兼樞密使不允仍斷來章批答奮庸熙載實歸端揆之司為官擇人莫若真儒之用肆班渙號以副具瞻况邉事未寧正賴是圖而是究何需章來上猶勤至再以至三亟服厥官期豫于治不特卿有無窮之聞抑使邦其永孚于休端明殿學士朝請大夫同簽書樞密院事李宗勉再辭免依舊端明殿學士簽書樞密院恩命不允仍斷來章批答宥密之司其任至重由同而正兹實彛章渙號甫頒師言允穆比騰免牘毋乃過謙已導至懷胡猶未喻况事權之惟舊非等級之􅗥殊勿庸固辭亟祇成命所辭宜不允皇叔新除保康軍節度使希邐辭免前官恩命不允仍斷來章批答卿屬近行尊所當優禮承流授鉞蓋有舊章成命誕敷僉言惟允荐陳㢲牘足見謙冲雖慶賞固待有功然藩屏莫如同姓初非濫授宜即欽承况令出惟行義無反汗已嘗諭㫖勿庸固辭少傅保寧軍節度使判大宗正事嗣秀王師彌再辭免特授少師加食邑食實封恩命不允批答朕立愛惟親以德詔爵矧卿以宗盟之長董屬籍之司比及三年悉陶善教遂多彬彬文學之彥有如振振信厚之時載念難兄嘗膺褒渥兹有成績盍舉舊章晉陟亞師僉言惟允宜欽成命勿庸固辭所辭宜不允少傅保寧軍節度使判大宗正事嗣秀王師彌三辭免特授少師加食邑食實封恩命不允仍斷來章批答董正宗盟已更三祀率循舊典盍進一階遂揚渙號之新俾陟亞師之位朕非私豫人無間言胡為謙遜之深乃至再三之瀆雖辭榮避寵固欲全風節之髙然敬老尊賢當仰體眷懷之篤亟祇成命毋復重陳所辭宜不允仍斷來章者金紫光祿大夫喬行簡辭免觀文殿大學士醴泉觀使兼侍讀恩命不允批答卿善謀善斷同德同心老成而有典刑惓惓憂國論諫而本仁義炳炳如丹暨秉鈞衡愈宣忠力方喜獲贊襄之益與共圖康濟之功曷因變異之臨屢上退休之請莫回雅志姑佚祠庭冠書殿以通班侍邇英而進讀豈惟納誨以輔德蓋將論道以經邦謂亟欽承乃堅遜避盍念十二年之久相得益彰胡為再三瀆之煩恝然求去不獨卿有報國未遂之歎亦使朕獲用賢不終之譏其體至懷以全大節德音兩淮荆襄四川州縣被寇寬恤德音敕門下朕更化勵精視民如子固封守而康四海期臻保定之功修文德以來逺人每切綏懷之念然內治之尚缺致外患之未平荆襄既被於創殘淮蜀重遭於侵擾道路流離之衆慘不聊生室廬焚燬之餘茫無所托骨肉罹於荼毒丁壯困於轉輸常産僅存者莫供征斂之須舊業乍還者又乏耕犁之具肆夙宵之軫慮如氷炭之交懷嗟汝何辜由吾不德幸天人猶助於信順而將帥悉力於捍防雖烽燧之甫停奈瘡痍之未復肆頒渙號用慰羣情發粟以賑貧蠲租而布惠血戰之士當議優恩死事之家盍加恤典或乘時而嘯聚或失律以逋逃咸與維新同歸於治於戲各得其所既推還定勞來之恩遹觀厥成永底安靜和平之福咨爾藩宣之吏奉豫寬大之書毋事虛文俾沾實惠嘉平月朔日蝕星聚德音敕門下朕纂紹丕基躬親庶政無日不惕每思是究以是圖畏天之威安敢自暇而自逸適衆星之交聚而靈曜之復虧端由朕德之愆莫副皇穹之眷遇災而懼可無消弭之方承意以從當盡寵綏之念肆頒渙號誕告多方薄斂寬租俾沾實惠赦過宥罪咸與惟新輯寧蹂踐之區勞來流離之衆勝捷者厚加於恩賞亡殁者亟録其子孫使無愁嘆怨恨之聲用集安靜和平之福庶䝉孚估永絶艱虞於戲風翔而和氣游盍廣德澤流行之施人說而天意解佇開日星明潤之祥尚期藩屛之臣各盡布宣之職勿為文具以副朕心主者施行誥詞權禮部尚書游似升兼侍讀誥入侍經帷俱資賢德然勸講則苐分章而析句進讀則可因事以納言以次而遷蓋優兹選具官某講明正理博極羣書日就月將期廣緝熙之學朝聽夕訪每殫啓沃之忠既升常伯之尊宜進邇英之讀雖循故事益峻新班援古證今當盡責難之義引君當道庶成善治之功往服厥官以副朕意資政殿大學士葛洪特授提舉萬夀觀兼侍讀誥建道德以為師冀獲多聞之益命朝夕而納誨莫如良弼之求趨造昕庭肆頒渙渥具官某學該百氏文倡諸儒彊而義簡而亷澄不清撓不濁擢參機政屢進忠嘉自勇退於急流久養恬於真館學于古訓當圖任於舊人侍我經帷庶輔成於台德不逺伊邇盍歸乎來其體眷懷益殫啓沃翰林學士洪咨䕫除端明殿學士提舉萬夀觀兼侍讀誥翰苑辭榮爰畀祠庭之佚邇英進讀仍升祕殿之華庸示異恩肆頒成命具官某才周世用譽冠時髦激濁揚清蹇蹇厲匪躬之節間邪陳善拳拳懷憂國之忠掖垣推潤色之工銓部著清通之譽甫升瑣闥復上玉堂不進不休方圖柄任至三至再乃以疾辭盍隆禮以尊賢使清心而省事峻陟延恩之職時游廣厦之間既俾躬而處休當勿藥而有喜精加葆嗇用副朕懷起居郎曺豳除權禮部侍郎誥知無不言允謂正直端方之士德以詔爵盍居論思獻納之班爰錫明綸庸昭隆眷具官某天資和粹德宇恢洪出駕軺車每務揚清而激濁入登言路尤思補過以盡忠勸講經筵輔成台德遂擢從於柱史俾晉二於儀曹往服厥官豈但惟寅於夙夜以報其上益殫入告之謀猷茂對殊休以階顯用宗正少卿兼權禮部侍郎遊似除權禮部侍郎誥修禮明樂蓋有司存為官擇人當繇試可已著直清之譽盍申褒擢之恩具官某器局恢洪風規秀整和不流而中不倚言有物而行有常勸講經帷輔成君德儀曹兼攝尤夙夜以惟寅舊典聿新豈禮文之猶闕既能勝任何以假為爰正位於二卿俾升華於法從益修厥職用副豫知資政殿學士知紹興府李鳴復除參知政事誥理內御外將期庶政之交修選賢與能莫若舊人之圖任肆頒渙號以穆師言具官某間世真儒斯民先覺介然有守未嘗揚已以取名知無不言莫匪愛君而憂國人無異議朕所深知允為直諒之臣遂畀樞機之任彌縫藏用處置得宜遽收斂於經綸出鎮臨於屏翰報政未久胡東欲留而西欲歸有德可尊故彼無惡而此無斁宜錫趣還之命擢升參預之司爰進爵封并增圭食噫竭股肱之力本忠正以輔一人庶道德之威成安彊以清四海祇服朕命益展壯猷宗正少卿兼檢正兼權户部侍郎趙與權除户部侍郎誥司民部之權既能稱職渙昕庭之號就使為真允謂殊休式昭隆眷具官某稟資信厚律己公清登文學法理之科有俊敏疏通之識出則任侯藩之寄入而膺宰掾之司隨所設施藹然聲譽暨副地官之職尤知邦計之源遂令綽綽以有餘足見多多而益辦宜正二卿之秩仍參省闥之華茂封寵榮益思獻納林略除宗正少卿誥宗寺典司屬籍事簡職清實論思獻納之階也儻匪名儒蓋不輕授以爾聞多學廣心正氣和詞章諧韶濩之聲聞望藹圭璋之粹繇此致身於通顯曷嘗枉道以求人衆皆曰賢盍復歸於清著德以定位宜進二於司宗益懋逺猷嗣膺異渥趙以夫除直煥章閣樞密副都承㫖誥右府本兵之地事機貴密宣納之任要在得人以爾才周世用望重宗英使節州麾所至可紀郎省卿寺無施不宜况荐更宰掾之司尤善贊廟謨之運升華邃閣導㫖樞庭益究逺猶以需顯用江萬里趙發除校書誥校讎東觀漢以碩學名儒任其職唐則以為文士起家之良選肆我國家益加崇重非儒科前列黌宇名流殆不輕畀以爾萬里蜚英舍選直諒多聞以爾發得雋鼎魁安恬有守俱假塗於學省遂給札於玉堂敷陳讜言切中時病或畀校讎之職或居是正之官茂對寵榮益加韜養徐元杰除校書郎誥魁倫之英榮進素定擢升祕府猶以序遷蓋所以養其望而碩其用也以爾文諧韶濩行粹圭璋姓名獨冠於儒科器識逺參於前輩兹由是正晉典校讎豈但讀平生未見之書抑以成賢人可久之業往服厥職以俟柬求范鍾除國子祭酒誥成俗化民必由乎學傳道授業當立之師然非博習修潔之儒曷任教養作成之寄以爾稟資恬淡履行粹純列職郎闈靖共爾位談經祕殿啓沃朕心擢由冊府之中進陟儒宫之長成均以治學政精勤而誨諸生汝所素明奚勞多訓林略除太府少卿誥朕思治勵精任人共政思得吉士以重列卿以爾心地坦夷性資寬厚學問得先賢之㫖趣詞章為後進之宗師中外荐更聲稱藹著粵自祠庭之佚屢興宣室之思資爾名儒二豫外府豈但考受藏之數蓋將為進用之階尚克欽承以永終譽顔頤仲除太府少卿誥京兆素號難治非明敏長材恢恢游刃者曷勝其任克稱厥職可後褒遷以爾通練而勤寬猛相濟明於聽訟枉直立分惠以恤民絲毫無優冦攘相弭閭里相安豫嘉乃勳擢置月卿之列渙汗其號以為天府之光益著休聲嗣膺異渥陳康照除司封郎中誥貪位慕祿相率成風其來非一日矣朕勵精思治崇奬恬退置之班列將以新舊染而激末俗以爾學富詞麗棣萼交輝宰邑佐州公明亷介恥阿時好十載居閒衆正路開屈守邉郡纍召不至風節凜然晋升郎省非為爾榮式遄其行以副朕側席待賢之意起居郎丁伯桂除中書舍人誥西掖演綸既云試可中宸出綍遂畀真除以穆師言式昭隆眷具官某量吞雲夢秀挹湖山接物待人上不諂下不瀆修身端行簡而亷直而溫居烏府則務激濁以揚清立螭坳則屢直前而奏事晉兼詞掖賁飾皇猷必也正名庶示寵褒之意肆豫命汝俾登侍從之班茂對殊休以階大任袁甫除中書舍人誥渙汗其號方膺輔郡之除式遄其歸亟正掖垣之任復青氊之舊物登紫橐之穹班具官某氣節剛方風規峻整有是父有是子詞源學海之淵深難為弟難為兄卿月朗星之輝映獨掇魁倫之選荐更麾節之華秉史筆於螭坳代王言於鳳閣兼司銓綜僉謂清通暫均佚於祠庭每興思於宣室趣還表著重掌絲綸蓋疇已試之庸徑錫為真之命不但討論而潤色尚資獻納以論思益茂逺猷以階大任起居舍人吳泳除起居郎誥記動記言各分所掌在右在左以次而遷雖姑徇於彛章實寖階於大用以爾言傳伊洛秀挹岷峨伯仲並立於要津議論一循於直道典銓守法端如繩墨之誠陳視草演綸編之詩書而無愧久參法從行畀真除暫資鴻漸之儀增重螭坳之左益宏逺業庸副深知國子祭酒王與權除起居郎誥君舉必書正資直筆位定以德當用真儒以爾稟性溫恭禔身端謹踐更久矣聲譽藹然自趨覲於楓宸姑假塗於棘寺雖晉陟成均之長猶未昭簡眷之隆徑立左坳俾陪法從既不違於咫尺當益罄於忠嘉茂對殊休以稱朕意應繇除著作郎誥著庭清選也矧由小至大步武寖髙儻匪名儒曷稱厥職以爾學粹而精詞麗以則禮闈校藝卓冠羣英由璧水而登蓬山陟郎曹而直翰苑休聲綽著逺業未涯兹除特寄徑耳益加韜養以俟柬求衛洙除著作郎誥由祕郎而佐著庭蓋舊典也越次而升允為異渥以爾學粹詞麗得雋儒科䇿足周行靖共正直由棘庭而躋祕府步武寖清晉名論撰之司仍兼郎省乃顯用之階也茂對殊休益宏逺業袁甫除著作佐郎誥蘭臺東觀専司論撰非兼才學識之三長曷膺是選以爾氣剛以直識敏而明得父兄經術之淵源為學校諸儒之領袖早居冊府休譽彌隆擢置著庭師言允穆益宏逺業茂對殊休余元廙除著作佐郎誥著庭之選素號清華名公巨卿多由此而進以爾舍選蜚英謙和通練踐更中外所居見稱擢置蓬山師言允穆復提史筆仍攝郎闈步武寖髙式昭隆眷益宏逺業茂對殊休方大琮除祕書郎誥蓬萊道山儲才之地也華塗要津皆繇此而進故於擢用必選名流以爾禮闈前列久著懋庸䇿足周行安恬有守為丞外府通練而勤晉秩書林以階顯用益加涵養庸副豫知余元廙江萬里同除祕書郎誥圖書祕府天下之清選也或遷或擢罔匪名流以爾元廙心醇氣和年髙德劭迭丞寺監一意靖共既茂著於休聲宜晉登於冊府以爾萬里早升黌舍屢冠文闈校讎道山敷陳讜論欲養成於逺器姑序進於典書茂對寵榮以需柬拔衛洙除祕書郎誥圖書之府星應東壁地號西崑居其間者率以登瀛目之茍匪名流曷稱兹選以爾擢秀名家蜚聲儒級踐更滋久所居見稱䇿足周行晉丞理寺惟明克允不激不隨擢置蓬山師言允穆益宏逺業以俟柬求王野除軍器監誥毋以日月為功實試賢能為上此用人良法也以爾學問詞章世濟其美施之政事綽綽有餘晉總除戎仍兼導㫖允為異擢益展壯猷蔣峴除軍器監誥除戎器以戒不虞國家急務也雖分職以任其責而置監立長實總其凡焉茍匪通才曷稱兹選以爾學博詞麗節徑氣和校文如水鑑之明典選若權衡之審談經祕殿啓沃朕心至於器械之微亦底繕治之績善於其職就使長之毋曰序遷實階殊擢鄧若水除武學博士誥學分左右教育則均凡分職於其間必擇人而後授以爾西蜀之英質直好義比司胄學咸稱糾録之公兹置武庠俾任博通之職其新矩矱以迪生徒

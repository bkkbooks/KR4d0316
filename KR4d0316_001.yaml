body:
  text: 東澗集卷一宋許應龍撰詔科舉詔改元以順天道將圖至治之勳得賢而立邦基兹實急先之務矧是歲適逢於大比而羣才方喜於彚征爰舉彞章肆頒渙號書其德行道藝將以賔興取之族黨比閭式昭公選冀因名而得實盍崇雅以黜浮俾偕計吏而來以待昕庭之問藹藹吉士必多忠言鯁論之流巍巍成功庶及嘉祐淳熙之盛故兹詔示想宜知悉嘉平朔日蝕星聚避朝損膳廣宥多辟降詔時懋厥德斯全裁成輔相之宜謫見于天當謹寅畏嚴恭之念朕自慙涼菲適值艱虞外焉疆埸之未寧內則政事之多闕日蝕星聚既垂警戒之機夕慮朝思期盡感通之實避殿減膳正事飭躬謂有過在豫一人尚賴交修之益而推恩足保四海盍頒肆赦之書庶幾和氣之致祥自格乾文之順軌與爾有衆永孚于休其令有司檢會故實條具以聞賜簽書樞密院事兼權參知政事李鳴復生日詔榮司樞管參預政機兹當來復之初適屆誕彌之節宜頒異數以介夀祺賜參知政事李鳴復生日詔月屆仲冬實陽氣潛萌之始天生賢佐乃太平能立之基既昭弧矢之祥宜厚牽醪之禮往祇恩遇益介夀祺賜端明殿學士朝請大夫同簽書樞密院事李宗勉生日詔金風送爽玉露團清允謂佳辰實生賢佐爰錫牽醪之禮庸昭弧矢之祥往服榮恩益綏夀祉賜特進左丞相兼樞密使肅國公喬行簡生日詔季秋改朔灝氣澄空兹宇宙之佳辰生廟堂之賢佐肆頒慶賚式侑燕私往祇恩數之隆益介夀祺之永賜太傅奉國軍節度使充萬夀觀使新安郡王楊谷生日詔望重懿親位尊公傅兹屆誕彌之旦茂膺滋至之休爰錫多儀以昭隆眷賜參知政事鄭性之生日詔新陽來復愛日迎長實惟良辰是生賢佐宜頒寵數以示眷私皇叔保康軍承宣使希邐辭免特授保康軍節度使提舉萬夀觀依前皇叔進封會稽郡開國公加食邑食實封恩命不允詔立愛惟親當由近始以德詔爵庶穆師言矧卿以叔父之尊藹宗英之譽待人接物盎然如愛日之溫省事清心淡乎若深淵之靚久任承流之職可無進律之褒遂渙號于明廷俾建旄于舊鎮仍開公社庸侈徽章示隆禮以尊賢初非私豫胡辭榮而避寵毋乃過謙其體至懷亟祗成命皇弟保康軍承宣使貴謙辭免特授保康軍節度使仍奉朝請依前皇弟進封天水郡開國公加食邑食實封恩命不允詔朕繼志述事每思祖武之繩立愛惟親當篤天倫之眷矧吾介弟夙迪令猷方隆友睦之情可後褒崇之典擢從留務晉陟齋壇爰升公爵之封并衍圭畬之食由序而進非朕爾私顧出令以惟行豈循牆之可避亟祇成渙毋勞固辭所辭宜不允皇弟武康軍承宣使提舉佑神觀與芮辭免特授武康軍節度使提舉萬夀觀進封天水郡開國子加食邑食實封恩命不允詔朕立愛始于家實聖經之明訓于弟欲其貴乃大義之當然矧有彞章難稽成渙是用分洋川而作鎮肇建節旄即天水以進封併加井邑增棣華之韡韡延瓜瓞之綿綿既允穆于師言宜亟欽于明命所辭宜不允少師保寧軍節度使判大宗正事嗣秀王師彌乞解職畀祠不允詔卿屬近行尊量宏識逺久任訓齊之寄備著公勤陶成信厚之風悉遵禮法善於其職簡在朕心胡荐抗于囊封乃力求于祠廪徒得君重以為公族之表儀僉曰汝諧奚必謙詞而退避祇若豫命毋煩重陳特進鄭清之三辭免觀文殿大學士醴泉觀使兼侍讀恩命不允不得更有陳請詔懇辭政柄既曲徇于雅懷留侍經帷盍勉從于朕志已嘗諄諭何至洊陳眷言舊學之臣久勤台德之輔倐然舍去云胡不思况非勞以職事之煩苐欲廣豫見聞之益不逺伊邇初無跋履之難盍歸乎來庸副眷懷之切所辭宜不允宣奉大夫鄒應龍再辭免除資政殿學士知慶元府沿海制置使恩命不允不得再有陳請詔徒得君重暫司制閫之權勉為朕行庸壯海邦之勢胡封囊之洊奏謂陳力以不能毋乃過謙非豫所望况晉升祕殿蓋將昭體貌之隆茍曲徇雅懷何以重股肱之寄其祇承命毋復重陳所辭宜不允宣奉大夫新除禮部尚書鄒應龍辭免兼修玉牒官恩命不允詔編年以紀帝系而載其厯數及朝廷政令之因革者為玉牒以宰臣提綱而命從臣以修之蓋重其事也擢居是職必擇鴻儒以卿魁倫碩望直諒多聞晉長儀曹已著寅清之譽進讀經幄復殫啓沃之忠俾兼職于纂修胡抗章而遜避毋稽朕命往服厥官所辭宜不允宣奉大夫新除禮部尚書鄒應龍辭免兼侍讀恩命不允詔朕若稽古訓圖濟治功乃擇儒紳之英俾陪經幄之邃以卿學問淵粹議論正平懷尊主庇民之心有博古通今之識可輔成于台德宜進讀于邇英盍體至懷亟殫素藴胡執謙沖之意尚陳遜避之章所辭宜不允宣奉大夫守禮部尚書兼修玉牒官兼侍讀鄒應龍辭免除端明殿學士簽書樞密院事兼權參知政事恩命不允詔卿自掇魁倫遍更清要出藩入從四十餘年每懷靜退之心未展經綸之藴屬更大化圖任舊人進讀經筵每及三邊之備禦究心兵略見于十事之開陳宜陟樞庭仍參大政當以平時之議論亟圖今日之事功胡固執于謙沖乃力形于遜避其祇承命以副眷懷所辭宜不允端明殿學士中奉大夫新除簽書樞密院事兼權參知政事鄒應龍辭免同提舉編修經武要略恩命不允詔聖祖神宗克振炎圖之業明謨睿斷具存要略之書非賴編摩曷昭軌則然任提綱之寄實資執政之臣卿有學有文能定能應既處樞機之地宜參總領之司必撮其要舉其宏纂成巨典庶顯哉謨承哉烈啓佑後人往究乃心毋斁朕命所辭宜不允端明殿學士宣奉大夫簽書樞密院事兼權參知政事鄒應龍乞解機政不允詔方事之殷正資長䇿奉身以退難徇雅懷已曲示於勉留胡復申於前請精加葆嗇自底康強勿云陳力以不能當以體國而為念其安厥位用副豫懷所請宜不允太中大夫知樞密院事兼參知政事鄭性之端明殿學士宣奉大夫簽書樞密院事兼權參知政事鄒應龍端明殿學士朝請大夫同簽書樞密院事李宗勉以鬱攸挻災乞退歸田里不允詔祝融為沴蓋過在于朕躬近輔抗章謂咎繇于臣等力求解職將以弭災然移疾于股肱曷召和于形氣側身修行朕方懷兢業之思同寅協恭爾盍盡贊襄之力惟交修其不逮庶有感以必通兹所當為豈宜引去所請宜不允朝請大夫寶謨閣待制提舉隆興府玉隆萬夀宫吳潛辭免除户部侍郎淮東總領兼知鎮江府恩命不允詔翔而後集固欲全進退之宜用之則行毋固執謙沖之意載惟京口允謂要衝至若軍儲尤為急務疇咨已試無以踰卿盍疾其驅往服厥職胡上封囊之奏尚懷投杼之疑推善政以得民不加賦而足用使餉饋不絶而閭里相安皆卿所優為者亟圖績效以寬顧憂所辭宜不允中奉大夫權吏部尚書兼同修國史實録院同修撰兼給事中兼侍講趙彥悈辭免升兼侍讀恩命不允詔朕學于古訓日就月將期底緝熙光明之功尤賴老成典刑之助卿詩書儒雅禮樂宗英講殿談經約文申義厥旨敷暢朕甚嘉之宜進讀于邇英益輔成于台德其體至意毋庸固辭所辭宜不允朝散大夫權吏部侍郎兼直學士院兼玉牒所檢討官吳泳辭免除權刑部尚書兼職依舊恩命不允詔朕改元更化任賢使能矧惟常伯之尊盍選真儒而用卿忠勤一節直諒多聞自聨侍從之班屢罄論思之益敷為帝制雅健雄深晉二銓曹清通平允肆陟刑曹之長庸昭眷意之隆以次而遷何辭之有亟祇成命益茂逺猷所辭宜不允朝散大夫權刑部尚書兼直學士院兼玉牒所檢討官吳泳辭免升兼修玉牒官其餘兼職依舊恩命不允詔纂修瑤編屬之詞臣蓋舊典也卿學該百氏才擅三長帝籍討論已逾再祀盍升一級以示寵褒兹乃次遷何勞遜避能于前而不能於後豈有是哉毋棄爾成益勵厥職所辭宜不允朝散大夫吳泳辭免除寶章閣學士知寧國府恩命不允詔卿遍歷要塗十更歲籥敷文華而緯典司喉舌以納言久著休稱將膺顯用倐然去國畀以典藩仍升學士之班庸示邇臣之寵盍欽豫命言脂爾車胡為執於謙沖乃欲求於遜避其體至意毋煩重陳所辭宜不允寶章閣直學士中大夫知靜江軍府事兼本路經略安撫使鍾震乞許奉祠不允詔維屛維藩既膺隆委成終成始盍罄壯猷胡奏封章乃求真館徒得君重已能綏幽逺之民方圖子功宜仰體眷知之意毋勞遜避嗣有恩榮所請宜不允顯謨閣學士宣奉大夫提舉建康府崇禧觀陳晐辭免依舊顯謨閣學士除沿海制置使知慶元府恩命不允詔卿曩鎮荆襄久更歲月邊烽不聳闔境底寧肆酬爾庸擢升常伯自處祠庭之佚屢興宣室之思載惟制垣實控海道孰任維藩之寄當資已試之能爰錫明綸曷陳巽牘徒得君重庶宣牧御之勞勉為朕行用副眷知之篤令無反汗卿勿固辭所辭宜不允朝奉郎權刑部侍郎兼侍講李大同辭免除吏部侍郎兼職依舊恩命不允詔朕惟左銓最為劇任員多闕少法弊例繁茍非其人曷振厥職卿昨居言路激濁揚清晉二刑曹惟明克允疇咨典選無以踰卿其體眷知毋勞遜避所辭宜不允朝請郎試吏部侍郎兼侍講李大同辭免除權工部尚書恩命不允詔二卿而遷常伯乃彞典也矧由刑曹而至小宰將及二稔公于執法允穆師言晉陟冬卿庸示褒寵胡為抗疏尚慮曠官銓曹最號劇煩既能勝任起部苐司營繕蓋所優為其即欽承毋勞遜避中奉大夫權兵部侍郎兼同修國史實録院同修撰兼侍講范鍾辭免除兵部侍郎兼職依舊恩命不允詔亞旅司戎既能稱職昕庭渙號就使為真雖恩渥之方新而事權之惟舊盍亟承于成命胡尚抗于封囊卿不激不隨有猷有守久輔緝熙之學每殫啓沃之忠眷懷固切于豫衷遷進姑循于彞典初非超躐奚用遜辭中奉大夫試兵部侍郎兼同修國史實録院修撰兼侍講范鍾辭免除吏部侍郎兼職依舊恩命不允詔典選郎闈夙炳至公之鑒升華小宰蓋資已試之材渙號甫頒師言允穆胡力陳于奏牘謂莫任于劇曹况武部為真已髙資望今左銓進掌初匪超踰其加甄別之精益振清通之譽令行弗反卿毋固辭寶文閣學士中大夫新知福州余天錫辭免除吏部尚書兼給事中兼侍讀恩命不允詔式是南邦方資申伯興思宣室復召賈生昭豫念舊之懷畀以維新之命昔已登于八座今宜長于六卿兼司瑣闥之權入侍邇英之讀允為異渥盍即欽承胡尚執于謙沖乃力求于遜避引以自近尤賴告猷令出惟行詎容反汗亟服厥職以副豫知所辭宜不允太中大夫試吏部尚書兼給事中兼侍讀余天錫辭免除端明殿學士同簽書樞密院事恩命不允詔朕理內御外將期疆埸之安決勝運籌尤賴樞機之密欲共成于偉績當圖任于舊人卿溫乎其和定而能應輦轂夙資于彈壓朝夕尤罄于論思再陟文昌藹著清通之譽兼司瑣闥益髙直諒之風進讀邇英輔成台德各稱其職肆簡眷以彌隆暨豫同心善彌縫而藏用宜居右府密贊廟謨允穆師言盍即承于休命曷呈免牘猶未體于至懷令出惟行卿毋固避所辭宜不允端明殿學士通議大夫簽書樞密院事余天錫乞俾還里閈不允詔風雨示變天以警豫避殿求言側身修行尚賴交修其不逮庶幾有感以必通胡為抗章遽欲丏去是圖是究當助成燮理之功無伏無愆斯可致和平之福其體至意毋勞重陳所請宜不允端明殿學士通議大夫簽書樞密院事余天錫再乞俾遂山林之志不允不得再有陳請詔比覽囊封已諭朕意胡為再瀆復述前言卿既參密勿之司盍贊燮調之職豫欲汝翼何虞賢路之妨爾尚交修庶格天心之享當徇大義毋執謙詞資政殿大學士銀青光祿大夫新除沿海制置使暫兼知慶元府趙善湘再辭免依舊除四川宣撫使兼知成都府恩命不允不得再有陳請詔西土不靜重罹侵軼之虞下民其咨正切綏懷之望必真儒之復用庶外患之潛銷卿比總制垣誓平逆賊率彼淮浦合水陸以交攻殱厥渠魁致氛埃之頓息懋乃攸績簡在朕心屬兹元帥之謀無若舊人之任肆豫命汝謂宜叱馭而驅曷弗云來乃上挂冠之請矧大宗之維翰盍與國以同憂克壯其猷當亟圖于康濟能勝其任毋固執于謙沖所辭宜不允中奉大夫權禮部侍郎兼侍讀趙汝談辭免權刑部尚書兼職依舊恩命不允詔卿聞多學廣心醇氣和老成典刑藉甚宗英之譽文章爾雅敷為國典之華儀曹茂著于寅清經席每殫于啓沃雖謙以自牧荐避寵以辭榮然朕所深嘉宜尊賢而隆禮肆頒渙號晉陟文昌僉曰汝諧令行弗反亟服厥職毋煩固辭所辭宜不允端明殿學士朝奉大夫簽書樞密院事兼權參知政事李鳴復乞退歸不允詔朕惟二三執政猶吾股肱一體相資斯成至治卿頃由言路晉陟文昌曾未幾時徑司樞管正賴同心而協力庶幾強本以折衝知無不為盍憂邊而思職謙以自牧乃推賢而遜能雖卿欲全進退之宜而朕當篤始終之眷其體至意毋勞重陳所請宜不允端明殿學士朝奉大夫簽書樞密院事兼權參知政事李鳴復再乞歸田里不允不得再有陳請詔見幾而作雖欲為決去之謀事君以忠盍仰體挽留之意矧邊烽之屢警而闕政之尚多賢和于朝茍并謀而合智外禦其侮庶保大以定功所當懷報國之思胡屢上封囊之奏勉圖經濟庸副倚毗所請宜不允端明殿學士朝奉大夫李鳴復辭免除資政殿學士知紹興府恩命不允詔善謀善斷正賴倚毗何嫌何疑力求退避屢遣中使以示挽留之意復頒詔旨以昭眷遇之隆雖曲盡于真忱竟莫回于雅志晉升祕殿俾鎮帥藩勉為朕行冀使京師之蒙潤不逺伊邇庶寬宣室之興思何未體于至懷尚復形于遜牘其祗成命毋至重陳所辭宜不允資政殿學士朝奉大夫知紹興府浙東安撫使李鳴復辭免召赴行在恩命不允詔十國為連暫領藩宣之寄五月報政已聞聲譽之休潤雖及于京師思屢興于宣室人惟求舊遂頒詔以趣還令出惟行盍脂車而入覲曷陳巽牘殊拂至懷時事方殷正賴贊襄之力同心共濟庶成康乂之功式遄其歸以稱朕意所辭宜不允資政殿學士知紹興府浙東安撫使李鳴復再辭免召赴行在恩命不允不得再有陳請詔一節以趨盍仰體眷懷之篤再命而傴乃復陳遜避之章雖欲全靜退之風然莫副倚毗之意不逺伊邇特一葦之可航盍歸乎來慰羣情之傾俟令無反汗卿勿固辭所辭宜不允資政殿學士朝奉大夫知紹興軍府事充兩浙東路安撫使李鳴復辭免除參知政事恩命不允詔式遄其歸已屢頒于召節渙汗其號俾參預于政機固宜不俟駕而行胡尚抗封囊之奏謂惟堪于藩屏殊未體于眷知卿獨立無朋至剛以直每切憂國愛君之念洊陳理內御外之規實允契于豫懷肆復膺于大用善謀善斷既夙著于休稱同德同心當共圖于至治庶盡卿致主之術而成朕知人之明毋庸固辭亟祗成命所辭宜不允資政殿學士朝奉大夫知紹興軍府事充兩浙東路安撫使李鳴復再辭免除參知政事恩命不允詔翔而後集雖獨髙靜退之風惠然肯來盍仰體眷懷之切比洊頒于召節兹擢預于政機不進不休令固無于反汗則久則速禮尤貴于從宜矧一葦之可航何抗辭而至再期豫于治當亟殫翊贊之忠式遄其歸毋堅執謙沖之意所辭宜不允資政殿學士朝奉大夫李鳴復赴行在再辭免參知政事恩命不允詔側席待賢屢勤趣召振衣造闕式副具瞻宜亟理于政機胡尚陳于遜牘謙以自牧雖獨髙靜退之風豫欲汝為可不體簡知之意矧比登于宥府嘗協贊于廟謨允武允文既足任樞機之寄立政立事豈難圖康濟之勳往服厥官毋斁朕命所辭宜不允中奉大夫參知政事李鳴復辭除樞密院事兼參知政事恩命不允詔卿自參知大政益勵精忠同德同心善彌縫而藏用允文允武尤公直以無私俾晉總于樞庭與共圖為廟算仍兼丞弼協贊鈞衡豫欲汝為所合亟祗于成命謙以自牧曷求改畀于時髦兹特次遷毋庸力避其思康濟式副眷懷中大夫參知政事李鳴復辭免同提舉編修敕令恩命不允詔金科玉條置局以刪修之而實總于執政蓋舊典也况卿才全德巨學廣聞多無所不通既董修于武略著而為令豈難舉于宏綱毋執謙辭亟祗成命所辭宜不允中大夫知樞密院事兼參知政事李鳴復乞退歸不允詔敬天之怒豈以弗慮而弗圖正事以承尤賴汝為而汝翼兹值烈風之警端由已德之愆朕若歸過于股肱殆匪責躬之實卿若力辭于機政曷殫體國之忠其務贊襄以圖銷弭中大夫知樞密院事兼參知政事李鳴復再乞投間不允不得再有陳請詔卿職兼二府忠實無私輔贊彌縫共圖康乂風雨之變天以警朕夙夜祗懼與卿同之雖力行罪已之文恐未盡弭災之道至諴可感尤賴交修胡再上于需章乃欲求于間退義難曲𧾱卿勿重陳所請宜不允中大夫知樞密院事兼參知政事李鳴復再乞去不允詔宥密基命實資樞管之籌精神折衝漸息邊庭之警勉出乃力亟圖爾庸曷懷避寵之思荐上丐間之請奉身而退雖欲全名節之髙與人同憂所當任安危之寄其體至意毋勞重陳太中大夫參知政事兼同知樞密院事鄭性之辭免除知樞密院事兼參知政事恩命不允詔朕立號改元勵精更始既得人以共政盍隆禮以尊賢卿直諒一心周旋兩地外不動于聲色中默運于籌謀同寅協恭憂邊思職豫嘉乃德宜晉陟于元樞惟爾之能仍復參于大政綸音甫播輿論交孚宜體眷懷益殫經濟胡執謙沖之意乃陳遜避之章亟祗厥官毋替朕命所辭宜不允太中大夫參知政事兼同知樞密院事鄭性之再乞放歸田里不允不得再有陳請詔朕以實應天側身修行尚虛揆席以待耆英翊贊萬幾惟資執政同心體國方副豫懷胡為抗章幡然求去挽留甚力宜即欽承何嫌何疑至陳再牘況今邊陲未靖民瘼未蘇欲庶事之康哉豈一夔之足矣其思夾輔毋庸固辭所請宜不允太中大夫知樞密院事兼參知政事鄭性之再乞俾歸田里不允不得再有陳請詔朕兢業萬幾簡求四輔冀同心而體國庶強本以折衝卿名重魁倫材髙經濟諫垣抗疏首排喜功好大之謀右府運籌莫非和衆安民之計朕所深倚人無間言胡再騰遜避之章猶未體眷留之意期豫于治盍殫輔翼之忠無棄爾成庶底敉寧之績勉徇大義毋庸固辭所請宜不允太中大夫鄭性之除職與郡辭免不允詔卿迭更兩地已閲四期每思職以憂邊務同心而輔政胡為避寵乃力丐間勉𧾱雅懷畀以藩宣之寄仍升華職昭豫簡眷之隆毋庸固辭亟祗成命所辭宜不允太中大夫鄭性之辭免除資政殿大學士知紹興府浙東安撫使恩命不允詔卿荐上囊封力辭樞管念久任股肱之寄固宜加體貌之隆爰錫明綸晉升祕殿不逺伊邇莫若會稽以寵其行俾分帥閫豈但京師之蒙潤庶寬宣室之興思宜疾其驅往服厥職以副朕意毋庸固辭所辭宜不允資政殿學士魏了翁再辭免依舊資政殿學士知福州福建安撫使恩命不允不得再有陳請詔我圖爾居信莫如于南土徒得君重諒無薄于淮陽謂即欽承豈宜引避已嘗諄諭奚復重陳矧惟三山易治之邦苐煩卧護當戒十乘啓行之日毋以疾辭往服厥官以稱朕意所辭宜不允資政殿學士魏了翁再辭免依舊資政殿學士知紹興府浙東安撫使恩命不允不得再有陳請詔式遄其歸屢興思于宣室引以自近俾分治于東郊庶幾善政之得民抑使京師之蒙福盍欽成命言脂爾車胡尚執于謙沖至洊求于退避徒得君重以為屏翰之光勉為朕行亟任保釐之寄庸副輿望毋煩固辭所辭宜不允

body:
  text: 東澗集巻四宋許應龍撰制權刑部尚書兼權吏部尚書李鳴復除端明殿學士簽書樞宻院事制精神折千里之衝方恢逺略文武為萬邦之憲允賴真儒擢諸喉舌之官付以樞機之寄肆頒渙號式副具瞻具官某識敏才髙氣和節勁備光大含洪之徳休焉有容無黨偏好惡之私粹然出正晉登憲府大振朝綱典銓如止水之平論事有回天之力善於其職既允穆於師言庸嘉乃勲遂擢居於右府升華秘殿増錫爰田噫輔予一人既善謀而善斷式是百辟當同徳以同心益展壯猷輔成至治吏部尚書兼給事中兼侍讀余天錫除端明殿學士同簽書樞宻院事制朕治欲更新人惟求舊尚書納言喉舌雖有賴於論思執政猶吾股肱盍益隆於委寄肆升右府式渙明綸具官某望重羣公才周萬務好賢樂善休焉其如有容遇主遭時進而不失其正自登儒級晉陟周行毋日月以為功徧歴清華之選上星辰而聽履更宣彈壓之威既夙著於休聲屢興思於宣室况有附翼攀鱗之舊宜膺任人共政之圖遂寄徑於天官旋升班於樞筦併躋端殿申衍圭畬吁是究是圖方欲理内而御外汝為汝翼當思强本以折衝庻寛宵旰之憂亟底敉寕之績欽承予命時乃之休金紫光禄大夫右丞相兼樞宻使喬行簡特授觀文殿大學士醴泉觀使兼侍讀制門下寅亮天地實司洪化之權爕理隂陽允謂經邦之道既勤輔翼必遂感通何引咎以自陳屢抗章而丐去爰頒異數曲徇髙懐具官某節挺後凋道推先覺介然有守中不倚和不流公而忘私徳可尊事可法乆任獻納論思之職晉登凝承輔弼之司知無不言每務防㣲而杜漸引之當道未嘗揚已以取名迨晉長於秉樞益憂邊而思職爰立作相暨予同心進思盡忠文武為萬邦之憲定而能慮精神折千里之衝屬届明禋倐聞震電兹髙穹之示戒念精意而欽承乃荐上於嚢封遽力求於䇿免側身修行朕方懐寅畏之思當軸處中爾盍圖銷弭之實胡為勇退莫遂挽留作朕股肱既乆著勤勞之績全其體貎盍愈加恩渥之隆秘殿升華真祠均佚俾輔成於台徳仍進讀於經帷茂對殊休以光晚節於戲予欲汝為汝翼當仰體於深知爾有嘉謀嘉猷尚毋忘於忠告以永終譽益懋逺圖特進左丞相兼樞宻使鄭清之特授觀文殿大學士醴泉觀使兼侍讀制門下王者承意而從事每懐寅畏之思宰相理物以代天實任爕調之寄欲潜銷於變異當共致以嚴恭胡辭政柄之司屢上嚢封之奏勉從雅志爰錫湛恩具官某心正氣和量宏識逺卓爾負廟堂之器瀟然如山澤之癯舊學於甘盤已致緝熙光明之益選衆舉伊尹晉登凝承輔弼之尊屬當更化之初首任秉鈞之重収召耆哲拔去凶邪以亷律貪一洗舊汙之染量能授職咸欣公道之開雖振厲以更新每彌縫而藏用入而陳善為格君心之非出以告人曰惟我后之徳期予于治時乃之休何積潦之甫停至明禋而復作曄曄震電昭垂警戒之機翼翼小心敢替側修之謹將欲致和於枹鼓曷嘗移咎於股肱乃荐騰引去之章竟莫遂挽留之意肆升華於秘殿仍進讀於經帷全其素節之髙假以真祠之佚於戲學於古訓尚資良弼之交修克享天心罔俾前賢之専美以永終譽茂對殊休知福州余天錫除吏部尚書兼給事中兼侍讀制銓綜人材凡屬天官之掌維持政本實歸𤨏闥之司矧進讀於經筵尤輔成於君徳獨兼兹選允謂殊榮具官某學粹而才通量洪而識敏自登儒級亟躋朝路之華不出都門峻陟文昌之位念久安於閑館俾出鎮於全閩然道阻且長莫便庭闈之奉而人惟求舊趣歸禁近之班冠常伯而専封駮之權侍書帷而輔緝熙之學既清且要其任匪輕往服厥官當體眷懐之篤以報其上盍殫獻納之忠時乃之休以永終譽同簽書樞宻院余天錫除簽書樞宻院事制折千里之衝已賴樞機之宻加一級之賜式彰簡眷之隆渙號誕敷師言允穆具官某氣和識敏學邃行醇以仁存心每務愛人而利物有猷告后曷嘗揚已以取名徧歴清華晉司宥宻憂邉思職並處置以得宜同寅協恭善彌縫而藏用人無異議朕所深嘉肆陞右府之班叶賛廟謨之運進封公爵申錫爰田雖率舊章實昭新渥噫竭股肱之力加忠貞以輔一人庻道徳之威成安强以清四海祇若朕命益展壯猷司農寺官髙定子除司農卿兼玉牒官兼樞宻都承㫖制積貯天下之大命也𨽻於大農而卿實總之茍匪通才曷稱厥職以爾學粹詞宏氣和心正施於政事所至有聲江左將輸公勤辦治戎監外府之擢未酬爾勞九扈正卿肆以命汝纂修瑶牒俾賛樞庭疊畀榮恩以階顯用益宏逺業庸副深知簽書樞宻院事李宗勉除參知政事制强本折衝已賴樞機之宻任人共政尤資丞弼之良爰命真儒肆頒渙號具官某才髙識逺外寛内明正色立朝蹇蹇厲匪躬之節愛君憂國惓惓懐納善之忠允謂藎臣晉登右府隨機應變克壯其猷協恭和衷同底於道肆擢躋於參預俾盡展於經綸式循邦典之彞載陟文階之峻復増多邑申衍圭畬噫道徳之威成安强予欲茂中興之業股肱之寄在忠力爾其殫叶賛之勤時乃之休以永終譽林光謙除樞宻院編修官依舊督府主管機宜文字制外著勞能内升職任所以為趨事赴功之勸也以爾通變之才隨試輙效丞戎監而佐督幕游刃恢恢經理兵儲不勞而辦宜進編摩之職以旌爾能益究乃心嗣有殊擢髙奎除樞宻院檢詳諸房文字制本兵之寄其責甚重協賛謀畫尤貴得人以爾有文有學知㣲知彰比任編摩繼登宰掾廟堂宻務盖知之詳講之熟矣與其出秉於麾節孰若入佐於籌帷其展壯猷以階顯用韓大倫除中書門下省檢正諸房文字制朕為官擇人必先歴試善於其職遂使為真以爾公而無私勤而且敏剸煩治劇綽綽有餘昔兼省闥之司宻賛廟謨之運既能勝任何以假為爰正厥官以昭予眷仍總提於國用俾展布於才猷勉續前功嗣膺殊擢禮部尚書游似除吏部尚書制八座班聨雖俱髙於法從六卿職掌尤莫重於銓曹疇咨已試之長爰錫維新之命具官某性資和粹學術邃深久徧歴於清華每自安於靖退侍邇英之讀納誨輔台任宗伯之司修禮明樂比典省闈之舉咸推藻鑑之公載念冡卿實總文部既能選士以考實豈難為官而擇人况嘗攝承僉謂簡要肆予命汝式資甄别之精惟時懋哉庸試陶鈞之業以永終譽嗣對殊休兵部侍郎兼權吏部尚書趙彦悈除權吏部尚書制惟爾之能宜任銓曹之寄試可乃已遂申渙號之頒允穆師言式昭隆眷具官某被服儒術標的宗盟老成而有典刑可尊可法靖共而好正直不倚不流勸講經帷升華武部屬闕天官之長式資氷鑑之明僉謂清通宜用委任爰正文昌之秩仍兼𤨏闥之司往既乃心以稱朕意户部侍郎兼權兵部尚書兼知臨安府趙與權權戸部尚書制八座班聨實髙於法從六卿職掌莫劇於民曹疇咨已試之長爰錫維新之命具官某被服儒術標的宗英剛而義簡而㢘來能名至能應自陟地官之貳兼司天府之雄扶弱抑强里閭安業散財發廩穉耋懐恩撫軍如挾纊之温禱雨則隨車而至雖攝大司馬之職未酬京兆尹之勞肆頒綸恩擢冠民部豈特究財賦之本末尤有資朝夕之論思爾所優為奚勞多訓權户部尚書趙與權除户部尚書制京師衆大之區既騰偉績民部劇煩之任尤賴長才爰畀真除式昭隆委具官某至剛而直大雅不羣毋日月以為功亟躋華貫上星辰而聽履兼領神臯善政得民休聲載路宜正文昌之位以旌治行之優載念版曹實司國用善於其職已洞究於源流圖惟厥終庻永臻於豐裕益觀來效嗣有殊榮宣奉大夫鄒應龍除禮部尚書制不見賈誼乆勤宣室之思僉曰伯夷宜錫秩宗之命肆頒召節趣使造朝具官某器度恢宏風規峻整奥學探聖賢之藴魁名滿宇宙之間入則徧歴於清華出則荐臨於藩屏屬予踐阼之始畀以納言之司胡厭直於承明乃久安於真館雖辭榮避寵固欲全素節之髙然思治勵精詎可後舊人之任遂頒渙渥復位文昌其殫日月獻納之忠益振夙夜寅清之譽以階大任式副具瞻權工部尚書李鳴復除權刑部尚書制為官擇人方畀共工之任明刑弼教復新寵命之頒雖均號於文昌實晉升於華武具官某風規凝重器局恢宏即之也温備四時之和氣撓之不濁凜萬壑之層氷自陟憲臺力扶公道去其太甚每思激濁以揚清知無弗言未嘗矯枉而過正特授納言之職已為不次之除兹長刑曹益昭隆眷庻獄庻慎式資明允之才嘉謀嘉猷尤賴論思之益期予于治時乃之休權禮部侍郎趙汝談除權刑部尚書制明刑弼教期臻帝治之隆帥屬佐王允賴秋官之長疇咨輿論無易耆英具官某標的宗盟被服儒術入則代言於鰲禁出則奏最於熊轓典禮而作秩宗藹著直清之譽納誨而輔台徳每殫啟沃之忠爰新渙號之頒晉陟文昌之峻庻獄庻慎豈惟資明允之才嘉謀嘉猷當愈罄論思之益往服厥職以副予知起居郎兼權吏部侍郎王極特除吏部侍郎制載惟選部莫劇右銓文法舞於吏胥奸欺迭出簿書盈於几閣考察尤艱式資已試之長爰錫維新之命具官某量涵溟渤秀挹岷峨每湛若以無營尤介然而有守峩冠烏府不吐剛而茹柔秉筆螭蚴善記言而書動比兼銓綜僉謂清通何以假為盍示褒遷之寵肆予命汝益加甄别之精茂對殊休以階大用兵部侍郎范鍾除吏部侍郎制掌六典之貳而逆邦治其事實繁以三銓之法而官人材非賢曷任具官某學臻道閫譽冠時髦省事清心澹乎若深淵之靚修身端行渾然如璞玉之純粤從朝路之登以至甘泉之從藹然碩望簡在朕心既振職于兵曹宜持衡於文部况昔居郎省已荐宣銓綜之勞今晉陟貳卿當益振清通之譽勿云序進嗣有恩榮試中書舍人袁甫權吏部侍郎制西掖代言方睹舍人之様右銓典選亟躋小宰之班盖疇已試之長爰錫維新之命具官某氣全剛大望重魁倫言則成文得易直簡嚴之體施於有政馳公勤精敏之聲既左右之俱宜盍清華之徧歴敷文緯國已資潤色以討論量能授官尤賴清通而平允肆予命汝欽乃攸司庻因衡鑑之公以卜甄陶之業起居郎兼權吏部侍郎吳泳特除吏部侍郎制持衡銓部藹著休聲出綍昕庭真陞小宰雖事權之仍舊而渙渥之維新具官某識逺而才髙氣和而節勁難兄難弟相輝臺省之間有徳有言傑出搢紳之表惟所學之既正顧何施而不宜君舉必書咸稱直筆予言其代賁飾皇猷至兼銓綜之司藉甚清通之譽既云試可何以旌能秩爰正於貳卿班益髙於法從善於其職繇裁鑑之精明推其所為乃陶甄之事業益殫所藴庸副予知權兵部侍郎范鍾除兵部侍郎制掌九伐之法已著休聲頒一札之書俾膺真命式昭隆眷以穆師言具官某温乎其和介然有守徧歴清華之選晉升侍從之班勸講邇英每務輔台而納誨司戎亞旅益思立武以足兵比典禮闈克精藻鑑爰正貳卿之秩載新渙號之揚以序而升姑徇彞章之舊度徳而定嗣膺異渥之榮往服厥官以稱朕意淮東總領兼知鎮江府吳淵除權兵部侍郎制克壯其猷已底要衝之固渙汗其號晉升法從之班以穆師言式昭隆眷具官某材髙通變謀極機深至能應來能名直而温强而毅入賛樞機之宻出宣藩翰之勞積倉裹糧贍給貔貅之衆蠲租减賦綏安鴻雁之民遂令鐵甕之區益鞏金城之勢厥有成績盍錫徽章趣覲楓宸俾貳兵曹之任聨榮棣萼益増朝列之輝殫而獻納之忠賛我修攘之政善於其職時乃之休侍御史李大同除權刑部侍郎制正色立朝獨厲方剛之操以徳詔爵盍居侍從之班爰錫徽章式昭隆眷具官某道推先覺節挺後凋晉秩諫垣每務閑邪而陳善輔成君徳未嘗揚已以取名典容臺而惟寅惟清秉直筆而記言記動欲大明於國是復擢寘於臺端乃以親嫌力求遜避載念刑曹之貳實持邦憲之平儻非端介以無私寕免重輕之失當肆予命汝式資明允之才進思盡忠更賴謀猷之告益宏逺業茂對殊休太府卿兼知臨安府史巖之除權刑部侍郎制選禮樂詩書之帥俾鎮神臯陞論思獻納之班式昭異渥藩宣増賁委寄彌隆具官某心醇而氣和才髙而識敏有是父有是子俱陟從臣難為兄難為弟並分戎閫然念京師之地實關風俗之樞惟爾之能足勝其任雖正陟月卿之位未足重天府之權爰錫明綸晉貳憲部其體朕心之眷亟圖治效之優益懋逺猷以階大任殿中侍御史李韶除權工部侍郎制立朝正色既馳謇諤之聲任官推賢盍畀論思之職肆頒渙渥庸示隆知具官某公而忘私定而能應雖躋榮路每懐勇退之心既陟諫垣復厲敢言之氣旋登憲府益振朝綱然於激揚清濁之間初蔑好惡黨偏之意人無異議朕所深嘉疇若予工俾董繕修之政入告於内盍殫剴切之忠茂對殊休以階大任殿中侍御史李宗勉除工部侍郎兼給事中制進思盡忠允謂正直端方之士徳以詔爵盍居言語侍從之班爰錫徽章庸昭隆眷具官某英姿玉立直節氷清見善明而用心剛介然有守行已恭而事上敬知無不言每於激揚清濁之間初蔑好惡黨偏之意人無異議朕所深知俾晉貳於起曹仍升華於瑣闥資爾正色敢言之氣振兹批敕還詔之風益展大猷以階大用右文殿修撰吳潛除權兵部侍郎兼檢正制甘泉侍從之班必資重望省闥經綸之任尤賴通材儻匪其人曷兼兹職具官某學該流略名擅魁倫素節剛方有是父有是子紫荷輝映難為弟難為兄入則増重於朝廷出則馳聲於麾節非榮進素定曷膺大任之隆况才徳俱髙詎可久勞於外擢陞武庫仍冠都司其殫論思獻納之忠以基輔賛彌縫之業祗服休命永肩一心蔡節除司農卿兼檢正制倉廩委積悉賴大農雖設屬立貳以任其責而為之長者其職尤髙雖以次遷實階顯用以爾䟽通無壅亷靜寡求出典輔藩入登朝列郎闈寺監無施不宜省闥彌綸奉公守正力求外補勉徇雅懐然思多事之時正賴長才之用復還舊職進陟正卿益究乃心以稱朕意王伯大除吏部郎中制銓選之任其平如衡不容一毫之輕重也非公爾忘私曷稱厥職以爾安恬有守詳練而明荐典侯藩㢘勤不擾肅將使指風采聳聞擢寘銓曹師言允穆其以激濁揚清之志施之量材授職之間肆觀爾能嗣有褒寵李劉陞禮部郎中制郎官上應列宿其任匪輕由同而正必以資歴示不容以驟得也以爾學富淵源文諧韶濩演綸西掖嚮用方隆正陞儀曹姑循常典賢能不待次而舉當毋以日月為功也其祇成命即沐殊榮李劉除禮部郎官制儀曹之選事簡職清西掖北門皆繇此而進以爾髙才天賦奥學海涵作為詞章備雅健渾深之體迭更麾節藹寛和正直之稱僉謂真儒盍還清著載念南宫牋奏之職實資東里潤色之工惟爾之能足勝其任往祇成命以副朕知韓大倫除金部貟外郎制國家財賦分𨽻四總而歸於版曹者二十餘郡百爾所需皆仰於此茍匪通才曷勝其任以爾勲臣之孫瀟然儒素㢘勤通敏所居見稱比司餉臺究心措畫不加賦而用足朕甚嘉之擢寘兹職誰曰不宜肆觀爾能尚有殊擢劉煒叔除倉部貟外郎制廼積廼倉以供廩稍而給餽餉盖國家急務也總其凡而治其要則屬之郎曹焉非得通才曷勝其任以爾毓徳名門棣華争秀踐更滋久所至見稱作屏廬陵公清慈惠政平訟理吏戢民安兹予畀汝以倉曹之寄必能振舉厥職以副予知往究乃心嗣有褒擢趙綝除都官郎官制都官雖𨽻刑曹其事最簡然於除授必選真才以爾毓秀相門䇿勲儒級外庸綽著晉陟周行棘寺容臺各稱其職擢陞郎省庸示褒嘉往服厥官以需異擢趙與權除刑部郎官制法者一成而不易情者日出而無窮以有限之法馭無窮之情非惟明克允之才豈能無輕重出入之差乎以爾登名桂籍得雋金科曩典刑曹明清詳審暨守輔郡察獄得情吏戢民懐政聲洋溢奪情予節毅然控辭禮制既終亟加召擢明刑之職乃爾所已試者往究乃心即膺顯用郭正已除刑部郎官制朕於郎選每不輕畀矧刑曹所司尤關民命其於授任可不因能以爾得雋金科精於法理踐更棘寺閲嵗滋多用法端平下無寃抑擢丞宗正晉陟郎闈式資明允之才俾任平反之寄往祇厥職廣朕好生曽天麟除都官郎官制朕自更化以来作新吏治宰邑守藩以最聞者悉皆選用矧持節近甸藹然聲稱褒揚可後以爾難兄難弟中外交輝䇿足周行靖共有恪司庾東浙惠利及民擢寘郎闈以階顯用往脩厥職庸副予知王㑹龍除工部郎官制起部司營繕之事比諸曹為清簡擢居是職庸示優賢實為大任之基兹豈久淹之地以爾文追灝噩望重倫魁䇿足清班靖共正直部符輔郡慈惠公勤既内外以俱宜况榮進之素定甫任著庭之職即陞郎省之華茂對寵榮以需柬㧞趙以夫除左曹郎官趙翀除右曹郎官制朕勵精思治量能授官凡郎選俱欲得人矧版曹尤為劇任擢居是職必考僉言以爾以夫報政臨漳民安惠養持節江右吏服㢘明兹予付汝以左曹之任必能理訟牒而稽邦賦以爾翀曩處都司䟽通精練今撫凋郡豈弟公勤兹予命汝以右曹之職必能權斂散而均力役用既乃心往佐而長史巖之除左司郎中制二十四曹惟侍左為煩劇員多闕少法弊吏謾茍匪清通未易銓綜以爾克傳家學早擢儒科難弟難兄俱蜚聲於中外善政善教屢奏最於藩宣擢寘銓曹必能奉公守正以革姦欺往究乃心嗣有褒擢王㑹龍除右司郎中制都司分治六曹事無巨細畢陳於前若網在綱提之則舉欲稱厥職必惟其人以爾早掇鰲頭荐登鴛列已乆更於嵗籥猶未越於郎闈雖器識不凡能自安於静退然榮進素定難久欝於才猷遂自銓曹亟陞宰掾暫假彌綸之手佇躋清切之班往究乃心以稱朕意王􅣫除右司郎中制銓綜之任號為劇曹法例繁滋吏胥出入茍匪通敏曷使公平以爾心醇氣和量宏節勁踐更滋乆晉典名藩節用愛人正身帥下藹然治最盍畀峻除棘寺為丞未究所藴亟陞兹職益觀爾能往究乃心以稱朕意陳康照除左司郎中制二十四曹而尚左居其首自京秩以上悉歸銓綜欲稱厥職必惟其人以爾宏博名門淵源碩學惟弸中而彪外故下筆以成章施諸承流宣化之間莫匪利物愛人之念肆頒召節擢寘郎闈胡屢抗於封章未欽承於渙渥今予命汝庸立懦以亷頑惠然肯来必奉公而守正當令銓法端若衡平益振爾之家聲以待予之器使葉莫除右司郎中制郎官上應列宿非持節把麾之有聲望者不畀也矧兼二職俱著休聲為官擇人所宜召用以爾㢘明不擾公恕無私報政三期民安盜弭觀風一道訟簡刑清以若所為允謂儒者之政選諸所表俾膺郎吏之除往服厥官以稱朕意趙必愿除左司郎中制朕於用人必以序進將久其任而究所長也以爾公族之英精通詳練被服儒術克紹祖風荐典名藩所至可紀彌綸省闥守正無私輿論稱之盍膺異擢由右而左姑借長才益究乃心以需簡㧞趙以夫除左曹郎官兼左司制版曹都司俱號煩劇非資已試曷稱厥官以爾稟資信厚遇事精明中外踐更何施不可京畿將漕方著休聲省部需賢無以易汝復畀郎闈之選仍升宰掾之司剖决彌綸各振其職皆汝所優為者益圖来效以副予知趙必愿除度支郎官兼權右司制不典州不為郎此祖宗良法也矧屢著郡最可後褒遷以爾家傳相業望重宗英不激不隨能定能應荐司藩屏俱號循良晉陟版曹仍兼宰掾益盡彌綸之職豈惟計度之精往究乃心以需異擢王瓉除考功郎中兼檢詳制考績之職寸量銖較其事夥繁非䟽通精審曷勝其任以爾賢關之英材識兼茂以儒術而飾吏推善教而得民固已見於設施而兵事詳練尤為可稱擢寘郎闈仍兼樞屬其委寄盖不輕矣益攄所藴以副予知監察御史錢相除右正言制出入禁闥補闕拾遺必得正人始稱厥職以爾至剛以直特立無朋雖才徳之俱髙每韜藏而不耀擢居憲府克振臺綱然於激揚清濁之間初蔑好惡黨偏之意人無異議朕所深知進陞諫省之華冀獲忠言之益引以當道時乃之休樞宻院編修官陳瑢除監察御史制唐得李勉朝廷始尊盖御史紀綱之府得人以振其職則一臺正而天下治矣以爾學有本源行無瑕玷上不謟下不凟事可法徳可尊樞屬郎曹靖共正直人皆以言路期之成命一頒善類胥懌開誠心而布公道進君子而退小人使國論一定以成更化善治之功盖爾所優為者尚克欽承以永終譽駕部郎官王極除監察御史制勿用憸人其惟吉士此朕勵精更化之本意也然人實難知易至雜揉必賴正色敢言之彦庻㡬揚清激濁之公以爾徳宇粹夷風規秀整施之政事已騰公勤明敏之稱其在朝廷益厲正直端方之操擢居憲府誰不謂宜然今日之患莫大於君子方盛而潛消小人雖衰而暗長爾其彰善癉惡杜漸防㣲則天下可以常為泰而不為否矣往振厥職以副朕知左司諫林略除殿中侍御史制朕勵精思治為官擇人矧惟憲府之雄尤重副端之任欲稱厥職必惟其賢以爾望重儒宗文追古作徧歴清華之選晉居諫諍之司知無不言惟務閑邪而陳善引之當道未嘗揚已以取名允謂正人擢陞執法其維持於國是庸振起於朝綱式副予知以永終譽左司諫李宗勉除殿中侍御史制言事仗下雖資直節之忠執法殿中孰任副端之寄疇咨已試僉曰汝宜以爾不倚不流能定能應心無私主惟思激濁以揚清言必可行未嘗矯枉而過正放黜者有愧心而無怨更革者雖害已而謂然既允穆於師言宜久居於憲府渙發其號晉陞供奉之班往服厥官益振糾繩之職勿云序進嗣有褒遷左正言李韶除殿中侍御史制進思盡忠方賴格心之益渙汗其號晉陞執法之除庸示眷懐一新風采以爾靖共正直肅括宏深知無不言每務揚清而激濁引之當道未嘗炫已以取名允謂作者之七人奚愧先朝之四諫肆頒異渥進陟副端其以閑邪陳善之規施之正色敢言之地益振綱紀以尊朝廷殿中侍御史林略除侍御史制朕惟憲府俱職抨彈臺端尤為雄劇非賢不任必望實之素孚以次而升庻紀綱之愈振以爾身端行治學廣聞多即之也温備四時之和氣撓之不濁凜萬壑之層氷雖内外之荐更每安恬而無競經帷勸講申義約文諫省進言閑邪陳善迨殿中之執法公天下以為心糾正官邪主張善類宜躋登於横榻示旌表於藎臣益思風采之揚庸副眷懐之篤以永終譽嗣對殊休殿中侍御史蔣峴除侍御史制朕躬親政事總攬權綱其於風憲之官必擇端方之士既能執法可後䟽恩以爾學問精深詞章遒勁每因秘殿談經之頃屢聞嘉謀告后之忠肆擢寘於副端俾力扶於公道介然有守寕肯吐剛而茹柔知無不言惟欲揚清而激濁晉登横榻庸表正臣其殫報稱之思益振糾繩之職勿云序進嗣有殊榮監察御史劉伯正除左司諫制朕改過不吝從善如流載惟諫垣實司言責必得端方之士庻聞蹇諤之忠以爾學問精深風規凝重靖共爾位事可法徳可尊糾察憲臺剛不吐柔不茹擢陞騎省冀納鯁言激濁揚清既足致朝綱之肅閑邪陳善必能格君心之非往服厥官以永終譽吏部侍郎洪咨夔除給事中制朕董正治官綱維政本念𤨏闥邃嚴之地素號清華𨽻銀臺通進之司實專封駮欲稱厥職每難其人故自比年以来率以他官兼領兹得碩望盍畀真除具官某學廣聞多身端行治剛不吐柔不茹彊而義簡而㢘屬當勵精更化之初首任正色敢言之責紀綱大振賢否洞分為官擇人藉甚清通之譽敷文緯國燦然黼黻之華比兼掌於黄扉屢封還於紫詔䟽恩元日正位夕郎仍躋進讀之班庸示殊常之眷以階大用益展壯猷權吏部侍郎丁伯桂除給事中制典選右銓方著清通之譽升華左省復専封駮之司允穆師言以昭隆眷具官某中而不倚休焉有容居烏臺則激濁以揚清立螭坳則直前而奏事敷文緯國燦然黼黻之華量能授官允若權衡之審載惟青瑣尤賴鴻儒正色立朝既夙髙於勁節批勅還詔必無愧於前修益罄精忠以需大用吳昌裔除大理少卿制廷尉天下之平也茍匪其人豈能無輕重出入之差乎特屈正臣典司邦禁以廣朕好生之徳以爾直諒多聞安恬有守蹇蹇厲匪躬之節惓惓懐憂國之忠綽著休聲遂膺親擢務揚清而激濁不吐剛而茹柔正色立朝既有言而必盡明刑弼教諒執法以無私擢諸栢府之中畀以棘卿之任欽予成命往服厥官

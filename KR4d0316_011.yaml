body:
  text: 東澗集卷十一宋許應龍撰啓賀丞相除太傅啓渙奉制函晉躋帝傅夀登七帙實人間希有之齡位列三公示聖上殊常之眷福祿俱備中外均歡恭惟太傅樞使丞相國公社稷宗臣股肱重寄輔贊已逾於二紀忠勤靡替於一心方事變之沓來悉皆異議及廟謨之密運迄奏膚功內焉庶政之惟和外則侵疆之復舊天佑賢佐俾夀而昌號發王庭以彰有德將擢置維垣之峻姑勉從遜牘之謙雖亞上公實均一品年方七十已先卓傅之除嵗有萬千益衍曽公之夀某側聆成命喜倍輿情擁帚掃門愧莫接賀賓之武濡毫吮墨當載賡聖德之詩賀薛樞密啓恭審擢升使領晉長樞庭王言大哉顯奉制麻之寵相尊等耳榮參台鼎之間郵置初傳中外胥懌恭惟某官伊周事業稷契忠嘉久運籌於帷幄之中獨贊化於陶鈞之上厥績甚懋何官可酬位特冠於籌帷班悉同於公衮禮示異數庸昭宸眷之隆民具爾瞻行陟帥垣之峻某敢修菲削少控賀忱不進不休屢沐鼎言之推挽成終成始尚祈大造之甄陶賀大諫啓恭審擢自南床進登東省材御史糾繩轂下久伸三院之威真諫官獻替殿中獨處七人之首見聞皆聳風采益尊恭惟大諫識造髙明氣全剛大英姿山立望之儼即之溫雅量淵洪澄不清撓不濁久居言路綽著直聲志在擊邪如鷹鸇之逐鳥雀事先去甚當豺狼不問狐狸邪正洞分紀綱大振彌結知於宸扆遂晉長於諫垣進思盡忠不憚青蒲之伏坐而論道即觀黃閣之登某濫玷守藩甫諧視篆側聽郵音之播敢伸記室之恭鳯凰鳴朝陽咸傾蹇諤燕雀賀大厦願托帡幪欣抃殊深剡裁莫究賀交代潮守葉奏院啓維桑與梓夙蒙知遇之隆剖竹分符復托交承之契亟伸慶悃仰瀆中涓恭惟某官學廣聞多才宏識逺撓之不濁凜萬壑之層氷即之也溫備四時之和氣早躋科第藹著聲稱雖周旋於州縣之間每挺持於紳緌之表漕臺攄畫工轄程能晉升奏邸之司彌簡凝旒之眷自天而下忽膺宸命之頒遵海而南榮任侯藩之寄巾車脂轄上冢過家式遄其行不特見人生之貴所居而治又將聞政理之優當與文惠以齊驅罔俾昌黎之專美徒得君重雖足為逺嶠之光以我公歸行進陟甘泉之從某熊轓久玷鼠技已窮聞行李之來云胡不喜庶及瓜而代薄言還歸深懷揚粃之慙尚冀匿瑕之賜會言近止豈惟敘鄰里之歡適我願兮當永結子孫之好賀尚書啓月正元日適鳳厯之更新天相文昌宜鴻休之茂介僣伸慶悃仰瀆記曹恭惟某官望冠羣公位隆八座撓之不濁凜萬壑之層氷即之也溫備四時之和氣三陽交泰百祿是遒春見曰朝方聽履於星辰之上帝曰咨汝俾運籌於帷幄之中某濫剖竹符欣逢榖旦道之云逺莫稱柏葉之觴敬不虛拘敢獻椒花之頌賀丞相啓一氣回元適三陽之交泰大鈞播物罄萬宇以皆春維時上公受天純嘏恭惟某官伊周事業稷契忠嘉一德享天心孰測化工之妙八荒開夀域豈惟寒谷之回正月之吉始和諸福之物畢至未多郭令僅二十四考之中書將繼魯公享萬有千嵗之眉夀某濫分符竹實出甄陶兹逢榖旦之臨盍致椒觴之賀即溫望儼阻陪東閣之後塵噓枯吹生敢冀南枝之先暖賀執政啓一氣回元適三陽之交泰二公洪化罄萬宇以皆春謹飭慶箋仰塵潭府恭惟某官臯夔事業稷契忠嘉端委廟堂而為凖百僚密贊鴻鈞之播運籌帷幄而決勝千里頓清鴈塞之氛當正月之始和宜諸福之畢至自今以始校二十四考之中書俾熾而昌享萬有千嵗之眉夀下詞同上賀侍御啓恭審疏恩北闕正位南床民自不寃方振棘卿之譽人惟求舊復登柏府之雄委寄益隆見聞皆聳恭惟侍御意誠而心正色溫而氣和不倚不流獨厲端方之操可速可久初無躁競之心惟所守之甚堅故其發也必大昨甫登於學省徑分察於臺綱諤諤以昌排公論之所不與蹇蹇之故發衆人之所未言宜直上於台躔胡暫淹於卿月然風采素聞於天下孰不具瞻而眷懷尤切於宸衷蓋將大用果復青氊之舊益揚白簡之威毋以日月為功寧久居於橫榻命之朝夕納誨即進秉於洪鈞某濫厠年盟夙蒙德庇喜聽郵音之播亟伸記室之恭靈丹就而雞犬仙雖莫容於攀附大厦成而燕雀賀願曲賜於帡幪賀喬參政啓恭審渙揚宸命擢預政機聖主得賢臣協贊鈞衡之任文事有武備復參帷幄之籌郵置初傳紳緌胥慶恭惟大參同知相公先生天民先覺名世真儒直哉維清德可尊事可法毅然有守中不倚和不流久居言語侍從之班每盡獻納論思之益暨登右府益罄忠規格其非心首務防微而杜漸引之當道未嘗揚已以取名故言聽而諫行致君正而國定擢居丞弼庸示眷懷暨豫同心允謂精神之契以輔台德即登鼎鼐之司永孚于休自今以始某輒修菲牘庸致賀忱不進不休屢沐鼎言之推挽成終成始尚祈大造之甄陶賀黃循州啓虎榜登名嘗接英流之武熊轓假守行依鄰壁之光聆揚斾以鼎來喜盍簪之伊邇敢期謙德先畀華緘恭惟某官發藻儒林蜚英黌舍胸中浩博富牙籖萬軸之書筆下瀾翻瀉銀河九天之水早䇿身於名第遂振迹於夷塗制錦男邦恢恢餘刃題輿潛邸藉藉休稱謂宜視草於北門胡暫分符於南土蓋以凶徒之反側尚費捍防資善政以拊循庶能綏定趣戒朱轓而入境即銷赤子之弄兵賣劍買牛當繼渤海循良之吏荷囊持橐佇歸甘泉侍從之班某敬染魚封庸伸燕賀蒙九里之潤願廣推及晉之波介大國之間寧復有奔秦之盜謝差知潮州啓代庖郎省慙愒日以罔功假守侯藩忽自天而有命始終僥幸進退光榮伏念某植性棗昏受材樗散績文種學第知兀兀以窮年端行俟時寧敢栖栖而為佞初蔑一人之薦引特蒙大造之知憐兩置周行九叨清選自再兼於銓部凡五閲於嵗華屈指同寅接踵補外獨未親於民事恐莫報於恩私可以去乎遂薦伸於丹悃與其退也俾出駕於朱轓距梓里以非遙况瓜期之促近喜有上冡過家之便益增分符剖竹之輝自謀何以過之始願固不及此兹蓋恭遇丞相精忠貫日盛德格天惟幾惟深藏妙用於莫可名言之域能定能應成大功於不動聲色之間邉陲雖底於敉寧外郡尤資於惠養謂太守乃吏民之本要在得人庶遐陬如畿甸之中悉皆蒙福豈期㨂擇猥及疏庸某敢不節用愛人奉法循理首戒貪泉之酌期觀越石之清治渤海而選用賢良慙非龔遂至潮陽而詢問疾苦當效韓公代賀禮侍除吏部侍郎啓渙膺宸命晉二天官禮以導中樂以導和已播直清之譽賢者在位能者在職更資銓選之公睿眷彌深師言允穆恭惟某官才姿超軼器局恢閎諸老猶未能言獨殫讜論天子擢為第一俯壓羣英徑躋鴛鷺之聮不假蚍蜉之助書林册府遍歷清華宰掾郎曹迭更委寄纂修史館羽翼儲宫已為儒者之極榮尤躐甘泉之法從代言西掖秩禮南宫俊髦欣典舉之公科目慶得人之盛載頒渙號俾二選曹坐廟朝而進百官此其漸耳理陰陽而遂萬物行將見之某自愧謭才濫司偏壘側聽郵音之播阻修賓戺之恭靈丹就而雞犬仙雖莫容於攀附大厦成而燕雀賀願曲賜於帡幪代賀殿院除起居郎兼户部侍郎啓榮膺鳯詔進立螭坳執法殿中方喜臺綱之肅秉筆柱下更參民部之權眷倚彌深見聞皆聳恭惟某官清風立懦烈日爭嚴詞章輝華如引星辰而上議論磊落若決江河之流自陟要津益騰廣譽方升華於六察復進職於副端卓然不羣猶鷹鸇之逐鳥雀去其太甚當豺狼不問狐狸奉簡以聞垂紳皆震將倚論思之益遂分記注之司兼二板曹進聮法從持橐簪筆實為大用之階當軸秉鈞行副具瞻之望某仰聆成命俯激歡悰阻展拜於賓墀輒抒誠於記史夔龍接武益增朝列之輝燕雀何知第切厦成之賀代賀察院啓渙奉十行晉登六察均其稍食方參楓陛之班聮簡在帝心俾正柏臺之綱紀傳聞所逮欣抃惟均恭惟某官育德端方受才卓越登會稽探禹穴發為翰墨之工指崑崙薄蓬萊迥立風塵之表儒林挺秀士萼交輝早擢第于太常旋馳聲於宧路牛刀小試遊刃恢恢鶚薦上騰諸公衮衮進興百司之廩祿實階大用之權輿風度能若九齡乎果被凝旒之眷朝廷誰踰仲卿者徑膺冠豸之除共徯設施一新聞見已聳橫秋之雕鶚豈容當道之豺狼毋以日月為功亶為峻擢命之朝夕納誨行副具瞻某自愧謭才濫司偏壘側聽郵音之播阻修賓戺之恭鳯凰之鳴朝陽咸慶風采燕雀之賀大厦願託帡幪代賀帥冬至啓黃鐘倡六律應緹室以飛灰太極統三微謹清臺而測景鼎來休祉萃聚帥垣恭惟某官望重文昌任隆方伯清標絶俗凜然萬壑之層氷善政得民散作八州之和氣候式逢於剛長吉宜叶於彚征舒栁放梅已報陽春之消息秉鈞當軸即觀揆路之登庸某濫佐藩條阻趨賓廡不逺而復已占夫子七日之爻俾夀而昌敬上僖公千嵗之頌代賀職曹官啓日官推䇿正月之吉始和君子對時諸福之物畢至敢陳儷語上瀆崇臺恭惟某官望重月卿輝騰星使民蘇惠澤盡歸春風和氣之中吏戢嚴明如在白日青天之下式逢獻嵗茂介繁禧某假守斗城阻瞻台耀莫預椒觴之奉第勤椿夀之祈代賀帥啓履而後泰易推爻象之占正次於王史謹春秋之法敢陳頌語仰瀆帥垣恭惟某官八座穹班十連重寄惠施閭里助一氣之發生威戢姦倫同羣陰而消伏式臨獻嵗駢集休祺遵海而南先布青陽之暖自天而下亟膺紫詔之溫某仰托洪庥欣逢榖旦蓬萊隔弱水三萬里阻展慶於賓墀上古有大椿八千春願默符於夀算代賀廬陵守啓命出楓宸符分竹使吏民胥慶競瞻相閲之名流麾幟甫臨頓覺侯藩之壯觀方受察於部封之下敢抒誠於簡牘之中恭惟某官表表才猷挺挺風烈再世登黃閣相輝衮繡於名門一宗無白丁獨占衣冠之盛事即此家聲之烜赫固宜禁路以騰驤乃恬退以自將姑逡巡而平進盤根錯節小試牛刀别駕題輿暫淹驥足雖效績屢徹於丹扆而經綸尚斂於朱轓蓋以廬陵素稱劇郡蠻獠接境而弄兵時警姦黠喜訟而珥筆風生白粲連檣正資斂散青襟比屋尤賴作成茍非明敏之長材曷任藩宣之重寄雖一方之幸甚如四海之望何朝廷已深知佇頒丹詔公侯必復始行繼青氊某孤陋書生艱勤舍選世科濫襲每懷揚粃之慙期戍尚賖偶報及瓜之訊方奉慈闈而祗役適承畫戟之開藩將斂版以鳬趨已拊躬而雀躍紅蓮依緑水愧莫企於前修青蒿倚長松願俯垂於巨蔭謝趙守關升啓枯木朽株初乏先容之助青芝赤箭過蒙並蓄之私喜公道之復明拊卑躬而增感竊觀今日之薦舉悉由要路之吹噓無因而前每遭按劍挾貴而問必辱知音遂令單寒寡援之徒無復振厲求伸之望豈期天幸獲遇宗英載笑載言屢厭挾書之至或推或挽欲先宣力之求倘匪真賢曷膺兹選如某者蠹魚末學斥鷃卑棲無所取材偶玷名於黌舍幸而獲選復繼踵於詞科侯泮濫司官針確守辱兩章之推薦俄一削之參差欲復青氊合干洪造然炙手可熱既無借勢之階搖尾乞憐又乏獻諛之態已自歎楚弓之失詎敢期趙璧之歸謝鄒守關升啓處泮宫之冷第采魯芹回寒谷之溫忽逢鄒律仰戴提撕之賜亶為特達之知竊惟下吏之進身實賴上官之推轂然以薦員之既狹類皆枉道以求伸或托葭莩或因桑梓傾心降節拜賈謐之車塵削牘投誠滿何曽之記室未有不求而得孰謂無因而前幸遇大賢獨明公道觀其所主每惟靜退之求舉爾所知不待懇祈之力豈期疏拙猥預選掄伏念某燈火寒生簪纓末裔託身黌舍荐玷鶚書射䇿丹墀浪塵龜列不避好為之戒濫叨分教之司範不範模不模每虞寡陋聞未聞見未見喜遂趨承荷屬意於作成特增田而贍給經籍寵畀輪奐鼎新遂臻襟佩之翕從頓覺庠序之改觀皆公所賜揣已何功方深懷欣幸之私詎復興僥求之想敢圖矜念亟賜薦揚斐然弗知所裁豈識作文之體不至阿其所好曷當守正之褒剡奏一飛價增十倍兹蓋恭遇某官兩京循吏一代真儒嘉善而矜不能實根素稟舉直而錯諸枉庸示至公遂令寡援之蹤亦預兼收之數某敢不激昂所守灑濯其心對黃卷而師聖賢期於有用毁素節而求富貴斷不敢為以此律身是為報德代學職謝鄒守啓省少府而買刀布尚高循吏之稱捐私幣以給生徒尤見清風之凜于今幸遇自昔未聞敢效泮宫之詩少置中涓之謝載惟鄞水僻在閩陬雖庠序之僅興然廩稍之未繼纍蒙賢守興念諸生或增養士之田或賜在官之宇用禆供給粗免煎熬夫何變起於鬱攸又復恩加於減放利源寖少方虞必絶於陳糧寒谷頓回不意忽逢於鄒律兹蓋恭遇某官西京良吏東魯真儒訟理政平春生田里內備外禦影滅姦偷恩威已著於一方禮貌益加於多士寵頒羣籍盛葺儒宮逺慮深思欲為後日無窮之計視飢由已特捐舊比當得之金寧將清白以遺子孫乃置膏腴而贍學校搢紳興歎韋布均歡咸曰秩終孰不匱金而囊帛卓然見逺獨能重義以輕財某等敢不戴德丘山銘功金石自今以始嵗其有咸蒙飲食之恩惟學遜志敏厥修當佩災畬之訓冀收末效仰答洪私謝除國子博士啓馳書光範方伸悃愊之私職教宗庠遽辱甄陶之賜得踰望外愧溢情涯竊惟學校之興無若國家之盛左開黌舍右設武庠至于國子之俊髦復隸賢關而教養第惟皇族久缺學宫經之營之既一新于輪奐賢者能者遂悉補于生員欲陶麟趾信厚之風當賴鴻儒作成之力如某者虀鹽太學燈火寒生無令聞廣譽以施諸身乏前言往行以蓄其德誤辱知於上衮遂厠迹于周行掌故甸師濫叨庀職成均胄學薦玷橫經負丞深愧于僥踰丐外未蒙于俞允欲養而親不逮既罹素韠之悲投間乃分之宜無復清都之夢忽疏恩于宸扆俾竊廩于宗黌緬思是學之初興嘗兼訓諭不謂修門之再入復忝師儒揣分奚堪歸恩有自兹蓋恭遇某官忠貫日月勳塞乾坤厥亦惟我周王方受維新之休命時則有若伊尹每懷不獲之匹夫俯矜簪履之遺久託爐錘之內謂若居璧水已粗知教育之方今欲訓金枝遂使預選掄之末某敢不䇿蹇磨鈍溫故知新空空鄙夫雖莫任範模之責振振公姓當率為禮義之歸依向彌深敷宣罔既得浙東帥幕謝廟堂啓魏勃掃曹相之門荐瞻衮繡石生入烏公之幕誤辱陶甄施重如山感深至骨竊觀近代宅揆之任莫如今日用人之公爰度爰咨必加精審或用或舍自有鑒裁搜羅罔間於邇遐柬拔尤先於寒畯肆令寡援亦預兼收伏念某猥以諸生濫塵甲第采魯泮之藻比及三年代齊戍之瓜亦既數月朅來京國晉拜公台吹噓既乏於先容陶鑄敢求於近次豈期矜憫曲賜生成謂寒士歡顔俱託萬間之庇矧小人有母正資三釡之供俾易贊於帥垣庶亟霑於祿養春回寒谷已逢吹律之工日近長安尤有向陽之便始願誠不及此自謀何以過之兹蓋恭遇某官奕世鈞衡清朝柱石輔贊彌縫而藏諸用仰大化之密移連卷詰曲各安所施雖寸長而不棄自慙頑礦猥入洪鈞敢不仰戴洪恩益殫駑技覽禹穴會稽之迹庸激壯懷預平淮東閣之招尚期異日士伸知已書不盡言代謝廣文啓授弟子於國中方闡孟軻之教召秀才於門下盍求賈誼之賢豈意疏庸遽蒙招置雖賴先容之助亶為幸會之多伏念某命與時違勞而功少鼓翼兩隨於鶚薦暴腮復困於龍門一第是期價敢矜於櫝玉雙親已老教深負於籯金兹該免於鄉書將與偕於計吏謂決科發䇿要當就有道而正焉而摳衣趨隅每願事大夫之賢者幸逢哲匠來典儒宫招而誨之方執經在諸生之列與其進也俾託身於廣厦之間靖言人耳人耳之資曷稱師哉師哉之命第欣朽鈍獲遂依歸恭惟某官挺秀儒林蜚聲黌舍錦心繡口溢為筆下之詞章玉季金昆總是人中之英傑早由豹變暫屈鸞棲必也使無訟乎已鞠圜扉之草豫私淑諸人也來觀泮水之芹惟大賢無所不容占小善亦率以録遂令頑礦亦在洪爐雖不模不範深負揚子務求之意然小成大成冀親宣尼善誘之功謝除司令啓充員故府慙無毫髮之勞列屬奉常忽拜絲綸之寵陶冶實由於洪造感藏尤極于丹衷惟今日藉田之官即古者甸師之職是穮是蓘已臻黍稷之豐乃積乃倉庸備粢盛之奉既專供于嵗事爰分隸于容臺無簿書期會之勞亶為清簡非粹潔端方之彥曷副選掄如某者蹭蹬腐儒奔馳薄宦既無甚髙論足以譁世豈有他謬巧用以致身芹泮終更僅逃瘝曠槐庭晉謁初乏吹噓豈期特達之知遽軫生成之念謂小人有母正資三釡之供俾寒士歡顔特畀一基之次朅來帥幕甫閲嵗華復被命于玉宸獲效官于金部盈几閣而遍睹第粗知職守之勤無效績之可書安敢起序遷之想過辱太鈞之播進升帝籍之司揣分奚堪捫心知愧兹蓋恭遇少師樞使丞相國公夾邦哲輔命世真儒厥亦惟我周王方賴以寧之多士時則有若伊尹每懷不獲之一夫故微賤弗忍於遐遺而巧拙或容於雜進某敢不益堅素守仰答殊知俎豆之事嘗聞第謹馨香之薦樗櫟之材何用尚祈培植之私戴德何窮占辭曷既謝除郡啓久玷郎闈恐妨賢路欲自全於進退遂荐瀆於威尊正虞干斧鑕之誅安敢冀甄陶之寵自天而下忽膺宸命之頒遵海而南俾任侯藩之寄况瓜期之將及距梓里以非遙退省其私實逾所望相國之賜大矣當懷報稱之私中心何日忘之曷喻感藏之意亟修謝牘仰紊記曹尚圖瞻赤舄之光庶獲罄丹衷之悃自慙晉躐倍極凌兢代謝特薦啓究心備禦每虞負推轂之公指日終更乃復被剡章之寵感恩甚厚圖報蔑然竊惟趨事以赴功難遇賞音而知已一經題品已為此生際遇之榮再沐推揚尤荷大造生成之力第慙拙政莫稱華褒伏念某拳曲散材迂疏末學修身踐行粗知廉勤靜退之方行法涖官曷副通敏強明之譽猥辱從臣之薦濫叨偏壘之司庶民無愁歎之聲雖安田里鄰壤有跳梁之警尤費隄防適當瓜戍之更誤沐囊封之奏俾留經理敢憚艱勤內供士卒之餱糧外固封陲之關隘凶徒潛弭闔境粗寧幸逃瘝曠之虞實賴照臨之庇敢祈褒寵特賜薦揚兹蓋恭遇某官歆向才華間平風度以錦幄名郎之舊膺繡衣出使之權清節照人凜凜氷霜之厲公心察吏拳拳涇渭之分遂使駑庸荐叨提奬某敢不激昂所守灑濯其心非俗吏之所能為願益堅於素學觀近臣以其所主期仰副於深知謝葉帥關升啓文闈校藝夙遭衡鑑之公薦牘陳詞復被甄陶之賜始終僥幸俯仰兢慚竊惟初仕之進身悉用上官之升削然薦員之既狹欲溢額以尤艱必得其三庶遂掘井及泉之願倘缺其一豈無為山虧簣之虞過辱曲成亶為幸會伏念某簮纓末緒燈火寒生差延賞於旬月之間已絶意於雲霄之望託身黌舍偶叨再薦之書射䇿彤墀浪厠七人之列朅來分教深愧罔功戍期已迫於及瓜舉削尚虧於合穎無可棲者豈勝繞木三匝之思因而成之正賴中流一柱之助敢期特達曲賜推揚第斷斷以無他莫副純雅清修之譽非循循而善誘曷當師表模範之褒剡奏一飛增價十倍兹蓋恭遇安撫尚書政成帥閫命錫帝庭行以公歸晉陟上台之位先從隗始廣收東閣之才遂使冷官亦逢暖律某敢不激昂所守灑濯其心對黃卷而師聖賢期於有用毁素節而求富貴斷不敢為以此律身是為報德

body:
  text: 東澗集卷十四宋許應龍撰帖子詞皇帝閣春帖子日向皇都永氷從太液融青陽才轉律物物被和風寬大書方布歡聲四海同陽春如有腳造物不言功聖德乾坤大皇圖日月長逺人咸畏慕國勢寖安強金華綵勝年年巧柏酒椒盤嵗嵗新恭願吾皇千萬夀四時無日不陽春三白從來兆嵗豐幾看瑞雪舞回風蒼龍挂闕農祥正擊壤行歌我稼同東風昨夜掃氛埃四表咸欣壽域開都護已飛三捷奏凌煙同上萬年杯皇后閣春帖子一氣轉洪鈞陽和觸處新上林春更早草木已精神一嵗兩逢春皇都景物新發生何處早甲拆驗莊椿椒殿霞觴舉金花拆勝鮮年年慶佳節眉夀祝綿延日融閬苑紅初露氷泮瑤池碧半涵管取新年多勝事當知風化自周南臘前三白兆年豐即更彌旬雪滿空嵗籥未經春已到從今物物被和風貴妃閣春帖子木德新回律瓊壺暖不氷舉頭聞鵲喜翔舞下觚稜月射璇題爛風傳玉漏清仰瞻雲漢表輝潤四星明昨夜東風入律新朝來蕙露淨無塵玉觴椒酒陪歡宴總道今春勝舊春賢哉淑德繼雞鳴密贊關雎美化行夙夜若為勤警戒始終一念欲相成翠管銀罌舊事傳新春賸喜在新年巧裁綵勝迎佳節更祝君王夀萬千皇帝閣端午帖子卑服即康功君王儉德隆却頒羅與葛恩渥被羣工內外期無患兢兢理萬幾延英勤講論遑恤汗沾衣清淨無他好歌風舞舜琴阜財并解愠總是愛民心離明赫赫正當中萬物咸欣長養風隴麥已登蠶又熟更多膏澤兆年豐誕敷文德洽寰區赳赳明明運廟謨自是不爭應善勝何須更佩辟兵符殿閣涼生晝景長翠煙縹渺御爐香經帷講罷看章疏至昃猶聞食未遑皇后閣端午帖子玉切菖蒲細金包黍角香年年慶佳節燕衎侍君王寶篆煙輕繞瑤臺日正中等間調玉瑟聊助舜琴風重午宫衣賜百工香羅疊雪葛含風誰知此日榮恩被端自稱絲效繭功辟邪不用符為佩續命何須綵結絲逮下徽音繼樛木穰穰福履已來綏三千玉女鬬羣芳並蓄兼收百藥良咸願東皇與西母無窮眉夀等天長貴妃閣端午帖子擷秀鬬羣芳兼收百藥良不因仁及物庶草曷蕃昌淑德儀宫閫天教受祉繁艾人暨桃印奚用更懸門丹篆叉符綵縷鮮承恩侍宴玉皇前一年一度為端午此去應須億萬年裁成御服進君王霧縠雲綃疊雪香却效葛覃躬節用不忘浣濯舊衣裳檻有榴花沼有蓮南薰拂拂晚涼天六宫莫度新翻曲只理雲和伴舜絃詩次韻張太博方得余所遺二程先生集辨二程戲邵子語文字未科斗圖書未龜龍燦然天地間此理觸處逢是謂象之祖而為數之宗昊羲古神聖先得人所同文因而繇之旦出亦並雄訖于我孔聖天命滋益恭渾然一理貫密察而從容辭變于象占四者固所崇推時以知變象占在其中荒荒秦漢後學者昧所從不以災異會則以虛無通天開周氏子易道乃復東動靜靜復動終始始而終上承千年緒下起百世風同時有邵子講道于伊嵩天地之運化陰陽之無窮即物驗消長先機知吉凶邵子極道數獨立幾無戎助也見詩注二程闡周孔為時開矇矇其歸則一耳昧者結忡忡學之將奈何矧余倍顓蒙要知羲皇心須踏周孔蹤送天台李守天台罹洚水平陸幾成淵經理閲再祀民瘼猶未痊將令田里安須得牧守賢疇咨能俾乂僉曰蓬萊仙君侯寬且明履節金石堅吏事素精敏公心無黨偏分符膺重寄為政將奚先租賦盍蠲減獄訟無淹延姦黠須禁戢厄窮當憫憐庶銷愁嘆聲播作謠頌傳使華聞有命丹書下日邊復使兹郡民鼓舞戴二天政成徹丹扆驛召歸甘泉嗟豫十載間稠疊同班聮學館暨郎省昕夕相周旋喜君駕朱轓恨我違英躔同寅舉餞觴佳句聮華箋枯腸強搜索綴緝僅成篇送楊郎中守嘉興詩君昨倅嘉禾施設皆儒者千里稱廉平六邑荷寬假海沂雖賴祥宣室俄思賈召還甫再期出守榮五馬舊治聞重來歡呼溢田野正苦夏日炎將沐秋霖灑君侯寬且明義利審取舍願推一片心大作萬間厦苛斂戒分肥嚴刑去衣赭當令愁嘆聲轉作詩歌寫如君梁棟才一麾寧久把祇虞席未溫又賦公歸雅送人赴倉臺帝念畿甸民財力俱有限俗吏肆貪殘侵漁蕩資産致治在得賢刺史尤當揀明公如范滂清節邁楊綰疏寵畀倉臺一道俱刮眼糴貴望公平斂苛冀公剗察吏貴精明臨民當敬簡髙才固優為佇見鳩功僝將令愁嘆民喜至笑聲莞繡節暫馳驅玉堂資著撰行矣促公歸餞行聊舉盞贈韓倅鳯城久矣欽韓公華胄重來振祖風關決藩條明且恕待人接物春融融散為和氣遍南土雨順年豐民按堵海沂雖喜賴王祥驥足治中難久駐向來文惠倅瀛洲藉藉聲名動冕旒願君凌厲紹前美南澗事業當同休于今且慶生申旦敬爇瓣香祈鶴算中秋節近月嬋娟正好平分通夕宴君家自有舊氊青合上星辰聽履聲明年此會知何處宣勸黃封下帝廷贈林倅元是清都紫府仙出為名世應半千發矢兩科俱中的英名烜赫斗橫天鄞水富沙典芹泮黜浮崇雅文風煥沙陽之政寬而明吏不忍欺民不玩雙飛鳬舄造皇州三台八座俱挽留辭榮避寵姑别駕恬退髙節前無儔千里提封勤贊理恕以待人嚴律已一輪秋月照無私百尺春潭清見底須知作善天降祥俾耆而艾夀而臧萱闈朱顔映蒼鬢詵詵蘭玉如鸞翔匪伊丹詔日邊至䇿足烏臺陟端揆年年衮繡舞萊衣瑤池屢獻蟠桃瑞代上何樞密宋元憲公王沂公妙齡擢第魁南宫清華歷遍升諫省雍容二府亮天工却斂經綸來望郡一鎮天雄一鎮鄆政聲洋溢徹宸聰丹詔紫泥催入覲廟堂端委秉鈞衡致君堯舜風俗醇至今景祐皇祐治振蕩人耳如雷霆巍巍勳績誰能繼三嘆真賢生不世豈知今日元樞公矯翼天衢更凌厲禮闈得雋冠羣英旋登言路攖龍鱗運籌帷幄參宥密翻私雨露澤全閩生平出處總相契左揆尚虛天有意宣麻指日下彤廷整頓乾坤邁前美萱堂正富八十春綵衣輝映衮衣新二公榮貴雖同轍如此盛事真無倫先子姓名叨附驥况復團司同典記遺簮墮履儻未捐惠顧尚期逮孫子鯫生鼓篋趨賢關朔風急徑修塗艱坱圠洪鈞轉一氣為借陽和先破寒餞王郎中赴湖南倉明明天子御丹扆首擇英賢將使指湖湘以南闕倉臺環顧在廷誰足倚蓬山蘭省輟名流禮樂光華共心企看看六轡載馳驅爰度爰諏逮田里散財發廩蘇厄窮揚善舉賢律貪鄙苐恐崇臺未突黔趣上亨衢詔泥紫與君同齒復同寅那更著庭紹英軌交情金石久益堅人雖漸逺心則邇衡陽鴈過可傳書時願劉公貼一紙賀同知生辰訾陬之月如陽春君臣慶會應昌辰虹星牛渚將誕聖嵩髙維嶽先生申日角珠庭輝緑鬢仙風道骨真宣靖才凌鐵幹四十圍量狹銀潢三萬頃端委樞庭贊化工制勝謀謨談笑中九扈告成村墅月一塵不警戍樓風勳名元是青氊舊衮衮名公誰出右黃麻昕夕下彤廷玉帶貂蟬輝衮繡曈曨瑞日上公槐宣勸黃封天上來賸喜千秋佳節近需雲復宴鳯凰臺福祿固知公自有不待占星問牛斗鯫生只備三千詩留取年年祝公夀代上庠同舍上廷評憶昔弱冠遊芹宫潁川先生振文風蹮蹮媚學比如櫛摳衣執經函丈中何人才識最竒偉惟公表裏圭璋粹學精姬公經國書賦飄司馬凌雲氣詞場價湧荐爭魁賜也何如敢望回一别星霜踰十閲側耳譽聲轟如雷翩翩薦鶚翔西浙一飛直上黃金闕排雲披腹呈琅玕蟾窟仙枝徑攀折枳棘難淹鸞鳳栖金科得雋易如攜趨歸立拜廷評命青瑣黃扉指日躋屈指曩年同硯席五人已作龍門客鄉書黌舍多有之碌碌未能著竒節著鞭無若祖生先策足要津儀班聮自笑塵蹤猶隱霧拭目亨衢問天淵綈袍戀戀故人意墮履遺簮未捐棄不求而薦佩私恩髙誼如公今有幾雖然前事已參差荷借鄒生律再吹苦無好語為公謝抖擻枯腸成此詩鳯池立碑紀事鳯翥龍驤欲表三山之竒傑龜蚨螭首載刋千佛之姓名雖云故事之流傳未若此時之烜赫臚傳星陛三魁同萃於一州喜動天顔四海喧騰於盛事凡遇榜中之選又皆天下之英卿雲黼黻而遊夏淵源歆向才華而孫吳韜略比肩接武已增閭里之輝華博學宏詞尤聳紳緌之觀聽若是橫翔而捷出固宜深刻以大書維石巖巖益壯飛鸞之勝迹諸公衮衮佇聮振鷺之清班幸目竒觀率成長句閲盡衣冠盛事圖三魁同郡古來無詞科得雋真鴻筆仙籍聮榮總巨儒此日姓名輝石刻他年步武接天衢浯溪更把元勳勒藉藉休聲震八區贈鄭樞密丘壑方將窈窕尋肯貪斗印耀黃金幾頒中扆留行詔莫返元樞勇退心紅斾分藩雖足樂丹誠戀闕自難禁浮雲出岫知無意祇恐蒼生望更深拜賜宫花紀恩詩濟濟蹌蹌藹縉紳祝堯均效華封人觴稱鳯闕歡聲沸花錫鸞枝內樣新露葉巧裁隋苑彩天葩先借漢宫春舉頭仰戴君恩重好盡忠誠報紫宸不用涼州羯鼓催陽和已逐小春來誰將萬點花間艷都向百官頭上開樣巧賸裁隋苑綵影搖斜蘸漢宫杯玉階再拜君恩重洋溢歡聲遍九垓和權郡重九韻鈴齋靜暇鎖棠隂幽壑何妨窈窕尋咳唾珠璣輝衆目錚鏦琴瑟樂賓心引杯非為黃花醉設席欣逢皂蓋臨來嵗茱萸賜朝士看君鯨吸玉壺斟和閩帥龍飛天子攬英雄舊德欣逢泰道通丹詔果然頒北闕綵舟行矣駕東風雨餘杉徑新添緑暖入花粧旋姹紅待得湖邊春色滿我公已在鳯池中新鑿南湖接海潮油幢領客泛蘭橈那知半夜雨聲急却放新晴物色饒盡日登臨陪步武髙談灑落挹風標陽春白雪真難和泚筆惟書道路謠和鄒守鹿鳴宴賢守聲名重泰山肯將曲學誤儒冠相期素節終身履不道青雲得路難多士聮翩閶闔去忠言凌厲雪霜寒朱轓指日歸楓禁廷䇿煩公具眼看館中和賞桂詩喜陪盛集桂叢間擬賦新詩未敢先忽拜清篇真寡和難將拙語更爭妍枝頭爛漫黃金粟席上風流紫府仙凡骨豈容攀俊軌也沾賸馥醉花前挽節使少保一節忠勤紹祖風貂蟬七葉擅華宗版曹羡利巍遷秩強敵知名特斂容薦士半躋青瑣闥為民數奏皂囊封龍旗虎節今何在紀績還須仗蔡雍衮衣赤舄我公歸共傒登庸翊政機楓禁荐頒天語渥薤歌我嘆露華晞真王未復青氊舊亞保空餘紫誥輝突兀麒麟圖繪處仰瞻遺像倍歔欷挽李文昌顒顒德望重朝廷况有胸中千萬兵蠻獠未擒宵旰慮軺車一出笑談平囊封力沮和戎議制閫咸推料敵精壯志未酬天不憗空餘草木識威名盛名從古號難居公獨峥嶸四紀餘禁陛幾年聞曳履帥垣三度拜除書夀祺合享千齡永往事俄驚一夢如久矣辱知慚未報仰瞻丹旐倍欷歔潘上舍父挽詩狗茍蠅營笑俗情機心降盡倒風旌人生六帙不為夭家纍千金能享成老去月評推吉德生前天爵謝虛榮悲風瑟瑟飛丹旐行道歔欷亦失聲蘭玉賢關雋譽飛詞場幾見捷音馳登雲將慰椿庭望陟岵俄驚薤露悲榮養痛嗟今日隔嘉封賴有異時追前岡已卜牛眠地螭首行鐫九尺碑夫人黃氏挽詩樞庭勇退古無前內助端由婦德賢燠館涼臺供燕樂衮衣褕翟慶聮翩雖云生死皆同嵗猶恨徜徉未百年遙想銘旌搖曳處江山草木亦凄然代同舍上郎中人物依然吕洞賓氷霜風骨玉精神退朝花底千官散標格如公有幾人能賦人人説潁川誰知妙訣已親傳詞場屢草干將句擲地金聲震九天逸氣飄飄正妙年縱橫禮樂掃三千臚傳玉陛星辰曉姓字巍居鼎甲先父子同時踐禁塗一門榮耀世間無願憑曹霸丹青筆繪入衣冠盛事圖册府方羊冠列仙粉闈深處爛星躔黃扉已設屏風隔會見絲綸下日邊題西巖寺第一巖前風景殊山僧去後野雲孤歸來不費絲毫力幻出天宫一畫圖修行極則到心安靜處忙中只一般談笑打開新鋪席此身元不離蒲團自嘆僕訴無衣婢訴飢老妻終日不開眉十年待得齊瓜熟又似齊瓜未熟時薺菜撥雪挑來葉轉青自刪自煮作杯羮寶階香砌何曽識偏向寒門滿地生

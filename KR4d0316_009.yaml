body:
  text: 東澗集卷九宋許應龍撰狀辭免吏部侍郎奏狀疏寵過優撫躬增惕竊以左銓之職實專選調之司用比例則與法制以相違拘資格則恐賢愚之同滯能勝兹任必惟其人既已試之罔功豈真除之敢望伏念某識最為下才不及中庀職成均莫副教養作成之責代言禁掖慙無討論潤色之工復兼攝於選曹實難當於隆委甄別流品固無冰鑑之明銓綜公平未若權衡之審深虞曠敗以速顚隮忽叨誤渥之頒俾正二卿之秩用過其量愧深於榮伏望聖朝收還成命畀詳練清通之士往服厥官庶長短大小之才各稱其職所有恩命臣未敢祗受辭免除權兵部尚書奏狀疏寵過優撫躬增惕竊以六曹之長實參八座之聨司喉舌以納言允為要職上星辰而聽履密侍清光非得真才曷膺兹選伏念臣受才樗散植性棗昏筮仕凡三十年立朝已二八載誤辱九重之簡眷俾兼數職之清華成章不知所裁曷代王言而潤色詳說將以反約莫裨聖學之緝熙矧司銓綜於劇曹尤乏精明之藻鑑倏叨成渙濫玷文昌退省其私若何報稱用過其量必速顚隮伏望睿慈收還誤渥亟量能而授職改畀時髦使率屬而佐王以平邦國辭免兼侍講奏狀臣談經廣厦愧無啓沃之功錫命中宸誤沐褒遷之寵顧僥踰之過甚雖庸懵以知辭伏念某初乏技能濫䝉知奬銓曹詞掖既荐叨選任之公講殿書帷復俾輔緝熙之學苐慙寡見恐負隆恩謂莫善於詩固當以意而逆志然未燭厥理豈能因事以獻言遽令升進讀之班何以副殊常之眷伏望收回新渥改畀時髦言古而驗於今必有格君之益著心而入乎耳無非經世之規第三丐祠奏狀奏牘荐陳俞音尚閟制命為義既未忍於棄捐事君以忠詎敢懷於進退然久叨於清選愧莫效於微勞福過菑生倐復有采薪之患心憔形悴豈宜陪持槖之聨茍戀寵榮必遭指議輒僭伸於三瀆期仰徹於九重欲望朝廷特賜敷奏別求時彥俾居華要之班亟畀叢祠庶遂休間之願表請皇帝上壽表天祐民而作君適届千秋之節臣歸美以報上盍稱萬壽之觴倐拜宸章免循彝典敢率垂紳之衆僭陳奏牘之恭恭惟皇帝陛下緯武經文勵精更始攬萬機而親政聽斷惟勤正五事以承天嚴恭自度慮乾象未循於躔次期邊陲亟底於奠安肆筆成書欲昭至意奉巵為壽姑寢盛儀雖彰聖德之隆謙曷副臣心之深願况熾昌而艾特伸善頌之忱非耽樂之從奚損欽崇之實冀垂淵聽勉率舊章俾陳漢殿之儀䖍致堯封之祝大德得夀永觀萬國之咸寧和氣致祥行見五星之同色第二表思至德以承天雖堅宸意祝聖人而使壽難輟彝儀荐輸懇款之忱冀動穹窿之聽恭惟皇帝陛下察文審己體仁長人長發其祥適屇誕彌之月俾耆而艾盍伸善頌之辭尚閟俞音莫殫衷悃再斯可矣敢稽奏牘之陳皇則受之庶展稱觴之慶願頒睿旨俯徇衆情呼萬嵗者三當同嵩嶽方千里者九盡入輿圖第三表萬年受祜盍伸祝頌之忱一禮成文荐閟允俞之命敢輸丹悃疊叩紫宸恭惟皇帝陛下齊聖廣淵剛健中正誕彌厥月適逢載夙之辰俾熾而昌願介無疆之祉乃嚴恭以自度屢謙遜而不遑然四海均歡恩悉霑於湛露豈一人有慶觴未舉於凌煙不辭三瀆之煩仰徹九重之聽冀從衆志勿替舊章使壽使富而多男當上堯封之祝宜民宜人而受祿載賡周雅之詩賀皇帝正旦表三陽交泰適當五始之書百辟承休咸致萬年之祝叨居外服敢控衷忱恭惟皇帝陛下纘紹皇圖緝熙聖學法天立道遍覆包涵與物為春對時茂育式逢獻歲備擁休祺臣託迹南邦傾心北極綵旗簇仗莫陪濟濟之清班白獸發尊苐想嶤嶤之高論賀皇太后正旦表月正元日適當歲籥之新天相慈宸茂擁春祺之介提封萬里贊喜一詞恭惟皇太后陛下功邁媧皇德參文母含洪光大獨居太極之尊富壽康寧備極九州之奉三陽交泰萬福來崇臣濫剖竹符欣逢榖旦五百里綏五百里甸莫陪長樂之班八千歲春八千歲秋當效華封之祝賀皇帝冬至表朔旦冬至適陽氣之潛萌聖德日新宜休祺之畢集紳緌交賀夷夏均歡恭惟皇帝陛下清明在躬緝熙講學時和玉燭三光全而寒暑平瑞應金穰五榖熟而人民育式臨亞歲茂介繁禧臣假守鳳城阻陪鴛列去天益逺猶隔弱水而望蓬萊迎日初長但向太陽而傾葵藿賀皇太后冬至表至朔同日謂之章適逢佳會壽考萬年介爾福咸慶慈宸暢和氣於兩間溢歡聲於四表恭惟皇太后陛下齊明雍肅富壽康寧載物含洪吻合坤元之德對時發育助成震子之仁當一陽之潛萌宜諸福之畢至臣景迎南陸目睇東朝五百里綏班阻陪於玉筍三千年實算願比於蟠桃賀雪表同雲布濩適當十月之良叶氣薰蒸散作六霙之瑞輝華飾物枯槁生春恭惟皇帝陛下妙道難名真機默運財成天地無私覆私載之偏噓吸隂陽協時燠時暘之證歲功攸敘農扈告豐惟皇穹隆申命之休故嘉瑞復應期而至瓊田玉宇上下交輝桂海冰天氛埃盡洗兹實至和之感召益彰聖德之昭融臣等密邇清光獲沾餘潤雖實堅實好已占多黍之祥然載渴載饑當念采薇之戍瑞慶節賀表十月為陽紀千秋之令節一人有慶沸四海之歡聲咸罄衷誠仰祈睿算恭惟皇帝陛下施仁發政偃武修文叶氣薰為太平上接百王之緒孫謀以燕翼子下垂萬世之基無疆惟休自今以始臣偏城濫攝華旦欣逢瞻星流電繞之祥其光不疚祝地久天長之算俾熾而昌乾會節賀表長發其祥上帝啓興王之運誕彌厥月真人膺出震之期罄海宇以交歡望雲天而請祝恭惟皇帝陛下厲精思治立政任人煥乎其有文章昭乎若揭日月道則高矣燕翼端拱于穆清天何言哉惠澤默周於普率斂時五福享國萬年臣方次偏城適逢華旦蓬萊隔弱水三萬里阻造明庭上古有大椿八千秋願符睿算又火德應天統式昭純祐之休電光繞斗樞載紀誕彌之節照臨所逮鼓舞惟均恭惟皇帝陛下剛健粹精聰明齊聖抗志百王之上游神六籍之中燕翼子以貽謀求賢用吉以天下而為度偃武修文永居北極之尊高嫓南山之壽臣身縻符竹目斷觚稜稽首而稱萬年莫陪虎拜宜民而受百祿願誦周詩天基節賀表天生民而立之君茂啓中興之運臣歸美以報其上共欣載夙之辰恭惟皇帝陛下德配乾坤明並日月任人共政已歸齊國之侵疆用夏變夷復致單于之慕義自今以始俾熾而昌宜誕日之甫臨慶休祺之滋至臣縻身南土引睇北辰使富使壽而多男願上堯封之祝宜民宜人而受祿載賡周雅之詩又天申命而用休篤生元聖臣歸美以報上敢控衷忱仰瞻北極之尊願介南山之壽恭惟皇帝陛下厲精思治發政施仁和氣致祥已獲屢豐之慶常德立武佇收善勝之功嘉與含生同躋壽域電繞樞虹流渚當正月之始和嶽修貢川效珍罄四方而來賀臣等幸逢華旦倍激歡悰於萬斯年敬上再三之祝克昌厥後更祈千億之祥明堂禮成賀表類于上帝欲伸報本之儀祀於明堂爰講合祛之制神靈底豫華夏均歡恭惟皇帝陛下德冠百王教刑四海奉先思孝雖當恭默之時尊祖敬宗敢替靈承之意以禋以祀必躬必親越紼而行爰即九筵之地備物以薦式嚴三獻之儀熙事告成蕃禧茂介臣心常拱北跡尚滯南肅肅雍雍莫預臣工之顯相穰穰簡簡苐祈福祿之來成謝進讀三朝寶訓徹章轉官表祖訓是式甫勸誦以終篇臣等何功乃䝉恩而增秩徒負因人之愧敢云稽古之榮竊觀上古帝王以來無若我朝祖宗之盛三聖相授謨丕顯烈丕承百世莫違軌易遵度易則布在方策貽厥子孫聖緒紹休首先取法邇英進讀今遂徹章慚無紬繹之勞猥沐褒遷之寵兹蓋伏遇皇帝陛下道純德厚日就月將謂監于成憲則其永無愆非學于古訓則豈能有獲肆令儒紱入侍經帷敷陳三十卷之格言紹復億萬年之洪業適華編之方竟疏渙渥以均頒臣等敢不拜手承休銘心圖報告于內順于外當毋忘啓沃之忠尊所聞行所知願益進光明之學復盱眙泗州賀表敵王所愾甫聞武烈之揚因壘而降已見齊疆之復邊烽寢息國勢愈尊竊以天道好還方篤皇家之眷王者無外當恢輿地之圖念彼不恭侵豫王略爰整其旅已收八戰八克之功若往而征必獲萬衆萬全之利憫其歸附貸彼誅夷額額蔡城既復修其職貢茫茫禹迹佇混一於車書兹蓋恭遇皇帝陛下神聖武文剛明果斷屈此羣醜銷渤海之弄兵殱厥渠魁措山陽於奠枕餘威所暨故壤復還端由妙算之淵深遂致膚功之日奏臣側聆盛事倍激歡悰淮夷來求莫預召虎王休之對青徐底定當賡韓公聖德之詩復盱眙泗州賀皇太后表如月之恆咸仰並明之德普天之下自無不服之思舊境復還慈顔有喜恭惟皇太后陛下含洪光大富壽康寧至哉坤元夙贊純乾之運施于方外咸瞻太極之尊無疆惟休俾昌而熾遂使齊疆之舊重歸周版之新臣傾聽捷音敢伸善頌方千里者九盡入輿圖呼萬歲者三願同嵩嶽潮州到任謝表郎闈五稔深愧空餐海嶠一麾誤膺隆委已涓剛而視事敬宣化以承流伏念臣鉛槧寒生虀鹽太學決科發策濫居龜列之前束帶立朝猥厠鴛行之末九叨清選兩攝銓曹揣分已踰抗章荐請遂沐允俞俾循更迭畀潮陽之名郡實閩部之鄰封便道之官遂上冢過家之願褰帷問俗無帶牛佩犢之風凡此曲成過於自擇兹蓋恭遇皇帝陛下達聰明目任賢使能更治民以考功每重藩維之寄不泄邇而忘逺欲如畿甸之中遂令蓬省之腐儒亦預竹符之遴選臣敢不奉法循理戢吏愛民問疾苦於上聞期進昌黎之表率俊秀而就學更遵文惠之規冀著微勞仰酬洪造代謝到任表需次京師荐拜趣行之命承流鄞水猥分共理之符已見吏民具宣德意伏念臣玷名屬籍厠跡官聨別駕題輿愧乏康沂之詠朱轓皂蓋濫叨守土之榮載惟臨汀素稱僻壤土田磽薄窮簷素乏於偫儲鄰境繹騷連歲已疲於供億雖幸息寇攘之警尚有資牧養之謀夫豈妄庸足膺任使兹蓋恭遇皇帝陛下天臨萬宇器使羣工務更化以勵精不泄邇而忘逺知臣嘗佐郡政必能宣守土之勞謂臣辱在宗盟或可任維城之寄遂疏渙渥俾效寸長臣敢不祗奉邦條恪遵侯度郡國之治先惠養當戒煩苛田里之民無歎愁庶幾報稱謝賜宸翰表皇祖有訓甫誦讀以終篇雲漢為章已昭回而飾物過䝉敷錫允謂殊榮竊觀歷代以來無若本朝之盛有典有則貽厥子孫易繼易遵昭然龜鑑肇啓億萬年之業具存三千卷之書聖緒紹休首先取法爾英勸誦今遂徹章式彰典學之始終自愧無功於啓沃豈期宸翰俯賁么蹤兹蓋恭遇皇帝陛下齊聖廣淵剛健中正朝聽夕訪惟思謨烈之承日就月將期致緝熙之益示崇儒而重道援肆筆以成書臣敢不拭目諦觀肅躬跽受以報其上敢忘歸美之忱曰思無邪當體賜詩之意臣無任感天荷聖激切屏營之至謹奉表稱謝以聞臣某惶懼惶懼頓首頓首謹言謝除授試禮部尚書仍賜衣帶鞍馬表秩宗典禮濫叨遷擢之榮中扆疏恩重拜服乘之賜曳婁弗稱駑鈍奚堪臣某惶懼惶懼頓首頓首伏念臣才不踰人學未聞道振衣造闕初微左右之先容束帶立朝敢替始終之一節誤䝉簡眷荐玷清華甫進長於兵曹復易司於宗伯改為改造既頒在笥之珍載馳載驅復被效牽之貺僥踰已甚報稱謂何兹蓋伏遇皇帝陛下卑服即功馭臣以柄慶賞以勸善靡忘敝袴之藏名器不假人尤謹繁纓之錫豈期菲質猥辱殊榮臣敢不祗佩恩輝益加鞭策陳力就列愧無汗馬之勞補過盡忠冀免維鵜之刺代期集所謝賜御詩表玉陛臚傳已被龍光之煥寶奎寵錫復窺鳳翥之章撫己凌兢拜恩隆厚竊惟歷代設科之制莫如本朝待士之隆淳化首賜於御針天聖載頒於大學於皇今日聿舉舊章豈徒昭藻麗之工蓋欲寓作成之意伏念臣等躬承清問旅進大廷剴切而當帝心慙無高論昭回而倬雲漢遽拜宸章兹蓋恭遇皇帝陛下更化勵精求賢用吉官其始也欲示激昻詩以寵之俾增渙渥苐愧布韋之陋豈堪黼黻之華臣敢不佩服聖言砥礪臣節以承休德永懷精白之思乃賡載歌願述明良之盛祝文改元奏告天地社稷太乙宫祝文伏以已安已治咸稱嘉祐之時丕顯丕承無若淳熙之盛仰承祖武庸易歲元敢伸昭告之恭冀獲無疆之福改元奏告宗廟祝文伏以尊祖敬宗期修洪業體元履正庸易休名以奄甸於嘉師冀緝熙於純嘏願垂昭鑒永底丕平改元奏告諸陵祝文理內御外期集大勳建號紀元盍遵先烈爰取嘉祐盈成之盛復參淳熙振起之規尚冀鑒臨永垂孚佑諸陵補種祝文有翼有嚴盍謹寢園之奉既種既戒冀增林下之蕃庸表孝思敢申昭告太廟祖宗帝后神主權奉安祝文伏以謹涓剛辰興工繕治別嚴齊宇暫安睟容俟匠事之告成奉真游而來復告遷祖宗帝后還殿祝文比嚴别宇暫安睟容兹繕治之告成奉神靈而來復用申昭告仰冀鑒臨顯宫皇后下宫修換了畢告遷神御還殿祝文顯宫攢殿已畢繕修爰擇剛辰奉還神御敢伸薦告仰冀鑒臨立春祀五福太乙十神祝文立春之日實開一歲之端受祿于天尚冀十神之祐仰騰碧篆俯控丹衷伏願仙馭下臨高真洞鑒使壽使富更多男子之祥俾熾俾昌益羡泰元之策孟春朝獻祝文伏願受祉既多降年有永自今以始舉無敵國外患之虞遹求厥寧復見嘉祐淳熙之盛伏願自天錫羡如川方增使壽使富而多男克昌厥後宜民宜人而受祿永孚于休立夏祀五福太乙十神祝文四月維夏盍嚴太乙之祠五福錫民敢覬明神之佑仰騰碧篆俯控丹衷伏願萬國咸寧復見升平之象三時不害用成豐稔之祥嶽廟真聖諸廟祝文惟時季秋萬寶告成民安田里枹鼓不驚何以臻兹繄神之靈報有彝典某敢不誠尚祈終賜永庇羣生嶽廟聖帝祝文岱宗四嶽春首四時祀有彝典其敢不祗雨暘時若黍稷咸宜帝其念哉告謝嶽瀆祝文涓選吉辰稱秩宗祀既獲顧歆之况敢修望秩之儀仰冀洪休永扶景祚謁諸廟祝文某濫叨郡寄以視事之三日祗見于廟惟神聰明正直作善降祥某敢不奉法循理謹終如始以祈神之休自信如此尚其鑒之又凡有功於民載在祀典者必於春致享焉兹舊制也矧今物無疵癘家用平康皆神之休敢不謁祠下以祈終庇尚其鑒之又聰明正直保佑一方物無疵癘家用平康仲春藏祀敢替舊章尚祈終惠錫以豐穰又某猥以疏庸假守兹土實與有神分職幽明凡治獄宣教某不敢不任其責至於雨暘時若年榖順成則惟神是望視事三日謹祗謁於祠下廣德軍廣惠廟祈雨祝文歷時不雨屢致禱祈三日為霖冀垂感格雖間䝉於潤澤猶未浹於焦枯敬遣廷紳祗謁祠宇仰騰碧篆俯控丹衷正直聰明願鑒忱恂之懇霑足優渥用成豐稔之祥天目山龍井大雄山祈雨祝文伏以六月不雨豈勝旱暵之虞三日為霖願沐霑濡之賜雖屢伸於祈禱猶未遂於感通爰遣廷紳偏走郡望嗟鬱攸為沴民生已困於煎熬茍膏澤愆期歲事必遭於荒歉願垂隂相俯鑒衷忱龍翔而景雲興沛為甘霔榖熟而人民育迄用康年龍井迎水祈雨祝文七月不雨深懷卒歲之憂三日為霖冀遂有秋之望敬憑道侣往叩靈湫丐勺水以迎還竭寸衷而致禱願垂孚佑亟賜感通龍翔而雲霧興大沛滂沱之澤榖熟而人民育永消旱暵之虞後庵祈雨祝文荷鍤如雲方興農事覆手為雨全賴佛慈矧偏壘之並山乏巨川之瀦水膏澤不下豐年曷期謹騰寶篆之香仰干大覺願灑淨瓶之水散作甘霖龍井請水祝文龍潛於淵孰窮變化天久不雨敢後禱祈矧外臺方切於咨諏而靈跡欲求於顯著願因亢旱大霈甘霖既足既霑益廣及民之利至三至再即膺封爵之榮已削牘以敷陳冀垂休而昭鑒韓文公祝文惟公文起八代之衰道濟天下之溺屈臨此邦猶不鄙夷其民而訓迪之遂使遐陬同風鄒魯某被命此來敢不仰遵懿範一意作成以期文物彬彬之盛兹因祗謁敢控衷忱祭告土地祝文眷惟廟祧之所厥有里域之神屬兹繕修實資呵護庀工云始前告是宜後庵祈晴祝文大田多稼將遂有秋驟雨終朝浸成積潦恐三農之觖望仰二佛以投誠伏願以慈悲心出方便力現眉端一毫之相盡掃妖雲使鄞江千里之民同瞻佛日又三日為霖雖免旱乾之慮大田多稼適當成熟之時恐或浸淫必妨刈穫願軫慈悲之念曲垂覆護之私迄用康年毋以隂而以雨亦有高廩庶如櫛以如墉又零雨其濛恐妨刈穫先事而慮盍罄禱祈謹載啓於法筵願曲垂於終惠舉頭見日咸欣赫赫之光納稼如雲俾遂穰穰之慶獲感應奏謝祝文齊心滌慮屢致禱祈轉隂為晴已䝉應格幸免浸淫之患敢稽報謝之恭所欲必從行遂千倉萬箱之積自今以始更慶五風十雨之祥

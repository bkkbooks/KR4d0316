body:
  text: 東澗集卷五宋許應龍撰制皇叔祖奉國軍節度使提舉萬壽觀主奉吳王祭祀天水郡開國公多謨加食邑食實封制朕䖍修祀事㳙選吉辛天施地生丕展精禋之報祖功宗德並嚴升侑之容維時公族之英實相躬祠之禮宜敷惠術誕告昕庭具官某大雅不羣為善最樂制節謹度榮膺茸纛之華思孝奉先均佚琳宫之邃屬當大享克贊盛儀爰加多邑之封仍錫真畬之食於戲莫如同姓既先祭澤之頒綏我思成並衍蕃釐之介毋替厥命永孚于休皇叔祖檢校少保安德軍節度使提舉萬壽觀會稽郡開國公師潞加食邑食實封制朕㳙吉杪秋乘上辛之正氣肇禋重屋修邃古之盛儀惟時公族之英實相躬祠之禮爰均惠術敷告明庭具官某履行靖莊秉姿和粹度德定位已登亞保之班植纛建旄久處祠庭之佚肅雍顯相扈從彌勤爰加多邑之封仍衍真畬之食於戲賜齊侯之胙既加一級之隆揚召虎之休當繼萬年之頌往服成命踐修厥猷皇叔祖少傅保寧軍節度使充萬壽觀使師貢加食邑食實封制朕肇禋重屋茂舉盛儀見泰元之尊幸潜孚於鴻造眷宗室之老宜先被於龍光錫以命書告于列位具官某器宏識敏心正氣和植纛建旄均佚祠庭之邃二公洪化峻升亞傅之尊允為公族之表儀多閲天下之義理兹講合漠之禮實殫參酌之功爰廣舊封併加真賦於戲相豫肆祀既綽著於賢勞立愛惟親當首頒於祭澤其祗成命益衍蕃禧少傅保寧軍節度使判大宗正事嗣秀王師彌特授少師加食邑食實封制朕思治勵精以賢制爵明德以親九族久資董正之司洪化以弼一人盍畀褒遷之寵肆頒顯冊敷告羣工具官某典麗才華舂容氣度議論冠諸宗室聲名重於朝廷非劉氏不王已襲胙土分茅之貴於諸姬為近尤增建旄植纛之輝惟夙全信厚之資故特授訓齊之任屬當三載因考績以陟明晉拜亞師示尊賢而隆禮實踵棣華之舊典益高孤棘之新班申錫爰田仍加真賦於戲善於其職已隆公族麟趾之風時乃之休愈壯磐石犬牙之勢毋斁朕命勉迪令猷太傅保寧軍節度使充萬壽觀使永寧郡王楊石加食邑食實封制朕載涓剛日祗見明堂天地祖宗潔牲牢而合饗輝胞閽翟徹祭俎以均頒矧豫戚畹之英入護禁庭之重可無茂賞以奬賢勞具官某溫厚而謙恭疏通而樂易輝華節鉞登三公一品之班聞望圭璋為四姓小侯之冠動必循於法度習盡屏於膏粱屬届季秋相豫肆祀宸居密扈既殫雍肅之忱熙事告成盍舉褒崇之典爰加多邑庸篤懿親於戲錫申伯之田已沐湛恩之溥修廣國之行益延多福之綏兹謂爾榮毋替朕命金紫光祿大夫右相兼樞密使喬行簡加食邑食實封制朕載涓剛日祇見合宫天施地生丕展精禋之報祖功宗德並嚴升侑之儀惟時耆英實陪毖祀爰渙揚庭之號俾均拜胙之釐具官某謨明弼諧年高德劭期豫于治每思補過以盡忠克壯其猷首務安民而和衆內銷姦慝外固封疆致宗祀之熙成獲神歆之嘉况肅雍顯相端由左右之勤茀祿爾康宜錫褒崇之寵進封多邑申衍真畬於戲式典而靖四方益謹儀刑之念享天而有一德咸膺孚佑之休尚克欽承以永終譽資政殿學士太中大夫提舉臨安府洞霄宫崔與之特授正議大夫右丞相兼樞密使加食邑食實封制朕作新政化總攬權綱思德以承天心欲盡和同之妙奮庸而熙帝載當資輔弼之良肆選任於耆英俾協圖於極治誕揚明命敷告羣工具官某天為時生才不世出年彌高德彌劭挺然松柏之後凋事能應物能名炳若蓍龜之先見荐臨屏翰綽著恩威久安緑野之遊實係蒼生之望比少施於方略即潜弭於冦攘豫嘉乃勳亟圖重任胡屢陳於遜牘殊未體於至懷載惟國事之多虞正賴真儒之無敵內綏諸夏外撫四夷克壯其猷信無踰於元老爰立作相期共濟於巨川廣井邑之提封增賦租之奠食仍兼樞管峻陟文階於戲道德之威成安强豫欲振中興之業股肱之寄在忠力爾其殫叶贊之勤庶幾和氣之致祥永使萬邦之作乂勉思康濟庸副眷知保康軍節度使提舉萬壽觀臨海郡開國侯謝燮禮加食邑食實封制我將我享既祇見於合宫來下來崇宜永膺於多福敢私專鄉期與咸休矧豫戚畹之英可後徽章之寵誕揚渙號敷告羣工具官某行歸于周世濟其美致身通顯雖聨肺腑之親行已謙恭盡屏膏粱之習升華茸纛均佚琳庭兹因相事之勤盍侈受釐之錫爰加多邑仍衍真畬於戲福自已求已獲時歆之况施由親始當先祭澤之頒永孚于休毋替厥命賜安南國陳日煚特授靜海軍節度觀察處置等使特進檢校太尉兼御史大夫上柱國特封安南國王食邑三千戶食實封一千户特賜效忠順化功臣仍賜襲衣金銀帶制朕更新庶政奄有四方來獻其琛既展稱藩之禮渙汗其號盍加進律之褒庸侈湛恩以光要服安南國王陳日煚制節謹度和衆安民處黎氏之故封纘隴西之舊緒同文同軌夙慕華風來享來王久懷忠節不憚航海梯山之阻欲申望雲就日之忱附奏囊封底貢方物有嘉恭順可後褒崇植纛建旄升陟公台之貴分茅胙土便蕃使命之華畀井邑之提封衍賦租之奠食併加勳號益渙寵章於戲修德以來逺人既廣暨南之教率典而藩王室其堅拱北之心永孚于休毋替厥命史彌忠除寶謨閣待制特賜金帶一條制引年謝事每嘉靜退之風敬老尊賢特畀便蕃之寵以光晚節式渙明綸具官某心醇氣和量宏識逺弟昆擢第允同竇氏之聨芳中外交輝咸嘆西平之有子典藩則光宣於惠澤持節則潜弭於冦攘正資立事以建功乃遽辭榮而避寵久處祠庭之佚屢興宣室之思勉徇雅懷已遂掛冠之請晉升次對復疏錫帶之恩茂對殊休益綏壽祉俞建除祕閣修撰致仕制引年謝事必加優禮國家常典也矧中外踐更材德昭著可無寵渥以示褒崇爾譽冠時髦學通世務入居班列正直靖共出秉節麾公勤精練盍趣還於清著乃求佚於祠庭方興側席之思倐覽掛冠之奏勉從雅志晉升論撰之華爰錫明綸庸表始終之眷祇服朕命益介壽祺吕殊特授朝奉郎致仕制量材而授固宜䇿足於要津厥疾弗瘳遽欲掛冠於神武勉從雅志爰錫湛恩以爾學問淵深詞章泉湧聲早蜚於黌舍魁屢奪於文闈宜捷出而橫翔乃數奇而不偶甫入登於學省旋出贊於輔藩胡困沉疴力求謝事憫莫攄於逺業特晉陟於文階茂對時休益綏壽祉曾從龍致仕制運籌制勝方十乘之啓行引疾丐休忽一封之來上閔勞以事勉徇所陳具官某道德宗工倫魁重望早負經綸之志峻登丞弼之司進思盡忠善彌縫而藏用退不失正肯俯仰以隨時適更化以厲精圖任人而共治復登兩地密贊洪鈞被命視師威欲宣於沙漠憂邊思職疾倐在於膏盲既莫殫叱馭之忠姑許遂掛冠之請何恙不已佇膺勿藥之祥俾壽而昌尚介如茨之祉資政殿大學士光祿大夫提舉洞霄宫宣繒除觀文殿學士依所乞守本官致仕制尊賢敬老已申進職之褒引疾抗章乃上掛冠之請勉從雅志爰錫殊恩具官某名擅兩優道包衆有定而能應中不倚和不流公矣無私德可尊事可法晉登樞管參預政機同寅協恭善彌縫而藏用備內禦外每處置以得宜罔以寵利而居成功故能進退而不失正真祠久佚全節愈高圖任舊人冀獲老成之助洊陳奏牘胡為遜避之堅兹偶爽於攝調乃力求於休致噫豫嘉乃德爰晉陟於延恩俾壽而昌其永綏於嘉祉以光終始式表眷懷端明殿學士提舉萬壽觀兼侍讀洪咨䕫轉四官致仕制憫勞以事姑令橫帙于邇英惟疾之憂遽欲掛冠於神武勉從雅志爰錫徽章具官某特立無朋至剛以直十年去國嗟大道之莫容一旦登臺喜真儒之復用聳橫秋之鵰鶚無當道之豺狼掖垣銓曹瑣闥翰苑遍歷清華之選藹騰聲譽之休方資納誨以輔台倐爾抗章而謝事猶切憂國愛君之念力陳祈天永命之言允謂忠誠益深嘉歎特陟四階之峻庸旌一節之堅茂對寵榮以光終始鄭寅除直寶章閣致仕制大夫七十而致仕年未及而以疾自陳當憫其勞勉從所請俾遂掛冠之願爰疏錫命之恩以爾學廣聞多意誠心正厲特立獨行之操有難進易退之風屬當政瑟之調首被鋒車之召持衡銓選平允無私贊畫鈞樞剛方不屈暨司藩屏尤號循良胡染沉疴力求謝事肆加爾職以賁其歸勉護生經益綏休祉余嶸致仕制明綸荐播已躋聽履之班奏牘前陳遽有掛冠之請式遵彞典爰錫徽章具官某公爾忘私定而能應入持從橐屢殫告后之嘉猷出鎮帥垣蔚有得民之善政久處祠庭之佚每興宣室之思圖任舊人雖疊頒於召節晉升常伯竟莫造於明庭遂疏北闕之恩俾進西清之職胡為抗疏乃欲引年勉狥雅懷盍示尊賢之意以光晚節俾膺增秩之榮尚克欽承毋忘忠告李􅌫轉一官守同知致仕制追鋒迅召方側席以待賢剡奏上騰欲掛冠而謝事勉從雅志爰錫徽章具官某學為儒宗才周世用始終一節中不倚和不流揚歷兩朝年彌高德彌劭比以樞庭之重載宣蜀道之威突如其來適值陸梁之冦定而能應力圖捍禦之方正有賴於壯猷乃屢陳於遜牘閔勞以事遂疏趣覲之恩盍歸乎來庶獲嘉猷之告豈期嬰疾遽致為臣隆禮尊賢晉陟文階之峻考祥視履益延壽祉之綏賓州録參陳震降一資制刑者侀也一成而不可易故君子盡心焉爾為糾曺實司臬事不思審克苐欲奉承致使非辜莫伸寃抑劾章來上法豈可逃宜鐫一資俾知循省前知蘄州宋逢丑降一官制留州送使自有成式用踰其數法所必繩爾得雋右科踐歷滋久比繇賓閣出守蘄春雖殫備守之勞盍著廉平之譽胡因妄費致速煩言鐫爾一階昭吾公憲勉思清謹以蓋往愆李虎特降三官落刺史罷帶御器械制賞罰軍國之紀綱也茍非信必曷示勸懲爾屢著戰多遂膺隆委胡提兵而救援乃激變以紛爭劾奏上聞合加鐫黜當圖後效以蓋前愆鄒應龍加恩制天施地生丕展精禋之報祖功宗德並嚴升侑之儀惟時文昌實陪祀事既均敷於惠術盍寵畀於褒章具官某才擅無雙名推第一出藩入從已登常伯之尊避寵辭榮久處祠庭之逸然蒼生願起於謝傅而宣室興思於賈生屢膺召節之頒晉陟儀曹之長甫登清著即侍親祠逮熙事之告成廣湛恩而敷錫載加多邑以奬賢勞其益懋於逺猷用對揚於休命趙彥悈加恩制具官某風度嚴凝才華肆應不改其操挺然松柏之後凋自明而誠炳若蓍龜之先見經帷橫帙銓部持衡屬蕆祀於九筵實參華於五使迄成熙事敷錫湛恩晉升封爵之榮仍衍爰田之食莫如同姓既先祭澤之頒綏我思成益衍蕃釐之介往服朕命踐修厥猷李宗勉加恩制具官某學問邃深風規峻整持論若權衡之正不激不隨履節如金石之堅可尊可法遍歷諫諍抨彈之職峻登言語侍從之班立以執綏相豫蕆祀暨迄成於熙事爰廣錫於神釐欲奬賢勞肆封名邑其體寵光之渥益殫獻納之忠資政殿學士李􅌫加恩制敬老尊賢既進升於華職以德詔爵盍申錫於殊恩式渙明綸庸昭隆眷具官某量吞溟渤秀挹岷峨詞章後學之宗師德望清朝之標凖材何施而不可名弗求而自高國十為連屢宣威於戎閫王三錫命遂正位於天官洊躋書殿之穹班仍比樞庭之優禮進封公爵增衍圭田噫名位不同朕既加於異數謀猷入告爾盍罄於精忠茂對寵光以永終譽魏了翁加恩制具官某氣塞兩間學希百聖蹇蹇匪躬之節公爾忘私惓惓憂國之忠言無不盡晉躋右府大展壯猷式遄其行已宣威於督府渙汗其號俾入覲於昕庭胡洊騰遜避之章竟莫遂挽留之意暫處真祠之佚實勤宣室之思兹以受釐可忘錫祉肆進加於封爵仍申衍於爰田噫來下來崇豈朕躬之專鄉俾昌俾熾當與國以咸休茂對寵光益圖經濟授內官韓申範等加恩制榮居近要密總重難君上之恩渥則殊而人臣之敬思尤切其有端靜無失進退可稱而復以幹能彰於官業名隨位進行與才兼者不有異遷何示奬勸宣徽小馬坊使某潔矩操心溫潤成器剛而不暴柔而不回宣徽含光使某本於誠明文以禮讓止而不滯行而不流起宣徽南院副使某明見事情智通微妙光而不耀晦而不幽皆調金玉之聲並秀松筠之色至於績效實謂著明嗚呼守職奉公爾既盡其節矣崇階厚祿吾豈刓於印哉可依前件茂對寵休鄭性之除資政殿大學士知紹興府浙東安撫使制善斷善謀入任樞庭之寄維藩維屏出司帥閫之權中外雖殊眷懷則一具官某忱恂而直諒寬大而高明聲名滿四海之間德望冠羣公之表周旋兩地終始一心知無不言每務庇民而尊主粹然出正未嘗揚已以取名方資協恭而和衷乃力辭榮而避寵晉躋書殿庸昭體貌之隆渙發名綸俾鎮股肱之郡雖便大臣之均佚實令一道以䝉休噫勉為朕行當使㑹稽之增重不逺伊爾抑寬宣室之興思尚克欽承益攄經濟黎伯登除直煥章閣主管潼州路安撫制蜀道去天遼邈帥垣之寄責任匪輕非踐揚滋久望實素孚者曷稱其職以爾安恬不競詳練有謀入造班行咸推賢德出更麾節荐著休聲載惟瀘南素號重鎮矧值繹騷之警正資牧御之才采之僉言無以易汝肆遷邃閣俾任藩宣勉圖爾庸以寬憂顧資政殿大學士李􅌫除同知樞密院事四川宣撫使制克壯其猶宜任元戎之寄渙汗其號晉升右府之崇增重事權式符人望具官某年高德劭節徑氣和聲名滿四海之間文武為萬邦之憲載惟全蜀重遭彊敵之憑陵雖建制垣復命大臣而撫諭兹置宣威之任益恢御外之規庸陟副樞以昭隆委既恩信之素著必處置以得宜噫屬老臣勿以為憂當有萬全之計用真儒而焉得削佇收無敵之功永底敉寧以寬憂顧權工部侍郎徐清叟除集英殿修撰知靜江府廣西經略安撫使制荷囊持橐方入造於從班宣化承流姑出分於戎閫肆加爾職以寵其行具官某學造淵深氣全剛大有是父有是子俱著聲名難為弟難為兄交輝中外已振激揚清濁之職晉登論思獻納之司力避寵榮暫循更迭然興思於宣室尋趣侍於甘泉胡復懷勇退之心竟莫遂挽留之意升華祕殿作屏帥垣知無不言既善盡忠而補過施於有政必能以道而得民勉務拊綏以寬憂顧李華直徽猷閣湖南安撫使制自湖以南地邇蠻徼鎮撫之任必賴長才以爾質秉剛方資兼文武隨機應變屢奏膚公奉使典州藹騰休譽肆升邃閣擢鎮帥垣理民馭軍備內禦外使冦攘影滅而郡邑堵安皆爾所已試者益圖來效以副深知趙師楷直寶章閣廣東經略安撫制自廣以東凡十四郡悉𨽻帥垣事權至重欲稱維藩之任必資已試之才以爾標的宗盟被服儒雅踐更中外所居見稱昨將漕於五羊嘗攝承於戎閫內給餉餽外弭冦攘一道堵安厥績甚茂今兹謀帥無以易汝爰升邃閣以寵其行威望素孚當不勞而治矣往服厥職嗣有異恩陳韡轉兩官除閣學依舊建康府江東安撫使兼沿江制置使兼淮西制置使行宫留守制護長江之險未究壯圖兼邊面之權式昭隆委肆加恩渥庸示眷懷具官某徑氣橫秋精忠貫日識微見逺至能應來能名整師修戎攖者摧觸者滅自司留鑰屢奏膚功已殱京口之逆儔復抗敵兵而鏖戰論功行賞遂疏北闕之恩進職遷官并總西淮之寄既事權之增重而威望之素孚立致安彊以寬憂顧趙善湘依舊資政殿大學士知紹興府浙東安撫使制大邦維屏甫資綏御之方十國為連易畀藩宣之寄事權增重簡眷彌隆具官某善斷善謀允文允武施無不可真所為王佐之才卓爾不羣豈特藹宗英之譽曩司制閫久閲歲華出六計之竒指授將帥决千里之勝勦滅渠魁肆升書殿之華仍視樞庭之秩真祠均佚宣室興思雖蜀道之行不憚於王尊而渤海之安莫如於龔遂暫煩鎮撫復命保釐噫式遄其行庸壯維城之勢不逺伊邇實同衣錦之榮盍展壯猷以稱朕意袁甫依舊寶章閣待制知福州福建安撫使制求禮樂詩書之帥方切疇咨非言語侍從之臣曷當隆委克稱厥職宜莫如卿具官某學深道原才周世用褎然為首聲名滿四海之間知無不言氣槩出羣公之表清華遍歷進退兩高宣化承流雖屢頒於成命辭榮避寵乃荐奏於封囊載惟全閩素號樂土八命作牧正需綏馭之才十國為連俾任藩宣之寄况嘗兼於漕節已備悉於民風諒善推其所為當不勞而自治其祗茂渥庸副至懷王遂除四川制置使制戎閫係於安危當求禮樂詩書之帥朕心為之憂顧特輟言語侍從之臣爰錫徽章晉升次對具官某身兼數器望重羣公有能定能應之才負至大至剛之氣峻登言路力振朝綱擊搏何心縱橫秋之鵰鶚姦邪禠魄無當路之豺狼擢置二卿正圖大任屬坤維未臻於奠枕而制垣正藉於協謀暫煩王尊叱馭之勞期底諸葛理民之績能勝其任豈嫌蜀道之難式遄其行當使雪山之重其思康濟用副眷懷趙葵除端明殿學士淮東制置大使制整旅伐戎喜見敷功之奏揚庭孚號荐頒異數之榮以穆僉言式昭隆眷具官某忠誠貫日氣節橫秋善哉充國之知兵信矣西平之有子久司制閫綽著威聲屬安豐遭黠冦之侵凛然難保逮幕府遣精兵之援莫或敢攖亟收三捷之功即賜十行之札雖已躋於常伯未足報於殊勳端殿升華使名加大俾復青氊之舊仰振家聲佇清紫塞之氛益强國勢欽承豫命嗣有異恩杜杲除兵部侍郎淮西制置使制整師修戎已殄陸梁之冦論功行賞可無優異之恩宸命誕揚師言允穆具官某忠於謀國勇不顧身昨守邊城屢排鋒而挫鋭暨分制閫復先事以預防鑿斯池築斯城敿乃干􅙀乃胄惟內治之既固豈外敵之能侵突如其來意謂摧枯而拉朽凝然不動乃能應變而隨機雖相持至閲於數旬而鏖戰竟收於三捷大築鯨鯢之觀大肆貔虎之威豫嘉乃勳晉陟二卿之職爵以勵世復加峻秩之榮仍正任於使華俾專司於戎閫益圖偉績嗣有殊恩趙彥訥除煥章閣學士依舊四川安撫制置使制制閫疇庸已正二卿之位昕庭渙號復升學士之班增重藩宣益隆眷倚具官某詩書元帥禮樂宗英至能應來能名潜攄妙算排其鋒挫其鋭屢奏膚功屬邊境之繹騷提孤軍而捍禦灰飛强冦枕奠坤輿豫嘉乃勳遂真除於武部徒得君重仍因任於制垣載疏北闕之恩申錫西川之職惟聖人能無外患孰與圖功而元老克壯其猶正資協力勉思康濟以寬顧憂史嵩之除淮西制置使沿江制置副使兼知鄂州制扶風馮翊方資藩翰之功邊境要衝尢賴捍防之力蓋理內當嚴於御外而制難惟在於得賢具官某望聳萬夫身兼數器能定能應規摹自得於胸中惟幾惟深韜略不專於紙上矧十載勤勞於疆埸而三軍思慕於恩威載念西淮密鄰敵境瞻言鄂渚實控上流非制閫之得兼恐事權之難一徒得君重勉為朕行師克在和尤貴并謀而合智事難預度要當應變以隨機皆爾優為奚煩多訓鄧泳除太府丞兼知鄂州制鄂渚控扼江面實為要衝儻非智略之長曷稱藩宣之寄以爾清修儒雅詳練精明文武兼資無施不可邊陲十載備歷艱勤制幕疇庸荐疏渙渥大邦維翰咸曰汝宜肆升外府之丞爰錫左符之命仍參籌於督府庶益壯於長城勉立殊勳以稱朕意杜杲除太府卿兼淮西制置兼知廬州制載惟西淮實繫衝要必威名之夙著庶處置之得宜以爾允武允文善謀善斷久宣勞於疆埸每有志於事功比鎮安豐適當强敵厲兵備禦極力勦除城壁賴以安全强鄰為之震攝雖亟加於褒律未足報於殊勳疏寵而畀制垣遷秩而長外府庸示便蕃之渥其殫牧御之方勞來流移謹固封守以恩威而相濟俾兵民之俱安蓋爾所素明者益圖偉績嗣有異恩李華除江西提刑兼知贛州制節麾兼任其責匪輕非才周世用隨試隨效者曷膺兹選以爾允文允武善斷善謀作屏鄞江民安盜弭觀風東廣吏戢兵懷惟爾之能無施不可易畀西江之節仍分章貢之符思患預防恩威兼濟使姦宄不作而田里相安皆汝所素明也勉圖來效嗣有異恩楊恢除太府少卿兼潼川利路制置副使兼利路運判兼知利州制一身而兼數職最號劇煩非才周世用屢試有功者蓋不輕畀以爾資兼文武識炳眇綿應變隨機恢乎餘刃欲求禮樂詩書之帥往鎮西陲采之公言無以易汝肆升卿月晉二制垣郡寄計臺併以命汝其任固不輕矣備內禦外理民馭軍使調度不乏而暴亂潜銷則豫汝懌其祇成命益展壯猷楊恢除寶章閣待制四川制置使兼知利州制惟爾之能宜副元戎之職其猶克壯盍專制閫之權復錫明綸以昭隆委具官某資兼文武識炳眇綿思患預防益固黃岡之勢隨機應變潜銷紫塞之塵晉陟列卿肅將使指屬三路重遭於紛擾非一賢孰任於驅攘特升次對之華盡總西維之寄外禦其侮當為折衝强本之謀遹觀厥成庶底和衆安民之績勉思經濟以寬顧憂陳晐除沿海制置使兼知慶元府制尚書喉舌之官夙資出納河東股肱之郡今賴藩宣允穆師言肆頒渙號具官某才周世用譽冠時髦久宣制閫之威潜攄妙算隱若長城之衛坐折遐衡遂膺召節之頒晉陟文昌之位暫從均佚殊鬱壯猶念四明實控於要衝在三輔夙稱於巨鎮徒得君重庶幾善政以得民勉為朕行冀使京師之䝉潤亟圖治最以副豫知史巖之除太府卿兼知臨安府制外府任貨財之職京兆司彈壓之權於二者而得兼非大才而曷可以爾靖共而和粹精敏而疏通外則馳計臺帥閫之聲內則稱銓部蓬山之職宜晉升於卿月俾兼鎮於神臯然受藏出納之司不難鈎考而衆大浩穰之地尤賴藩宣必勤敏以無私而寬嚴之相濟庶豪猾不容於私撓而兵民各遂於相安爾所優為奚勞多訓李壽朋直顯謨閣知太平州制當塗素稱道院事簡民淳法從重臣多均佚於此然控扼江面實為要衝思患預防誠不容緩能勝其任必賴通才以爾禀資雋敏臨事激昻分閫典藩究心兵略厥有成績所居見稱久鬱壯猶興思宣室晉升邃閣俾任藩宣以昔日之規摹為此時之捍禦佇觀來效嗣有異恩李昴英直祕閣知贛州制章貢素號雄藩比年以來緑林屢警殊費捍防必資隨機應變之才庶底和衆安民之績以爾鼎魁重望實德醇儒再入周行荐膺清選雖禁闥當用於汲生而渤海尤資于龔遂晉升邃閣出鎮大邦昨贊畫于帥垣克平羣醜今往膺於郡寄必有壯猶勉務拊綏以寬憂顧陳塏直寶文閣江西安撫制置使知江州制國十為連允謂重任王三錫命遂畀兹除以爾直哉惟清定而能應運籌决勝盜息民安宣化承流刑清訟簡隨試輒效所居見稱載念帥垣實任撫綏之寄至于江面尤關要害之衝非爾長才曷稱兹職爰升華於邃閣俾克展于壯猶茂對殊休勉圖偉績

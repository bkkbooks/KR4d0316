body:
  text: 東澗集巻十三宋許應龍撰論民兵論李抱真為懐澤潞觀察留後凡八年籍户三丁擇一蠲其徭租給弓矢令閒日習射嵗終大閲第其能否而賞罰之三年皆為精兵得二萬人既不廩於官而府庫實遂雄山東矣李徳裕為鄭滑節度使徙劒南西川至則率户二百取一人使之習戰緩則農急則戰謂之雄邊子弟良以民兵可用勝如官兵盖邊陲之民耳稔乎鉦鼓之聲目熟乎旌旂之容迫近敵境而間探素審從事鞍馬而弓矢素精因其所素習而教閲之亦其所樂趨者况又激之以犒賞孰不知勸兼屋廬妻子皆欲其保䕶其自衛之計尤切今為之糾合使之捍禦非特國之利亦民之利也故民兵之用尤為得力若夫出戍之兵雖給之生劵而居非其鄉有思歸之念無勇戰之心驅之使前雖不敢避然一聞少衂棄甲而潰尚何望其用命哉李抱真昭義步兵足以制山東之變李徳裕雄邊子弟足以捍南詔之强其成效大驗盖可攷也為今之計官兵固當激厲使之精鋭而民兵尤宜糾集然區處民兵要必有法蠲其力役而使之安教以技擊而使之熟擇其精鋭而重賞之則感激而思奮統以縂率而督䇿之則緩急之足恃抑有所當察者出戰則民兵當其鋒勝捷則官軍争其賞既無所獲誰肯効力是以雖有民兵之名而未底安邊之績者其患實繇於此必於奏凱之際為之分别官軍有功則賞官軍民兵得勝則賞民兵所行既公其誰不服但州縣之吏尤當戒其侵擾使平時既失其心則警急曷望其助知此數弊為之處置則孰不樂為吾用比者官軍間有敗衂闕額未補若就沿邊招募於勢尤便盖其人精强又習戰鬬使之戍守不惟省生劵之費又且無調發之勞一舉而兩得實因時施宜之長䇿也惟在制閫者善為區處行見邊疆固而國勢强矣序玉堂集序文章經國之大業政化之黼黻其所繫盖甚重也然辭尚體要不惟好異奏議宜雅書論宜理詩綺靡而頌炳蔚銘温潤而箴頓挫其體固自不侔乃若制誥則又所以導達徳意使萬民和悦而感戴言必洪雅辭必温麗坦然明白不匿厥㫖然後足以鼔動天下茍辭尚艱深意或隱晦則何以使癃老之夫扶杖而願觀武夫悍卒感泣而思奮哉翰苑之職昔人謂非文章不可為然居其選者最難其人必純厚明切如元稹體要典麗如裴度辭㫖豐美得中和之氣如景先庶可追典誥之風而當絲綸之任少師陳公其有得於此乎學廣聞多才髙識逺研精覃思於宏博之科一發中的繇是而膺玉堂之選作為詞章動合典則純乎若圭璧之無瑕鏗然如宫商之中節播告之辭則深切著明曲盡事情除拜之制則温潤典雅黙寓規戒表疏宣答之類則其事實其意婉豐不餘而約不失今觀先皇帝踐阼之初發號施令㒺有不臧聳動一時之觀聴而丕應徯志者豈非斯文之力歟然文章特公之餘事耳盖有徳者必有言公外寛而内明氣和而心正修身踐行則中而不倚好賢樂善則休焉有容以一念之真誠結九重之簡眷可謂上不負天子下不負所學矣豈非盛徳之至者乎故形諸著述粹然一出於正兹又有以見公之全美殆不止於詞章而已吁徳盛者其後必大端明元樞以奥學雄文得雋詞科聮輝華萼而代言鼇禁復世其官使兩朝之號令文章前後輝映固足為北門之偉觀基命宥宻協賛廟謨行將偃武修文以化天下功業日新少師益有光焉某竊窺傑作如獲拱璧不敢秘藏刋于鳯城俾廣其傳以為天下之模楷文到任勸諭文當職被命來守是邦爰咨爰謀欲蘇民瘼冦攘甫息閭里粗安因時施宜盍先摩拊自初入境訟牒紛如猶未交龜豈應受理復慮寃抑無以自通徧取而觀因知疾苦撰造詞理誣害善良發擿陰私欺騙財物白詞追擾妄狀牽連凡此等詞十居四五此州風俗本自淳龎祇緣譁徒教唆煽惑黠胥猾吏並緣為姦逮繫誅求椎肌剝髓含寃負屈寧免互調展轉相攻遂成健訟視事之始首當辨明一是一非平心予决痛懲妄訴姦慝自消庶幾民風復歸忠厚尚期胥吏惟理是循訟不可長過無憚改清心省事樂詎可量外此弊端已知纎悉更須審訂以次施行心本無私政期盡善儻有便利尤所願聞初至潮州勸農文來爾父老聴太守言閩淛之邦土狹人稠田無不耕固不待勸潮之為郡土曠人稀地有遺利不容不勸被命此來首諏風俗竊知地多魚鹽民易為生力穡服田罕務蓄積時和嵗豐固無乏絶年或不登仰給循海比者隣封冦攘竊發適值荒歉穀價頓増近雖順成所積能幾盍廣墾闢使可耕之地悉為菑畬則粒米狼戾如坻如京雖有旱澇自無匱乏况禮義生於富足衣食既充盜賊自弭爾其更相教詔毋狠于鬬毋嚚于訟安居樂業以成和順輯睦之風乃若黠胥姦吏害爾民者太守當痛懲之良法美意利爾民者太守當力行之况戢科需省徭役振困乏此太守之夙心也是究是圖冀復斯語其毋曰牆壁之虛文次年勸農文一夫不耕或受之饑農固所當勸奪其民時不得耕耨農尤不當擾此邦土曠人稀地有遺利勸相之方真不容緩然勸之意雖勤擾之害未革則莫遑安處欲耕得乎迺者視事之初穡事方興鄰冦繹騷輿論紛然欲鳩保伍爰咨爰謀恐妨農務第調禁卒控扼要衝迫近冦境始令糾合以助捍禦復罷科需蠲工役戢追擾懲誣訴涓埃無撓俾一意耕墾迄用康年家給人足田里熙熙揆厥根源基於不擾今春和時重舉舊典勸課有文不復繁述太守當行恤民之政不替厥初爾民當思力穡之效圖惟厥終上下相安和氣召祥時雨時暘復如舊嵗則進業日登其樂奚窮尚恐利有未興害有未除耳目之所不暨者毋憚來告當為審處期於便民今乖争寖息訟獄頓稀豈教化能遽轉移盖禮義生於富足更冀父老胥告胥訓申孝弟而修忠信以成和順輯睦之風豈不休哉代勸農文閩嶠郡八鄞江介在一隅山叢水淺舟楫不通民所仰食不出郡境時和嵗豐僅以不乏一或少歉旁郡穀粟釡鍾莫致細民艱食率多轉徙竊發之虞故此邦力田之務尤所當急比年薦登粒米狼戾稚耋按堵冦攘屏跡爾民亦既享力穡之利矣矧今風雨時若土膏脈起爾父老其帥子弟于耜舉趾是穮是蓘人力既至地利必倍茍惰農自安則滅裂之報雖悔何追今太守出郊躬行勸相爾民勿以為故事而聴之藐况太守蒞事以來禁遏嚚訟蠲免宿逋胥吏蔑追呼之擾田里絶力役之勞是農時不奪而農力不困矣一意耕耨迄用康年使家給人足以修孝悌而興禮義顧不休哉跋學田跋郡給田贍學學刻石以紀兹舊典也環峙森列歴歴可稽捐私帑而置未有鄒侯若者侯屬意教育超軼今昔廼者捐金之始諄諄面諭以剏邸宇掠僦金不若菑畬之安且久地遥多逋土瘠易歉又戒以擇負郭膏腴市之深圖逺慮委曲詳盡兹不亦仁人之盛心庠序之殊遇乎今所殖者地邇而租豐亶可裨廩稍傳永久大書深刻俾青青子衿顧瞻咨嗟以無忘莫大之徳易曰觀頤觀其所飬自求口寔觀其自飬盍亦自飬以副所飬則游泳其間者可無恧矣又捐閒田以贍學諸郡皆有別駕而為兹舉者林公之前未聞焉盖公尊賢重士出於天性以兩科得雋薦典芹泮作成譽髦増羡廩給四明富沙交口稱頌今雖展驥治中於學校尤屬意尊先聖則飾簾易㦸禮諸生則設醴餽金復因民請荒萊拘其租入屢以畀學青衿感戴請誌諸石某謂公賛貳此邦亷明平恕諸臺列剡去是而羽儀於天朝也不逺矣廣厦萬間將以庇天下寒士俱歡顔豈但汀庠䝉賜而已記戸曹㕔記視漏不苴忽傾不支居公宇者大概然也求其不洿不毁時葺時理者十不一二焉矧曰其有能畢力營剏不為已而為人如趙君之宅心宏大者乎戸曹廨宇始剏嵗月漫不可考其重建則淳熈四禩也堂庭卑隘椽棟撓折上雨旁風無所障盖其來久矣三衢趙君以妙齡擢第來處兹宇休焉息焉而不以陋自厭獨念閲文史㑹僚寀不可無所於㕔左隙地營一室扁以深容他悉未暇葺曰予得兹足矣既而郡侯鄒公剡奏于朝易寘推幕尋遷宏宇復喟然曰吾雖獲安於此而舊㕔將圯不為更新繼至者何所休焉遂捐已俸市木石陶瓦甓計工役為費不貲郡邑聆而韙之競揮金以佐用於是涓吉相方前指後畫謂昔門面北㕔靣西堂庖面東南委折顛倒不中凖式乃撤亭鑿墉轉而南鄉規模宏敞形體端直更舊門為櫺以便覽觀葺舊㕔為亭以供燕娱工既訖集同寅而落焉酒酣或執爵而言曰昔叔孫所舍雖一日必葺其牆屋左氏特書以著厥美今趙君鼎新舊宇以惠後人其績尤彰彰焉而漫無紀述亶為缺典某謂此直君之餘事耳君智足以造謀才足以集事文足以飾吏而又輔之以端方沈厚之質憊心疲神宻賛郡政凡有可以便安於人者行之剛果不俟終日其經畫締建宜如此其宏且敏也衆曰然請刻于石使來者得以觀焉漳浦橋記南浦臨漳之巖邑也去邑郛五里鼇峰瑞巖屹若對峙中横鹿溪演迤泓涵往來病涉紹興間邑士楊造林正中始剏石梁閲嵗滋乆東傾西潰嘉定六禩竟圯於洚水寓公南安尉黄君克寛三山理掾陳君縡共謀重剏雖更迭宦游而解組來歸必拳拳疚心焉或拉耆艾捐金以倡始或命浮屠作偈以勸施銖積寸累前規後畫以迄于成於溪之東改甓舊路五百丈以隔沮洳於橋之南肇建新亭三十楹以便憩息經始於甲戌之秋畢工於甲申之夏如虹斯垂如翬斯飛闔境耄倪顧瞻咨嗟願刻石以記適黄君造朝以予同登且嘗侍先君宰兹邑遂以見屬某曰偉哉君之是役也昔薛惠為彭城令橋梁不治薛宣知其不能今君里居乃能經營締創以為無窮之利行宰鉅邑必將推此以平其政民之被賜胡可既乎雖然是橋之建不特為山川竒觀而人才之盛實係焉邑有舊䜟謂鹿溪平出公卿通人行狀元生昔人以鹿溪名橋意盖取此後有易其名者自是人才湮鬱嵗在癸酉黄君復以溪平名之是秋即有褎然為薦首者繼而橋成則與計者八擢巍第者二亭成則登鄉書者六捷禮闈者三皆向所未覩者雖䜟緯之言茫昧難信然事有適相符者是亦可異也已繼自今其益修人事以應之則異才輩出紛綸華耀當有以叶昔時之䜟又不但若是而止願相與勉之繁昌縣學記繁昌邑庠肇於慶厯迄今幾二百禩其地則始在縣治之南尋遷于東復遷于東北隅或因燼而剏或因敝而脩比嵗以來邑計窘匱遂不復葺三山王公來蒞兹邑首謁先聖循行學宫視其殿則傾東潰西視其堂則上雨旁風廊廡圯毁庭除榛蕪公嗟吁良乆亟欲新之而宿逋溢萬無以為資朞年政成則用漸紓迺市木石迺陶瓦甓迺屬匠役倚周簿􅀈董其事前設櫺星次植三門旁置翼屋殿之間三堂之間五齋之間十有八至於庖湢亦㒺不具環以垣墉凡百有十丈經始於乙夘之夏訖功於庚辰之秋宏敞峻潔頓改舊觀祀器尚缺復新剏制共縻米百石有竒錢一千一百緡有竒學廩素微贍給慮嗇復嵗増緡錢四百米石百有二十俾青衿肄業其中月有書季有攷於是闔邑譽髦族觀聚歎願得文以誌諸石走介來請余謂僖公修泮詩有其歌文翁興學史有其賛郡國之大財豐而用足其力固易為者猶使人詠歎無斁矧地儉于百里復承公私赤立之餘迺能經畫締紉其事為孔艱焉是烏可以無紀况今之為邑者茍以辦治聞則獻羨餘以希進飾庖傳以稱客否則以封殖其私留意於庠序者盖罕焉今公舍彼為此不曰賢乎一宜記間有興學者又第飾美觀賈虛譽而教養不立今公乃豐其儲而課以藝或城闕無佻達之譏環佩獲漸摩之益二宜記邑之秀民不利於南宫數紀矣今是學甫建而登桂籍者即有人焉茅拔茹連當自兹始三宜記至於修壇壝新倉庾葺杠梁表閭巷又特其餘功耳盖公廉勤練宻訟理而政平縣計既裕遂得以為脩舊起廢之舉善最藹聞趣召不逺使嗣是者毋替其成又從而増益之則邑之䝉賜其可既乎永和堤記運河有塘衣帶淛水自帝都東北橋鎮薄吴頭楚尾緜亘千餘里闗提封者六州帶主筦者十縣仁和首當其一郵遞輦運憧憧旁午惟永和堤阻鼎湖白龍潭之險夘風湍流朝夕鼓蕩一有殘溜則膏腴數百頃瞬刻就浸欲經乆不拔是豈一日一人之力哉邑有范任二君倡為義役乃悉心討究謂土力屢潰于成也於是率衆僦工築以石樁以松迄成二百五十丈為錢數千緡范君為費獨當什伍董視犒賚尤詳焉傍築道民庵給伏臘俾早晏巡徼事無疑慮整如也肇始於紹定己丑之春告成於是嵗良月之望民間曽無勞動之苦公家坐收興築之利談何易哉堤成請記顛末余嘉其賢勞且諗對曰自令之尹吾邑也無横斂暴賦以蠹民繇是吏日貧而民日富既有餘財矣無深刑酷罰以殘民繇是役益簡而生益蕃既有餘力矣及今閒暇率就斯役用答令徳故輸財而不知費盡瘁而不憚勞令不吾强也余亦欣然而思以謂總總而羣雖各有心其于于望望未嘗不基於寛虐之政廉汙之操雖令不從與不賞而勸者抑豈無故哉今范令尹光世濟其美連躋科級以儒道字民澤最深矣始終不擾與民相安宜其一鄉之善如范君學諭武任君學錄安世毅然以身任其責也吁佚道使民雖勞不怨凡領民社之寄者何獨不然豈真仁和之長獨擅其美永和之士勇於為義耶故書紹定庚寅陽月吉記

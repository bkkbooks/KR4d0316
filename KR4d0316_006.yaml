body:
  text: 東澗集卷六宋許應龍撰制呉淵除寶章閣直學士知太平州制載惟當塗夙稱道院其在今日實為要衝匪頼隨機應變之才曷盡思患預防之計具官某疏通無滯剛毅有謀隨所至以有聲蓋無施而不可剖符巨鎮善政以得民心持節行臺給餉不絶糧道擢從次對正陟貳卿念南徐既著於勲庸而采石尤資於備禦疏恩北闕改司藩屏之權寓直西清庸示褒遷之寵益懋乃績以副予知呉淵除戸部侍郎淮東總領知鎮江府制給餉不絶既騰辦治之聲有功見知可後褒遷之寵肆頒渙號以穆師言具官某識敏而明氣剛以直藹然譽望既表表以出羣措諸施為尤多多而益辦入則為羽儀於班列出則著勲績於節旄戢吏愛民允稱宣化承流之職理兵足食務為折衝强本之謀予嘉乃勲用錫爾祉俾為真於民部庸增重於餉臺仍兼藩屏之司益壯安强之勢徒得君重冀寛憂顧之懷益圖爾庸嗣沐便蕃之渥趙以夫除右文殿修撰樞密副都承㫖知慶元府主管沿海制置使制朕惟鄞城巨鎮海道要衝匪資隨機應變之才曷任御衆牧人之寄以爾佩服儒術標的宗盟使節州麾隨試輙效卿寺省闥所居見稱暨恊贊於樞庭益潜攄於妙畧屬兹謀帥無以踰卿躋導㫖之穹班仍陞華於祕殿徒得君重以寛憂顧之懷勉為朕行亟底拊綏之績課最來上恩渥何涯李大同除寶謨閣直學士知平江府制載惟姑蘇甲於西浙人稠地廣夙稱富庶之鄉事簡俗淳當尚中和之化欲使十萬户之䝉福必資二千石之惟良具官某老成典刑剛方直諒自登表著徧歴清華由言路而至文昌杜私情而執公法遽循更迭出任藩宣爰進職於西清俾分符於左翊以儒術而飾吏蓋所優為推善敎以得民佇聞治最欽承予命益展壯猶史宅之除待制知寧國府制剖竹分符方畀藩宣之任疏恩易鎮式昭委寄之隆具官某稟性謙和禔身端謹世濟其美徑躋持橐之班父敎之忠備識蒞官之法欲詳試近臣之政遂令佩太守之章改畀潜藩俾膺近次其勉圖於治最庶益振於家聲余天錫知福州制均佚祠庭已屢更於歲籥興思宣室肆擢鎮於帥垣式渙明綸庸昭隆眷具官某謙和而忠厚信敏而疏通七載立朝徧歴清華之選八命作牧載宣彈壓之威自辭常伯之班乆戢壯猶之展今予命汝往司屏翰之權祇服厥官茂著撫綏之績佇聞善最嗣有異恩李曾伯知岳州制岳陽為郡當上流之要衝思患預防非通敏長才曷勝其任以爾究心謀略有志事功乆歴邊陲備嘗險阻列屬戎監贊畫帥垣善應變以隨機可牧人而御衆爰畀藩宣之職仍兼節制之權勉著勲庸以寛憂顧俞垓知安吉州制廉吏民之表也承流千里茍得人而用之則其身正不令而行矣以爾議論識見蔚有父風和粹靖共根於天性總司舶市人服其清遂迭畀於郡符旋擢陞於朝列由司匭而至郎皆稱厥官載惟輔藩當擇良吏肆以命汝孰不謂宜節用愛人興利革弊蓋爾所素明者課最來上恩渥何涯趙汝柄知嚴州制嚴陵密邇京都素號望郡非朝紳之有聲績者不畀也由别駕而升允為異擢以爾强敏疏通優於吏治例條關决綽著聲稱晉秉州麾仍兼泉監其委寄蓋不輕矣正身帥下薄斂省刑檢察吏姦使無病吾民則予汝嘉往究乃心以圖報稱劉煒叔知泉州制溫陵大藩民繁事夥蠻舶萃聚財貨浩穰茍非公亷練達之才曷著牧養阜通之績以爾美由世濟學本家傳踐更百為精勤一意廬陵善政靡人不稱晉陟郎闈庸示褒寵載念南土寖不逮前整頓一新正資敏手疇咨輿論咸曰汝宜往服厥官以稱朕意劉震孫改知安吉州制霅川去天尺五湖山清秀人物阜蕃為浙右佳郡非廷紳之有資望者不畀也以爾毓德名家敏明直諒立朝以來屢進忠嘉省闥彌綸寖階顯用欲奉親而丐外爰錫命以分符戢吏愛民省刑薄斂使田里相安而無愁歎怨恨之聲則予汝懌課最來上嗣有異恩韓休卿知融州制朕篤近舉逺一視同仁至於嶺嶠之遥亦遴循良之選以爾元勲之裔四紀官塗三佐侯藩晉參議幕調兵禦冦贊畫宣勞擢守玉融庸示褒寵布宣德意使遐陬之氓如在畿甸則予汝嘉往究乃心以須選表陳滌知宜州制宜山去天遼邈廹近蠻獠民弱而貧非循良之守鎮以清靜曷安其生以爾毓秀名家疏通詳練踐更滋乆所居見稱肆觀爾能擢守南土布宣德意使斯民受賜如在畿甸則為稱職課最來上朕不汝遺魏了翁知紹興府制不見賈誼方興宣室之思爰命君陳往任東郊之尹益隆委寄庸示眷知具官某間世真儒斯民先覺以學問淵源之邃為黼黻河漢之文惓惓憂國之忠無言不盡蹇蹇匪躬之節所守彌堅甫晉陟於樞庭即宏開于督府趣還廊廟莫遂挽留旋畀藩宣復堅遜避然大賢之去就係四海之觀曕載念㑹稽密邇王室徒得君重庶帥閫之增輝勉為朕行冀京師之䝉福雖暫勞于鎮撫行大展于經綸尚體至懷亟祗成命王遂知平江府制用之則行方叱西征之馭引以自近復分左翊之符宣王化以承流庶京師之䝉潤具官某定而能應直哉惟清惓惓懷憂國之忠蹇蹇厲匪躬之節施無不可豈惟振職于憲臺事豈辭難尤欲宣威于制閫遐不謂矣朕深念之與其勞十乘以啟行孰若易一麾而出守使見日覺長安之近無登天嗟蜀道之難茂對殊休勉圖治最王琮知常德府制武陵巨鎮兼四郡甲兵之事其責匪輕必長於牧御者始堪其選以爾究心謀畧有志事功仕於邊陲諳歴已乆雖列屬戎監贊畫帥垣然未盡于長才復擢司於名郡其思報稱勉著勲庸袁申儒知寧國府制宣城巨鎮民物浩穰非明敏長才踐敭滋乆者莫勝其任以爾通今博古下筆成章尤决勝于漕闈竟收功于儒級奏使節州麾之最贊樞庭督府之籌雖陟列卿阻還清著載念藩宣之寄盍資通練之儒爰錫綸恩俾宣德意勉圖善最嗣有殊榮趙希塈改知嘉興府制霅川之政方以最聞避寵引嫌毅然求去勉從雅志爰錫明綸以爾公族之英安恬有守甫登朝列出典輔藩節用愛人正身率下絲毫無擾田里相安剡奏丐閑已嘗諭㫖俾令終秩云胡不留需次嘉禾以全高節益培逺業庸副予知呉潜改知平江府制渙汗其號正陞法從之穹班我圖爾居無若姑蘇之巨屏欲示優賢之意肆疏易鎮之恩具官某名冠羣英身兼數器總餉則不加賦而足用典藩則有善政以得民振戎事于兵曹贊廟謨於省闥方罄朝夕論思之益姑循内外更迭之規以寵其行俾即真於起部不逺伊邇庶䝉潤于京師矧屢試以有功當不勞而自治佇聞善最嗣沐殊休賈子諟知成都府制巴蜀去天遼邈將欲宣德意而抒下情實頼賢守其於選擇尤不敢輕以爾學本家傳美由世濟宰邑佐郡俱著休稱暨典邊城究心捍禦安于靜退均佚琳宫載惟潜藩方資牧養疇咨已試咸曰汝宜往服厥官勉圖政績善最來上恩渥何涯劉端友知遂寧府制武信乃西蜀之巨鎮重臣法從多均佚于此繇麾節而除者蓋異渥也以爾祖父世篤忠正思其人猶愛其木况子孫乎幸有象賢挺挺風烈擢分帥閫庸示寵嘉𤓰期尚賖慮淹逺業復頒渙渥易鎮名藩推善政以得民以儒術而飾吏蓋爾所已試者宜疾其驅以寛憂顧韓括知肇慶府制端溪潜邸也實嶺南之望郡比遭冦攘近甫安集拊摩惠養正頼循良以爾名臣之孫踐更滋乆倅貳潮陽寛慈平易今守兹郡密邇舊封閭里戚休知之審矣遏絶嚚訟檢察姦胥俾母病吾民則為稱職課最來上朕不汝遺高定子除軍器監依舊江東轉運副使制有功見知則說此四牡勞使臣之詩也朕嘗三復斯言謂將指于外茍有勞績而無以旌别之則何以作其趨事赴功之心乎以爾擢秀儒科杕華輝映侯藩郎省所居見稱乆典將輸公勤亷介不加賦而用足真有用之才也課最登聞趣頒召節咸願借留勉令因任擢長戎監俾逺而有光焉益究乃心以須茂渥奚概除軍器監丞兼權淮西提刑兼都督府隨軍轉運制領内職而攝外臺蓋異渥也以爾疏通無壅沉靜有謀倅貳齊安恊力捍禦寵以戎監勾稽之職俾綰郡符復轉為丞兼持使節仍飛輓於芻粟以贍給於兵戎其展壯猷以須異擢曾頴茂直寶章閣知隆興府兼江西運判制麾節之任其事俱繁兼而領之允為重寄以爾望隆喬木光映棣華性資則温乎其和才具則施無不可出奏使節州麾之最入騰郎闈省闥之聲難乆鬱於逺猷俾再恢於游刄特升邃閣擢鎮帥藩兼司將漕之權庸展澄清之志其思報稱以俟褒遷兵部員外郎成都運判楊履正除軍器監兼四川宣撫判官成都府路轉運判官制宣威總四道之權責專任重必立其貳庶相與恊贊以成制勝之功儻匪宏才曷膺兹寄以爾忠烈名家熟知兵畧昨任綿守適值擾攘應變隨機卒安反側領計臺而㕘幕府益展壯猷肆升武監之華仍贊元戎之職并謀合智禦侮折衝益勉勲庸以寛憂顧虞普除直寶章閣知䕫州主管安撫司公事兼運判制䕫門當荆蜀之衝任分閫之寄者其責尤重非才高通變長於綏馭者曷稱其職以爾量宏識逺心正氣和見諸歴試之間蔚有可稱之實六轡如組方頼咨諏十國為連尤資鎮撫肆陞邃閣兼領漕臺整師以修我戎給餉不絶糧道皆汝所優為者勉圖偉績嗣有異恩朱鑑依舊將作監丞淮西制參兼運判制朕理内御外為官擇人計畫轉輸皆為重寄兼斯二者必頼通才以爾人門兼美内外俱宜班行綽著於聲稱藩屏復宣於勞績載念西淮之境實當要路之衝禆贊制垣斡旋漕計采之公論咸曰汝宜以匠丞而兼領之其委任蓋不輕矣勉圖來效以副予知趙以夫除兩浙轉運判官制畿漕兼道之權事叢責重非詳練通敏隨試輒效者曷勝其任以爾學粹詞麗心醇氣和治郡則惠愛及民持節則公清振職郎闈樞屬俱著聲稱敷奏詳明尤稱朕意寓直邃閣晉陟計臺庸昭簡眷之隆盍展澄清之志尚觀來效嗣有褒遷姚珍除福建轉運判官制建守閩漕例多更迭蓋以閭閻利病財計盈虛知之詳而講之熟矣矧奏藩宣之最宜陞飛輓之司以爾望亞倫魁才高經濟和不流中不倚强而義簡而亷樞筦機謀正資叶贊輔藩經理勉為朕行殫一心於勞來之間措千里於奠安之域民受其賜悉懐愛戴之私予嘉乃勲晉陟將輸之寄仍兼舊治終惠編氓益觀爾能嗣頒異渥孟㸃除湖北轉運判官制湖右諸郡困於供億財殫民匱欲稱將輸之任必資明敏之才以爾毓秀名門究心吏事侯藩底績制閫贊謀既所至之有聲信無施而不可漕臺兼攝休譽益彰宜畀真除庸昭隆委揚清激濁正已理財使民不加賦而吏皆奉法則予汝嘉往究乃心以稱朕意錢雷震起復修職郎差充淮南運司凖遣制起復任職蓋以才選故常法不拘也爾嘗預薦墨因䕶鄉井而得官鹺息日虧又能措畫外臺辟舉遂奪情而充漕屬允為間見其恩報稱移孝為忠彭大雅出疆籌略多合事宜補從事郎淮西准備差遣制制垣任重而責專有請必行庶英豪樂為之用以爾名中賢書智周兵畧出疆踰歲洞察敵情戎閫薦敭特賜真命文階幕屬倂為爾榮尚克欽承毋忘報稱陳一薦除司農寺丞兼荆湖制置司參議官制贊畫制垣必兼内職所以重其遷也爾自掇儒科荐更邊任典藩將漕所至見稱俾晉丞於大農仍復參於議幕隨機應變爾所素明益展壯猷以須顯用趙師楷除直秘閣依舊都大提㸃坑冶鑄錢公事制中秘圖書之府寓直其間號為清選非聲望顯著者不畀也以爾被服儒雅標的宗英治郡則惠澤及民持節則亷明振職攝承帥閫捍禦有方遂擢寘於班聨旋出司於泉布肆加爾職俾分潜邸之符恐勤于行復任使華之寄式昭簡眷嗣有褒遷陳登除江淮等路都大提㸃坑冶鑄錢公事制泉司總十一道之權其任匪輕欲稱厥職必惟其人以爾蘭省上游聞多學廣入登清選出倅侯藩備殫帥垣禆贊之勞遂進外府勾稽之職剖符名郡治最藹聞肆疏寵以褒遷俾提綱於鼔鑄往服厥職益究乃心黄辰顯督戰収復山城轉一官制儒者知兵真有用之才也况立勲績褒賞可忘以爾作邑邊陲稟命制閫督兵鏖戰奮不顧身險阻備嘗卒復城壁進官一秩以旌其勞祗服寵榮益思報稱韓亮朱虎陳廣轉官制惟賞無常視功輕重則人無倖心而皆有激勵之意爾亮捕巨冦復淮安則峻躋遥刺爾虎取盱眙則特遷三秩爾廣有張山之㨗則序進一階皆量其功而褒賞之亦可謂公矣其思報稱毋忝朕命朱揄祖解罷閤職轉一官制服勤賓閤六閱歲華揆之彞章盍加恩渥爾早游胄監蔚有休稱兩預薦書三從戎幕擢陞贊謁備著勞能兹易畀於兵鈐宜晉躋於勇爵勿云序進嗣有恩榮黄師參轉一官制蠢爾凶徒嘯聚山谷侵掠郡邑民不奠居帥閫蒞師威聲震疊執訊獲醜殱厥渠魁爾在幕中實參籌畫進官一等用奬賢勞孟珙轉八官以三官轉横行五官轉遥郡制功多有厚賞所以厲將士而為緩急之用也茍有其人褒揚可後以爾性資明甚氣節偉然出自將門熟知兵畧北兵為梗疆埸靡寧奮不顧身鏖戰獲㨗厥績甚茂朕甚嘉之遥刺横行併以命汝勉圖來效以稱異恩朱子肅宋詡備禦有勞各轉一官制凶徒倡亂侵擾郡邑突至五羊闔境震驚爾子肅定而能應爾詡敏而有謀密贊帥垣厲兵勦捕迄臻寧靜褒渥可忘各進一官尚思報稱王埜知邵武日先事弭變轉一官制先事弭變易危而安非善謀善斷者疇克能爾舍而不錄何以示勸爾昨守樵溪凶徒兆亂機籌宻運殱厥渠魁民獲堵安兵無血刃疏恩増秩庸示褒嘉列屬樞庭益觀妙畫盧壯父前任泰寧丞經理有勞特進兩資制冦攘為梗民不奠居爾以邑丞勞來安集百廢具舉舊觀復還緬思爾勞盍膺褒寵疏恩進秩尚克欽承朱揚祖昨任荆門軍日守城有勞轉一官制賞罰軍國之綱紀也當緩急之際畔官離次者既加譴責保障宣勞者盍示寵褒爾文武兼資艱難備歴昨守邊郡適值繹騷捍禦有方保全城壁晉陞一秩用酬爾庸趙汝騰昨任權通判光州日同議調遣勦退敵兵轉一官制蠢兹不靖侵擾邊陲爾攝倅浮光恊謀捍禦旋底寧謐盍示寵褒進陟文階其思報稱辛起宗等轉官制朕親閱近班程其射藝孔武有力咸精其能悉繇訓練之功可後褒揚之典以爾稟資通敏閑習朝儀庀司端闈靖共有恪訓齊殿直勇力倍增宜進一階以旌振軄李昴英前任廣東機宜說諭叛卒有勞轉一官制凶徒倡亂聲勢鴟張直抵廣城闔郡震恐爾忠於體國勇不顧身徑造賊營諭以逆順繼居機幕復贊籌謀遣兵捍防迄臻平定厥績甚茂盍進一階以示褒寵張旺勦除同冦轉兩官制賞不踰時所以勸有功也㨗奏上聞褒揚可後爾驍雄無敵沉鷙有謀躬率兵戎驅除冦賊執訊獲醜亟奏膚功晉陟兩階庸示激勸勉圖偉績嗣有異恩王恕用昔日功賞轉一官制當多事之秋茍有勞績不拘乆近悉加恩渥所以厲世磨鈍也爾服勤邊鄙密效籌謀歴歲已深比方陳述戎帥既謂有所據依則賞典豈容吝也特畀一階其思報稱高稼殁于王事轉官予職制惟賞無常視功輕重矧著死節盍錫異恩以爾公爾忘私忠以衛上自把麾而持節每加意於練兵適當强敵之憑陵堅守孤城而捍禦見危致命允謂精忠崇德報功當隆䘏典畀以文階之峻升之學士之聨仍錄後昆俾膺廟食英魂如在茂渥其承黄辰顯轉一官除軍器監簿今再任制鹽息以佐國用其利甚溥任是責而能究心措辦者悉加恩賞爾曩贊倉幕增羡課額暨倅通川興修亭竈允謂宣勞宜陞一秩勾稽戎監因任佐州庸示寵褒勉圖後效孟㸃任湖北運判日應辦糧草轉一官制在昔不庭侵犯邊境調兵給餉凡服勞者悉加旌賞矧爾軄專將漕應辦究心十萬師徒頼以宿飽克成偉績盍陟一階祗服恩榮益思報稱丘岳轉一官制敵騎侵擾民不奠居非資勞來之恩曷免流移之患爾存心惻隠極力拊摩捐公帑以貸農民俾皆復業又節浮費以償宿逋允謂區處得宜矣制垣剡薦可後褒嘉晉陟文階以示激勸許堪轉兩官制作屛邊城究心戎事浚濠塹而備器械百役具興而不至擾下可謂措辦有方矣畀以兩階庸示褒寵勉圖後效以稱所䝉史宅之賞轉一官制理財給餉不擾而辦疏恩遷秩庸旌爾能具官某秀出相門進登從橐比分符於輔郡藹報政之休稱省事清心愛人節用雖不加賦自有餘財既區處以得宜豈褒揚之可後宜進文階之陟以旌歲課之優茂對寵光以需異擢魏了翁昨遇慶典應轉官制庭闈七袠肆頒慶壽之恩文武百寮悉沐遷官之寵矧乆躋於邇列胡未被於徽章特渙明綸俾霑舊渥具官某斯民先覺當代正人進思盡忠憂國家而如渇退不失正付軒冕於儻來至慶霈之當陞亦辭榮而弗受今予命汝初非濫予之私式克欽承庶合已行之典陳天澤通判招信軍轉一官制敵情叵測疆埸未寧爾逺守邊城諳練戎事究心備禦已遂終更因任遷官以示勸奬劉煒叔前任吉州應辦捕冦錢糧轉一官制凶徒為梗鄰境繹騷爾守廬陵同心體國應辦兵食為費不貲既奏膚功可無茂賞晉陞一秩尚克欽承陶木茶鹽增羡轉一官制昔劉晏斡山海操贏貲以供餉饋故斂不及民而用度足史臣稱之今日養兵之費仰給茗鹺茍區處得宜則下不益賦而上無乏用課最登聞褒揚可後以爾望重時髦才優宰掾紀綱省務井井有條至於煮摘之利一經提振亦暴如山倍於常歲宜加一秩以旌其能往究乃心益修厥職任䣘交引循一官制物貨如山簿書盈几典者不能徧睹此姦弊所由生也鈎攷無術其失滋多爾毓秀名門性資明敏精於綜核欺謾莫容進陟一資尚圖報稱楊白充修奉司部役官結局轉一官制朕追逺謹終孝思罔極寢園修奉益致其䖍督役鳩工悉加酬賞爾預其事宜進一階張溥昨任同安縣置陂圳轉一官制興修水利悉有恩賞蓋以為農也爾明敏疏通勤於政事比宰名邑增浚陂渠灌溉菑畬其惠溥矣庾臺剡奏可後褒嘉晉陟一階其祇成命陳均通判江州轉一官再任制江面要衝正資防捍克勤厥職可後寵褒以爾毓秀名門公勤明敏兩宰劇邑俱著休聲暨倅九江三攝郡政究心備禦闔境堵安帥閫薦敭盍加旌别特令因任晉陟一階益懋壯猷以須異渥張毅然轉一官制邊事方殷廣求謀畧不吝爵賞以勸來者爾倅貳淮壖熟諳備禦願宻陳於籌畫洵有志於事功先進一階以為爾寵益圖來效嗣沐殊榮李劉昨任成都運判日起發㑹紙及五綱轉一官制造券以佐用度必資蜀楮設官以司其局凡宣勞者悉該賞典矧爾曩任計臺實董其事既及五綱之數盍陞一秩之榮雖率舊章式昭新渥顔頥仲修三殿畢工轉一官制朕自臨御以來示端樸為天下先未嘗興木土之功也然正衙便殿乃視朝聽治之所不修不飾曷聳觀瞻爾治劇剸煩恢恢游刃程督營繕不日而成私弗擾民公無重費進官一秩庸旌爾能雖率舊章式昭新渥厲模昨任成都運判起發㑹紙及五綱轉一官制鈔楮造券以佐國用司其局者茍振厥職悉加恩渥矧爾持節計臺實總其事綱發應格允謂究心進秩一階庸示信賞曹豳前任浙西提舉和糴轉一官制積貯天下之大命也矧今邊事未寧調度百出而豐歉之不常廣糴以備緩急非心於體國者疇克如此爾司庾西淛斂散有方賑饑恤貧民懐其德被命収糴復能革科斂戢侵尅增價而平槩之人皆樂趨不日而辦進官一秩以旌其能豈無異恩觀汝來效曹豳再以和糴轉一官制以仁存心視饑由已兩載収糴所種甚豐既陟一階再加華秩更圖後效嗣有異恩趙崇齊措置糴買轉一官制西蜀餉臺専仰糴買以給軍須而供兵食爾區畫得宜多多益辦可無懋賞以旌其勞進秩一階益思報稱

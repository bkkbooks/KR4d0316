body:
  text: 東澗集巻二宋許應龍撰詔宣奉大夫李􅌫辭免除同知樞密院事四川宣撫使恩命不允不得再有陳請詔盡䕶諸將當屬重臣充壯其猷無如元老况士卒樂為之用而草木亦知其名成命初頒師言允穆先聲所至已處置以得宜威令既孚豈安强之難致能勝其任盍圖爾庸毋固執于謙冲庶亟寛于憂顧所辭宜不允宣奉大夫新除同知樞密院事四川宣撫使李􅌫求早遂退休不允詔載覽封章備知偉績招擕以禮已安反側之心整師修戎復振驅攘之畧渠魁就戮聲勢寖張尤堅一意于防秋足見盡忠于體國自任以重既能勝委寄之隆圖惟厥終庶立底輯寧之效胡為遜避猶至再三身實佩于安危所關者大心茍懷于進退是棄爾成益殫元老之壯猷罔使前人之専美所請宜不允宣奉大夫同知樞密院事四川宣撫使李􅌫乞免奏事不允詔閔勞以事遂頒詔以趣還式遄其行冀有謀而入告曷騰奏牘遽欲掛冠卿老成而有典刑靖共而好正直宣威全蜀備歴艱勤召對昕庭庸昭簡注雖道之云逺不無跋履之勞然民具爾瞻已徯來歸之亟其體至意毋庸固辭宣奉大夫同知樞密院事四川宣撫使李􅌫辭免仍知成都府恩命不允詔四路之權既能勝任一州之寄夫豈難兼况諸制垣悉總郡事胡獨陳遜避之牘謂莫當酬應之繁然各有司存奚待躬親于細務徒得君重苐煩振舉于大綱矧元老克壯其猷而羣材樂為之用必能共理毋庸固辭所辭宜不允同知樞密院事四川宣撫使李􅌫乞退歸田里不允詔自任以重既處置之得宜毋棄爾成庶安强之可致胡為謙遜又欲退休方特建于宣威弗復分于制閫事權歸一脉絡相通况有請以必行顧奚施而不可是崇是信方篤于眷懷何嫌何疑尚虞于讒謗其體至意永肩一心豈惟収善勝之功抑亦有無窮之聞所請宜不允寳章閣學士通奉大夫淮南東路安撫制置使兼知揚州趙葵辭免權將淮西一路分𨽻史嵩之與趙葵節制恩命不允詔文武兼資無施不可東西惟命何為力辭况與人而同憂每以重而自任深溝固壘已處置以得宜決勝運籌致冦攘之潜弭復遣精騎力援鄰封予嘉乃勳俾分兼于制閫維揚我武當力奏于膚功其亟欽承毋庸遜避以解倒垂之急克成無敵之功時乃之休惟朕以懌所辭宜不允資政殿大學士通議大夫提舉臨安府洞霄宫葛洪初辭免依舊資政殿大學士提舉萬夀觀兼侍讀日下前來供職恩命不允不得再有陳請詔朕更新庶政圖任舊人逺既召于耆英近可忘于元老肆頒明命趣侍經筵謂詢黄髪則罔所愆而學古訓乃能有獲蓋資爾典刑之重非勞以職事之煩盍即欽承胡為遜避况其室則邇初無跋履之難不俟駕以行庶副眷懷之切其祗新渥勿復重陳所辭宜不允資政殿大學士通議大夫提舉臨安府洞霄宫葛洪再辭免依舊資政殿大學士提舉臨安府萬夀觀兼侍讀日下前來供職恩命不允不得再有陳請詔卿老成而有典刑正直而無偏黨昨參大政確守精忠久佚祠庭興思宣室欲輔成于台徳俾進讀于經帷盍歸乎來奚再陳于遜牘不逺伊爾宜亟駕于安車庶于朝聽夕訪之間益廣日就月將之學其體至意毋庸固辭所辭宜不允寳謨閣學士朝議大夫沿江制置使兼知建康府陳韡辭免特轉兩官除煥章閣學士依舊沿江制置使兼知建康府行宫留守兼淮西制置使恩命不允詔卿允武允文善謀善斷首平七閩盜賊之擾闔境堵安繼專三道節制之司羣凶影滅暨金陵之分閫殱京口之逆儔比因强冦之鴟張復厲精兵而血戰士卒樂為之用真足追良將之風草木皆知其名宜兼任淮西之寄肆升華職仍陟崇階總兩路之權所制者廣決千里之勝何功不成宜即欽承以寛憂顧胡遽陳于巽牘殊未體于至懷所辭宜不允賜寳謨閣學士朝議大夫沿江制置使江南東路安撫使馬步軍都總管知建康府事兼行宫留守新除兼淮路制置使陳韡辭免兼淮西制置使恩命不允詔守邊備塞正資處置以得宜應變隨機尤貴事權之歸一遂令制閫兼總帥垣庶脉絡之貫通無彼此之扞格胡過形于謙遜謂莫任于驅馳况八面之才無施不可而十連之寄夫豈難勝體予眷倚之隆亟底拊綏之績令無反汗卿勿固辭所辭宜不允端明殿學士太中大夫崔與之辭免除觀文殿大學士提舉臨安府洞霄宫恩命不允詔卿識並蓍龜心堅金石年彌髙而徳彌劭事可法而義可尊久從綠野之遊實繫蒼生之望渙汗其號晉登弼亮之司盍歸乎來克盡經綸之業胡未承于休命乃屢奏于需章避寵辭榮莫致安車之至尊賢隆禮可無寵渥之頒書殿升華祠庭均佚庸示朕心之眷以昭全節之髙令出惟行卿毋多遜端明殿學士太中大夫崔與之再辭免觀文殿大學士提舉臨安府洞霄宫恩命不允詔亮采惠疇正有賴老成之重辭榮避寵乃欲全名節之髙雖屢趣于鋒車竞莫回于雅志渙汗其號晉升書殿之班惟適所安俾處祠庭之佚胡為謙遜猶復控陳兹特彛章未足示尊賢之禮其祇成命尚無忘告后之猷資政殿學士太中大夫提舉臨安府洞霄宫崔與之再辭免特授正議大夫右丞相兼樞密使恩命不允不得再有陳請令疾速赴都堂治事詔天下大老咸徯來歸若時登庸中外胥慶已令帥臣以禮勸勉復遣中使諭㫖趣行宜乘安車亟造廊廟以副眷懷之切以圖康濟之功奏牘洊陳乃堅遜避雖道之云逺不無跋履之勞然民具爾瞻實佩安危之寄徒得君重勉為朕行毋徇小亷以孤衆望所辭宜不允觀文殿大學士金紫光祿大夫醴泉觀使兼侍讀喬行簡辭免特進左丞相兼樞密使進封肅國公加食邑一千户食實封四百户恩命不允詔立政惟人明王所以寧萬國辭榮避寵君子所以善一身權之以義孰為重輕卿之事朕十有三載知無不言言無不騐彌縫藏用善則稱君暨予同心爰立作相方喜獲老成之助與共圖康乂之功屬咎證之未消援故事而丐去趣遣四輩留侍經帷雖詢黄髮罔所愆固賴蓍龜之益然涉巨川求攸濟詎容維楫之無爰啟沃于朕心俾晉陞于上宰明綸甫播輿論交驩謂衮衣歸周公豈止京師之奠而中國相司馬自無邊隙之生毋徇謙冲之私宜從中外之望所辭宜不允觀文殿大學士光祿大夫醴泉觀使兼侍讀喬行簡辭加食邑食實封恩命不允詔朕躬親珪幣宗祀明堂仰獲顧歆迄成熙事率循彞典敷錫湛恩邦甸侯衛煇胞翟閽罔不沾被矧吾碩輔顯相盛儀盍先渙號之頒申衍土田之錫義所當受毋復重陳所辭宜不允特進左丞相兼樞密使肅國公喬行簡辭免提舉國史實錄院提舉編修國朝㑹要恩命不允詔朕緬惟中興以來更歴四朝承烈顯謨具載簡冊閲時滋乆猶未成書遂命史官專任修纂然總提其綱必資碩輔所以重其事也卿間世真儒斯民先覺翊賛機務整理有條擘畫謨猷何事弗濟顧豈不能攄三尺以總太史之任乎其趣汗青毋煩遜避特進左丞相兼樞密使肅國公喬行簡辭免提舉編修玉牒監修國史日厯提舉編修經武要略提舉編修勑令恩命不允詔纂修鉅典各有司存而宰相無所不統實提其綱蓋舊典也矧卿道包衆有材擅三長謀畧精深憲章明習總領庶職潤色成書以新一代之典直餘事耳其祇朕命毋煩固辭所辭宜不允特進左丞相兼樞密使喬行簡再乞俾歸田里不允詔卿四載秉鈞一心體國好賢樂善休焉其如有容事君盡忠粹然一出于正復能定而能應每必躬而必親屬當多事之時正賴耆英之助曷荐陳于奏牘乃求解于政機况筋力未衰尤克任弼諧之重而安危所寄豈宜懷進退之思毋棄爾成期于予治所請宜不允特進左丞相兼樞密使肅國公喬行簡以烈風乞解政機不允詔驟雨終日方深積潦之虞昊天動威復示烈風之警減膳徹樂罪已求言正有賴于賛襄庶潜消于變異胡騰奏牘祈解政機倘移疾于股肱曷召和于形氣側身修行朕當懷兢業之思惟時亮工卿盍盡燮調之道其體至意毋復重陳特進左丞相兼樞密使肅國公喬行簡再乞投閑不允不得再有陳請詔卿自登揆路四閲歲華勤勞百為總領衆職彌縫藏用朕所仰成積雨烈風倐垂儆戒正賴交修其不逮庶幾轉妖而為祥比騰丐去之章已諭眷留之意胡為再凟殊拂至懷雖欲全進退之宜其孰任燮調之寄當徇大義毋庸重陳所請宜不允特進左丞相兼樞密使肅國公喬行簡第三劄乞解政歸耕不允不得再有陳請詔克壯其猷無如元老自任以重有若保衡再登弼亮之司益勵公忠之節不隨不激言皆可行必躬必親事至能應朕所深倚衆無異詞胡因變異之臨屢上退閑之請方今邊陲未靖民瘼未蘇矧值欝攸正資銷弭若方勤於樸斵而遽易于工師人將謂何勢必不可其安厥位共圖寧敉之功毋棄爾成盍體眷留之意所請宜不允朝議大夫權禮部侍郎兼同修國史實錄院同修撰兼侍講游似辭免除權禮部尚書兼職依舊恩命不允詔卿有文有學可企前修不倚不流允為吉士再登班列益勵公忠談經則有劘切之功典禮則著寅清之譽予嘉乃徳俾晉長于儀曹往服厥官盍欽承于休命矧惟序進何以辭為尚體深知以宏逺業所辭宜不允朝議大夫權禮部尚書兼同修國史實錄院同修撰兼侍講游似辭免陞兼侍讀恩命不允詔卿聞多學廣色温氣和勸講雍容善于敷暢以輔台徳啟沃良深進讀須賢肆以命汝庸示褒崇之寵曷騰遜避之章盍體至懐亟祇成渙所辭宜不允朝議大夫權禮部尚書兼同修國史實錄院同修撰兼侍讀㳺似丐祠不允詔西陲繹騷正資經理事難籌度爰集謀猷卿蜀士之英公忠明審每于經筵進讀之頃獲聞邊事緩急之詳因思患以預防可隨機而應變胡為抗疏遽丐叢祠當與人而同憂有謀必告庶運籌而決勝圖功攸終其體眷懷益殫忠藎所辭宜不允朝議大夫權禮部尚書兼同修國史實錄院同修撰兼侍讀游似乞賜投閒不允詔卿望重羣英職兼兩部密輔緝熙光明之學每殫論思獻納之勤啟沃良多忠嘉可尚胡辭榮而避寵冀置散以投閒雖卿欲全髙尚之風而朕當篤始終之眷其體至意毋勞重陳所請宜不允朝議大夫權禮部尚書兼同修國史實錄院同修撰兼侍讀游似辭免除禮部尚書兼職依舊恩命不允詔直哉惟清既能典禮肆予命汝就使為真雖恩渥之維新而事權之仍舊曷陳免牘未體至懷卿學識兼該端方有守每因誦讀之頃屢殫啟沃之忠簡在朕心當畀便蕃之寵兹因彞典尚何遜避之為所辭宜不允朝議大夫試禮部尚書兼同修撰兼侍讀游似辭免兼給事中恩命不允詔瑣闥之司政綱所繫必得端方之彦庶伸封駮之權卿純粹無瑕靖共有守典禮著寅清之譽進讀多劘切之功允謂藎臣宜兼兹職謙以自牧乃陳遜避之章知無不為盍體選掄之意其祇成命毋庸固辭所辭宜不允朝議大夫新除禮部尚書兼同修國史實錄院同修撰兼侍讀游似辭免陞兼修國史兼實錄院修撰恩命不允詔纂修史籍由同而正蓋彞典也卿學該百氏才擅三長論撰逾年善于其職晉陞一級以示寵褒胡執謙冲謂難冒處能于前而不能于後豈有是哉毋棄爾成亟祇朕命所辭宜不允中奉大夫試禮部尚書兼給事中兼修國史實錄院修撰兼侍讀游似辭除吏部尚書兼職依舊恩命不允詔卿比兼銓曹藹著休績執法若權衡之審知人如氷鑑之明屬常伯之尚虚選真材而後授疇咨已試僉曰汝諧遂輟自于容臺俾晉躋于舊職欽予時命尚何遜避之為往服厥官益振清通之譽中奉大夫吏部尚書兼給事中兼修國史實錄院修撰兼侍讀游似乞退從醫藥不允詔卿銓部持衡藹著清通之譽夕郎振職咸推封駮之功况進讀于邇英尤輔成于台徳朕所深眷人靡間言胡避寵以辭榮乃引疾而求去恪恭乃事既無曠于厥官優游爾休尚何虞于餘證當體簡知之意毋懷進退之心益懋逺猷以副輿望朝散大夫權戸部侍郎兼同詳定勅令官兼知臨安府浙西安撫使趙與權辭免除户部侍郎兼權兵部尚書兼職依舊恩命不允詔輦轂彈壓素號劇繁財賦源流尤難稽考卿恢恢游刃藉藉休聲既左右之俱宜豈褒揚之可後爰正貳卿之位復陞常伯之班庸重藩宣式昭簡眷盍即承于休命胡尚執于謙詞往修厥官益宏逺業所辭宜不允朝奉大夫試户部侍郎兼權兵部尚書兼同詳定勅令官兼知臨安府淛西安撫使趙與權辭免除權户部尚書兼職依舊恩命不允詔載惟民部實掌邦財浩如海暴如山最難鈎考建其長立其貳俱合選掄卿自副地官每殫心計革吏胥之欺弊知貢賦之源流下不病民上無乏用善于其職予所深嘉擢從小司徒之班畀以大常伯之任宜亟承于休命胡尚執于謙詞亟服厥官以永終譽所辭宜不允降授朝奉大夫權户部尚書兼同詳定勅令官兼知臨安府趙與權辭免特與叙復元官恩命不允詔鬱攸為沴既殫撲滅之勞稠疊抗章乃有過愆之懼力求貶秩將以示公勉徇卿之所陳實非予之獲已况散財發粟深慰于輿情接棟連甍悉還于舊觀公私無擾兵民相安清議莫不交稱青氊固宜亟復胡辭榮而避寵欲後已以先人益見謙冲良深嘉歎其祇承命毋復重陳所辭宜不允朝散大夫試户部尚書趙與權辭免兼修玉牒恩命不允詔編年以紀帝系而載其厯數及朝廷政令之因革者為玉牒以宰臣提綱而命從臣以修之蓋重其事也擢居是職必擇英材以卿信厚性資被服儒術自登宗寺為簿為丞而復為卿其于瑤編紀之詳而攷之熟矣兹俾兼領以續前功盍體至懷毋庸遜避所辭宜不允朝請大夫試户部尚書兼修玉牒官趙與權乞畀祠祿不允詔惟爾之能信多多而益辦使治其賦宜綽綽而有餘正賴剸裁以供調度胡陳巽牘遽丐叢祠卿比尹神臯克勤民事既公清而不撓尤經理以得宜休績藹聞朕心以懌乃執謙冲之意屢辭彈壓之勞勉徇雅懷俾專司于民部庶幾省事得一意于邦財方嘉整飭以有倫難避寵榮而求去益圖來效庸副深知所辭宜不允朝散大夫趙與權辭免除户部尚書日下供職恩命不允詔司民部之權已能稱職渙昕庭之號就使為真以穆師言式昭隆眷盍亟承于新命胡尚執于謙詞卿自尹神臯藹騰休譽隨機應變處置得宜戢吏愛民寛嚴相濟况直鬱攸之後尤多經理之功既力丐于退閑難久勞以煩劇勉從雅意俾專任于版曹兹特舊官非躐陞于峻級其安厥位以副朕心所辭宜不允朝請大夫試工部侍郎兼權給事中兼侍講李宗勉辭免陞兼侍讀恩命不允詔朕惟臺諫言國家之得失糾命令之過差然進見之尚疎猶開陳之未盡豈若談經于間日許其賜坐以移時用廣多聞以輔台徳卿有博古通今之學懷憂國愛君之忠執法烏臺升華騎省並兼勸講多所發明兹擢長于諫垣宜進讀于經席其攄素藴以沃朕心何固執于冲懷未即膺于成命所辭宜不允朝請大夫試左諫議大夫兼侍讀李宗勉辭免除端明殿學士同簽書樞密院事恩命不允詔改元更化期臻綏定之功立政惟人莫重樞機之寄參稽輿議咸曰汝諧况諫疏屢陳罔匪憂國愛君之意及經筵進讀悉關理内御外之規尤不激以不隨復能定而能應允為正士宜弼朕躬盍仰體于隆知胡尚形于遜牘令行弗反卿毋固辭所辭宜不允端明殿學士朝請大夫新除同簽書樞密院事李宗勉辭免同提舉編修經武要畧恩命不允詔卿允武允文善謀善斷度徳定位既登宥密之司强本折衝正賴賛襄之力載惟要畧具在成書雖編摩已屬于有司而典領實資于近輔肆予命汝盍撮其要而舉其宏傳之無窮庶軌易遵而度易則亟祇成渙毋庸固辭所辭宜不允端明殿學士朝請大夫同簽書樞密院事李宗勉辭免依舊端明殿學士除簽書樞密院事恩命不允詔卿自司宥密益勵公忠同寅協恭善彌縫而藏用憂邊思職尤處置以得宜予嘉乃勲渙汗其號特錫陞遷之寵庸昭委寄之隆永肩一心當為强本折衝之計以康四海庶成用儒無敵之功尚克欽承毋勞遜避所辭宜不允端明殿學士朝請大夫簽書樞密院事李宗勉再乞奉祠不允詔辭榮避寵雖欲全進退之宜思始圖終庶不負倚毗之意比嘗諭㫖奚復抗章勿貳勿疑方深于簡眷汝為汝翼盍罄于忠勤矧素懷體國之心而屢進捄時之䇿言底可績豈已試以罔功民具爾瞻尚無慙于非據當徇大義毋事小廉所請宜不允中奉大夫參知政事李宗勉乞退歸不允詔風烈必變將圖銷弭之方職思其憂正賴賛襄之力曷陳奏牘祈解政機静言咎徵之形實警朕躬之失我其夙夜盍正事以建中移之股肱豈應天而以實當務同心而輔政庶幾轉妖而為祥毋庸重陳其體至意所請宜不允中奉大夫參知政事李宗勉再乞退歸不允不得再有陳請詔二三執政猶吾股肱一體相須斯成至治兹當變異之儆實由政化之愆方賴交修庶幾潜弭已嘗諭㫖胡復抗章當與國以同憂務應天而以實其安厥位庸副予懷所請宜不允寳章閣學士太中大夫新除京西荆湖南北路安撫制置使兼沿江制置副使兼知鄂州史嵩之乞改畀叢祠不允詔卿自領制垣荐更歲籥務防秋而備塞善應變以隨機整吏修戎比決邊陲之戰排鋒挫鋭將伸中國之威盍展壯猷益圖偉績胡為遜避遽欲退休勿貳勿疑朕方隆于委寄成終成始庶永底于安强毋庸固辭勉徇大義所請宜不允寳章閣學士太中大夫淮西制置使兼沿江制置副使兼知鄂州史嵩之乞祠廪不允詔安邊境立功名盍用禮樂詩書之帥修封疆守要害自無冦賊姦宄之虞既得若人宜久其職卿昨司襄閫備悉敵情嘗屢奏于膚功信足當于隆委遂以兩道之寄特勞十乗之行屬時繹騷究心籌畫遣師徒而捍禦弭隣敵之憑陵然蹂踐之餘尚資經理而流離之衆尤賴撫綏胡遽抗于囊封乃欲安于真館能勝其任豈宜懷退避之思毋棄而成庶亟底安强之績勉從朕志嗣有殊恩所請宜不允參知政事督視軍馬史嵩之乞畀祠祿不允詔整師修戎既克底侵疆之復命將遣戍又能挫外敵之鋒允謂殊勲深副輿望方身佩安危之寄實係重輕胡力辭督視之權欲求閑退雖備見謙冲之意然孰圖康濟之功矧已陟于台司宜益宏于逺畧其徇大義毋事小廉通奉大夫參知政事督視京西湖南北江西路光蘄黄施䕫州軍馬史嵩之乞畀祠祿不允詔卿昨司制閫屢閲歲華應變隨機不但固邊陲之守排鋒挫鋭又能伸中國之威已綽著于殊勲遂宏開于督府獨當隆委益展壯猷招輯淮軍欲安民而和衆遣行蜀戍尤與人而同憂既處置之得宜信緩急之足恃成終成始盍圖爾庸何嫌何疑遽騰遜牘况實佩安危之寄豈宜懷進退之心其體眷知益思經濟通奉大夫參知政事督視京西湖南北江西路光蘄黄施䕫州軍馬史嵩之辭免兼督視淮西軍馬恩命不允詔理内御外固當因時而施宜强本折衝尤貴併謀而合智遂令督府兼總西淮庶脉絡之相通而事權之歸一以守則固何功不成况恢恢游刃之材何兢兢履薄之慮祇若予命毋事謙詞通奉大夫參知政事督視京西湖南北江西路光蘄黄施䕫州軍馬史嵩之再辭免兼督視淮西軍馬恩命不允詔比覽囊封已諭朕意胡為再牘復述前言謂同舟方運于風波而一室難分于爾汝則宜共濟奚庸固辭况已遣于援師俾相為于掎角既合督府制垣之力當銷敵國外患之虞其展壯猷亟圖偉績

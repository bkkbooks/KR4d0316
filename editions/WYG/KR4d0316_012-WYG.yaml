body:
  text: 東澗集巻十二宋許應龍撰啟通安撫葉尚書啟校藝文闈荐出鴻造甄陶之下效官泮水獲居虎節按臨之中輙斂版以趨庭敬齋心而奏記恭惟某官英姿山立奥學海涵倒三峽之詞源經天緯地散一襟之和氣與物為春巍科宻邇於鼇頭濶步徑登於鴛列乆居言路凜著直聲搏擊何心聳横秋之鵰鶚姦邪褫魄無當道之豺狼九重深念其孤忠八座遂膺於峻擢上星辰而聽履獨髙紫橐之班作舟檝以濟川實切蒼生之望暫分制閫殊鬱壯猷然觀施設之間已寓經綸之業謙和下士平易近民薄賦輕徭春生田里發姦摘伏影滅冦攘軍戎懐畏愛之心胥吏絶欺謾之弊提封一道謠頌同聲朝廷深知弱翁行將大用天子不見賈誼佇即召還某燈火寒生簮纓末緒託身黌舍偶叨再薦之書射䇿彤墀濫厠七人之列拊已每慙於樸學疲精妄習於詞科方虞刻楮之未成忽報戍𤓰之已及欲使國人皆有式深慮未能大庇寒士俱歡顔敢祈垂軫通楊帥啟恭審渙膺宸綍榮鎮帥藩十國為連孰不仰郎官之宿五月報政已頓回閩嶠之春睿眷彌隆輿情胥懌恭惟某官家傳奥學天賦異才見義必為不吐茹於剛柔之勢秉心無兢寧諂瀆乎上下之交氣節見於立朝聲名長於治郡迨臨方面益著恩威雖召節沓來乃欲急流而勇退然凝旒圖任未容袖手以旁觀始借重於郎闈復升華於帥閫發姦摘伏影滅㓂攘已責寛租川流惠澤禁戢刻木之擾杜絶珥筆之風蒐練惰兵尊禮賢士雖一方之幸甚如四海之望何毋以我公歸兮方切民心之愛㑹有為王言者即觀禁路之登某雖忝㕓氓屬拘職守燕賀僅憑於尺牘魚封忽拜於瑰詞清徳凜然豈待奉一盂之水休聲藉甚但當賡五袴之謠通鄒守啟分符剖竹乆宣千里之威聲在泮采芹幸託二天之巨庇將趨庭而伏謁先削牘以投誠恭惟某官忠烈名家清朝偉器詞章甚麗要皆原本於六經風致雖髙不廢應酬於庶務自摘髭於上第旋振跡於亨衢錯節盤根牛刀荐試題輿别駕驥足難淹果由奏課之優徑任牧民之寄從臣交薦合登紫闥以通班宸命渙頒復擁朱轓而出守兩朞報政一意為民薄斂省刑春生田里深溝固壘影滅冦攘為善無近名之嫌律已藹真清之譽類非俗吏為也佇膺丹詔之褒其以我公歸兮即聽黄麻之拜某三山末緒六稔上庠季攷月書荐玷文闈之首寸量銖較將幾舍選之陞遇連預於薦書獲浪登於甲第式遵銓格猥注儒官適𤓰戍之及期奉萱闈而祗役青青子佩冀悉為鄭校之逰噦噦鸞聲尤願覩魯侯之戾到任通運使啟建臺分閫縂司一道之權剖竹分符幸託二天之庇已諧視篆敢後通名恭惟經略運使賀白才華間平風度英姿山立望之儼即之温厚徳天成簡而廉寛而栗方入登於朝路旋出駕於題輿報政侯藩休聲藉甚提綱蠻舶清節凜然遂膺簡注之隆晉任將輸之寄六轡如組方賴咨諏十國為連復兼鎮撫内振揚於風采外銷弭於冦攘遵海而南難乆淹於英傑自天而下即榮拜於宸綸某再入修門六叨清選職閒事簡慙廩稍之空糜幼學壯行曽分毫之莫展荐求外補期效微勞式遄其行濫忝熊轓之駕未知攸濟深虞䑕技之窮所幸逢膚使之賢必不替昔時之眷奉法循理詎敢恃於私恩激濁揚清願曲垂於精鑒瞻依深切敷述奚殫通交代李教授啟漢庭射䇿濫踵英名魯泮采芹復承髙躅亶謂夤緣之幸倍深欣躍之私望履非遙馳書敢後恭惟交代某官清標絶俗勁氣邁倫文富波瀾瀉灧澦瞿塘於筆下學該流略吞石渠東觀於胷中粤自妙齡寖騰雋譽奠而後發期收功於一戰之間巍乎有成果擢第於七人之列將升華於鼇禁姑寄徑於鱣堂崇雅黜浮詞章復古修舊起廢矩矱鼎新既休譽之藹聞宜諸公之交薦躚躚媚學豈容挽而留之衮衮登臺斯可拱而俟耳令學者有所統一深愧非才儻舊政必以告新願安承教回交代王寺丞啟入登朝列乆叨附驥之榮出守侯藩復忝續貂之幸方僣修於菲削迺荐辱於華緘荷意勤拳拊躬悚惕恭惟交代知郡寺丞意誠心正學廣聞多言則成文得典雅渾深之體施之有政藹慈祥豈弟之聲自奏最於花城即近光於楓禁迨丞外府實階清切之班勇退急流翻任藩宣之寄以儒術而飾吏有善教以得民使無訟乎祇有片言之折築斯城也嚴為外患之防遂令蠻煙瘴雨之鄉如在和氣春風之域盍膺選表胡遽丐閑無以我公歸兮咸起攀轅之意㑹有為王言者即膺持橐之除某乆玷郎闈濫叨郡寄雖有上冢過家之便慙無承流宣化之能瞻之在前幸成規之可繼瞠乎其後恐髙躅之難追然雅眷之素隆諒舊政之必告㑹言近止豈惟交賓主之歡竊有請焉願永篤子孫之契中丹所懇子墨奚殫通徐判官啟依綠水以泛蓮乆勤瞻遡在泮宫而采藻行託帡幪望履非遙馳書敢後恭惟某官風規髙秀徳宇粹夷紬繹六經推明上世之絶學度越兩漢追還先秦之古文遂登天梯如拾地芥胡乆淹於雋軌尚叶賛於侯藩藹然謠頌之交騰皆謂廉明而有守空馬羣於冀北雖足為幕下之光飛鳳詔於日邊行即奉席前之對某三山末緒六稔上庠偶進預於薦書獲濫塵於甲第式循銓格猥注儒官不知慮此反教人恐未免先生之笑必有師焉擇其善何幸從賢者之游回判官啟泛紅依緑將資妙畫之長配白嫓青首辱長牋之貺輝煌溢目悚感交懐恭惟判官從橐名門鄉評重望寛而有制用為蒞事之方直哉惟清益厲律身之操自參上幕藹著休聲空冀北之羣難乆淹於逸駕飛日邊之詔當直上於華塗某乆玷郎闈濫叨郡寄如是利如是害固欲周知將有為將有行尚祈恊贊傾依彌切敷述奚殫代通郭帥啟一行作吏濫叨三尺之司十國為連行托二天之庇敢馳牘尺敬掣齋鈴恭惟某官勁氣横秋精忠貫日夷夏畏慕載宣元振之威聲神明扶持獨著汾陽之髙節乆司戎閫進陟殿巖叶將相以交懽為國家而定䇿機謀宻運煥五龍夾日之光宗社再安壯一柱擎天之力暨論勲而肆賞恨無官之可酬王言大哉顯奉制麻之寵相尊等耳榮參台鼎之間不專寵利成功之居乃徇明哲保身之道懇辭兵柄出鎮邊陲眷維揚之雄藩實難兄之故部甘棠勿剪尚餘去後之思華萼相輝復見光前之政㑹有為王言者其以我公歸兮申以丹書冠一十八侯之位次光於皇祖校二十四考之中書某斥鷃卑棲蠹魚末學叨塵一第荏冉歴年甘心曹掾之卑屈指戍期之及著為律疏為令敢萌出入之思矜其短庇其愚尚賴帡幪之賜丐外啟猥以駑庸濫塵鴛列侵尋一紀絶無毫髪之功僥冒九遷盡出甄陶之賜入館已幾於六稔攝郎將及於五朞静言思之實踰所望不啻足矣尚復何求第慙未報於恩門遂欲少親于民事非為私計期效微勞雖大造曲成尚閟允俞之命然周行乆玷恐乖進退之宜矧屈指於同寅悉接踵而補外獨留於此豈能免希覬之疑茍居之安是自速顛隮之咎所合力求於更迭詎容乆戀於寵榮竊有請焉不憚至三而至再與其退也庶幾成始以成終代上憲使啟合浮圖之尖欲借一舉手之力仰使者之節輒伸三上書之誠願霽霜威少垂電矚竊以進身之路實資改秩之章求則得之寧免俛眉而伸睫多為貴者庶幾積土以成山至若職司之員又非他削之比儻或未遂猶小車無軏何以行之既獲所圖是掘井及泉不為棄也矧迫垂成之際敢嫌冒進之求伏念某褊智淺能薄才綿力幼而有志若稽田既勤敷菑長也無庸懼析薪不克負荷雖玷名於薦墨莫繼踵於詞科庀職尉曹充員郡幕小大之獄不能察猥叨糾掾之司東西之命惟所之敢憚遐陬之阻實歴已更於六考剡章僅獲於數員因而成之正賴中流一檝之助無可棲者不勝遶木三匝之思幸遇大賢主盟善類雖菲葑而亦采植桃李於無言茍不投誠殆幾自棄恭惟提刑人物冠冕朝廷羽儀極翰墨之工粹然得作者之體屏膏粱之習瀟然有髙士之風方參宥府之編摩翻任專城之委割嘉乃丕績錫以使軺頓令蠻煙瘴雨之鄉盡在和氣春風之域詔且至矣公少須之將使萬物各遂其宜豈有一夫不被其澤生我者成我者已遂依歸求之與與之與願希坱圠代上諫坡啟程能較藝曩嘗叨藻鑑之知嘘枯吹生今願借洪鈞之轉士固伸于知已書不足以盡言仰瀆威尊俯深震悸竊觀昔人之所薦類多平日之素知非求之故吏之中則取之門生之列盖聴其言觀其行已極精詳故浚其源溉其根力加成就此實大賢之髙見豈期嘉㑹之適逢倘不布其心腹之誠是自棄於爐錘之外伏念某衣常短褐家本衡門退而學詩敬佩鯉庭之訓幸而獲選遂隨鶚薦之飛科偶玷於奉常職濫陪于漕屬盡瘁雖更於初考剡薦未獲於一章静言思之當賴先容之助病不求耳孰為借譽之階幸遇正人進登言路雖菲葑而亦采植桃李于無言矧是散材曽䝉大冶載色載笑每勤眄睞之私成始成終諒軫提撕之念暖律倘吹於寒谷弊帚亦享于千金恭惟某官直節冰清英姿玉立散一襟之和氣與物為春倒三峽之詞源决科發䇿巍亞鼇頭之選晉升騎省之華直筆正繩震肅百僚之上引裾及霤激昂萬乗之前將大庇天下之寒儒豈獨遺恩閎之舊物月華先得幸依近水之樓臺雲厦不棲更傍誰家之門户代同舍上趙臨安啟侍坐於先生長者夙有夤緣借勢於王公大人不無覬望敢憑尺素少布寸丹恭惟某官毓秀金枝凝祥寳祐與時酬酢萬變不窮遇事精明百蠹俱剔出則任鎮撫澄清之職入則居論思獻納之班帝曰識公上星辰而聴履人期柄國作舟楫以濟川胡為丹詔之新頒尚襲青氊之舊物蓋以輦轂之下難乎師帥之良前有趙張後有三王未見可傳而可繼逺者年嵗近者數月誰能至再以至三倘非明公孰任兹寄不惟豪猾屏迹于秋霜烈日之下抑使善良被化于春風和氣之中雖云善政之藹聞其如公論之尚鬱佇膺爰立式副具瞻伏念某少也畸人長而獨學抱遺經而究終始僉謂拘儒摶扶搖而溘風埃未酬壯志濫登黌舍竊慕英流患不精弗患不明敢替春誦夏絃之業有所譽必有所試冀躋月書季考之優每願事大夫之賢庶幾就有道而正曩恃伯氏文昌之契荐瞻泰山北斗之光姑蘇辱設醴之勤京邑沐還贄之寵感徳至矣揣分茫然裁書敬控于謝悰惠顧尚期於大造矧方庇天下之士豈獨拒互鄉之童暖律倘吹敝帚増重口將言足將進三及門而惴焉力可為器可使一舉手之勞耳代陳情啟掃門擁篲過䝉三吐哺三握髪之勤奏記陳篇願效一舉手一投足之力俯慙僣躐倍切凌兢竊惟大臣之事君每以薦賢而為念廣萬間而庇寒士俱使懽顔適千里者喜似人尤勤推轂故嚴助則有邑子之薦而祐甫則多故人之除盖維桑與梓猶貴必恭豈連茹拔茅或忘引類幸此風之復見撫小已以自欣伏念某少也畸人長而獨學碌碌恨無於竒節兀兀敢替於窮年誦詩三百奚以為荐綴横秋之鶚得水尺寸僅自致免為㸃額之魚注選銓曹備員漕屬視事已更於初考剡章未獲於一員搖尾乞憐素昧獻諛之態炙手可熱恨無借勢之階兹逢節鉞之重臣喜接枌榆之後進成小成大黙運洪鈞為桷為杗舉無棄物有此夤緣之幸敢伸悃愊之私倘借重言俾沐繡衣之薦庶幾陋質頓増華衮之榮恭惟某官識洞幾深資兼文武澄不清撓不濁望之儼即之温當征鴻横海之秋嘗陪羽翼及飛龍在天之日復㑹風雲殫上閣之忠勤肅清朝之班列厥績用懋其報伊何王言大哉亟畀植纛建旄之寵相尊等耳行膺分茅裂土之封將使萬物各遂其宜豈有一夫不被其澤月華先得幸依近水之樓臺雲厦不栖更傍誰家之門户上丞相啟十載居中愧乆妨於賢路三章丐外期少效於民庸尚閟俞音敢伸前悃伏念某才疎識淺援寡勢孤侯泮終更初蔑片言之薦相門晉謁遽䝉大造之知故府奉常成均中祕凡九叨於清職復兩攝於銓曹退省其私奚功至此欲報之徳何日忘之遂興更迭之思荐瀆威尊之聴冀殫駑技仰答鴻恩有命自天未䝉從欲玩嵗愒日深切汗顔苟不明進退之宜是自取顛隮之悔可以去矣敢復戀於寵榮竊有請焉願亟垂於矜允恭惟某官忠貫日月勲塞乾坤熙載奮庸輔賛彌縫而藏諸用量能授職乂負偃植各安所施矧乆沐於陶成輒僣求於器使多多益辦雖無撥煩治劇之才碌碌亡竒第守學道愛民之訓倘辱取長而舍短或能趨事以赴功不達時宜肯效俗儒之癖具宣徳意當希循吏之風以此存心用酬知已回知縣啟維桑與梓乆矣親仁剖竹分符兹焉聮事方欲馳於竿牘乃先辱於華緘恭惟知縣雅量恢洪英標峻整仁必有勇既險阻之備嘗賞以酬勞盍軒騰而直上胡淹雲翼小試雷封翕然謠頌之交騰皆謂公勤而不擾佇膺芝檢入覲楓宸某乆玷郎闈濫膺郡寄奉法循理固欲令田里之安學道愛人尤願廣絃歌之化回教授啟采芹泮水暫屈名流剖竹偏城幸聮王事方欲馳於竿牘迺先辱於緘縢恭惟教授掉鞅文闈蜚聲舍選胸中根葉髙凌鐵幹之百圍筆下波瀾倒瀉銀河之千丈遂題名於鴈塔即分教於鱣堂媚學躚躚方賴範模之正諸公衮衮佇陪臺閣之登某乆玷郎闈濫叨郡寄化民成俗必由學敢後崇儒温故知新可為師願安承教回學職啟論秀而升諸學乆聆令譽之馳思泮而采其芹行獲英游之奉方圖修敬遽辱貽緘恭惟某官博古通今弸中彪外友一國之善士切磋琢磨倒三峽之詞源泓涵演迤豹斑略露鶚薦已登矧益精素學之修豈難復青氊之舊槐花届候雖暫隨舉子之忙桂籍書名當不在羣英之後某瞻依伊邇欣躍彌深範不範模不模深負好為之愧聞未聞見未見尚資忠告之規又一鄉之善雖乆服於英名千里而遙恨未瞻於丰範敢期承乏獲遂從游恭惟某官行著月評文窺天巧窮經學古淵源極深造之功藏器待時學校豈乆淹之地矧槐花之候應而楊葉之藝精有司豈枉我哉更期賈勇一第特溷子耳佇聴成名某濫典芹宫適當𤓰戍恨修辭之不敏荷惠問之相先温故知新可為師自愧見聞之陋入學鼓篋孫其業正資劘切之規又矯首鄭公之鄉乆欽令聞分教魯侯之泮獲奉英游慙羾記之未遑荷飛緘之先辱恭惟某官風規髙秀徳宇粹夷學博而宏衮衮湧泉之思賦麗以則鏗鏗擲地之聲雖身居庠序之間而志在雲霄之上學者審是而已既精楊葉之穿有司豈枉我哉佇見桂闈之擢某才無所取冗不見治論弗詭於聖人雖知自勉師不賢於弟子預切懐慙尚資胥訓胥誨之誠以廣寡見寡聞之陋回寄居官啟千里而來方快景星之覩三揖而進遽䝉明月之投荷意殊勤拊顔有靦恭惟某官英才天賦盛徳日新溢為筆下之詞章出自胸中之機軸學優而仕預知逺業之難量名昭于師㑹見亨衢之直上某自慙疎陋過辱褒稱受言藏之當辦瓊瑤之報非敢後也實因朱墨之紛回司法啟宿聞髙誼未諧覿徳之私假守偏城行有同寅之幸貽書甚寵荷意殊勤恭惟司法學地淵深性天渾厚扶搖九萬里雖未迅於鵬圖才名三十年嘗奮飛於鶚薦巍中銓闈之選遂膺法掾之司公以無私當務三章之確守鈍而後利庶觀大器之晩成某乆玷郎闈濫叨郡寄推儒術以飾吏深慮迂疎以法令而為師正資明允回任探花啟冠帶億萬共推舍選之英聲禮樂三千果擢鼎魁之髙第臚音甫唱輿議交孚恭惟某官天與雋才家傳奥學自出胸中之機軸溢為筆下之波瀾才華俱掇於儒科殆同五竇梓里雖多於文士莫齒諸任學校已馳二十年之聲議論宜出五百人之右指陳時政既仰勤乙夜之觀喜動天顔遂擢寘三英之列盛名已震大用何疑某乆矣從游兹焉快覩榮進素定固莫容頌禱之私事業相期願益厲端方之節輒因報貺少効贈言囘縣丞啟鼓篋上庠曽覘犀表分符南土首辱魚封雖修問之尚稽喜同寅之伊邇恭惟縣丞蜚聲黌舍發藻儒林氣大以剛夙負摩雲之志賦麗以則載敭擲地之聲胡乆鬱於長才尚為丞於兹邑先鈍後利當知大器之晚成右挈左提㑹見公車之交薦某猥叨試郡行遂盍簮以臨其民欲尚廉平之政樂吿以善更祈佽助之私

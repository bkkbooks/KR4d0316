body:
  text: 提要東澗集十四巻别集類三宋臣等謹案東澗集十四巻宋許應龍撰應龍字恭甫閩縣人嘉定元年進士第調汀州教授累遷國子司業祭酒權直舍人學士二院官至端明殿學士簽書樞宻院事提舉洞霄宫事蹟具宋史本傳其集則不見于藝文志原書巻目已不可考明錢溥編次秘閣書目已不載其名則明初已散佚矣惟永樂大典頗散見其詩文抄撮排綴各體尚為粗備而制誥一類尤為繁富蓋應龍在理宗時歴掌内外制嘗以日昃拜命夜半宣鎖不二鼔而草三麻人服其敏史稱鄭清之喬行簡罷相制皆應龍所草帝極稱其善今二制並在集中典雅嚴重實能得代言之體其他亦多深厚簡切而于當時宰執將帥侍從諸臣姓名官爵遷轉拜罷紀傳所未詳者尤可藉以徵信于考史尤為有禆又應龍于經濟幹畧深所究心其知潮州屬劇盗逼境随機扞禦諸冦悉平治潮政績與李宗勉治台齊名及為兵部尚書值喬行簡行秤提楮幣之法民間不便應龍奏罷之今其劄子亦具存集内大扺䟽通暢達切中事情務為有用之言非篆刻為文者可比雖其格力稍弱然舂容和雅中尚不失先正典刑在南宋館閣之中亦可稱一作手矣謹以類裒次釐為十有四巻著之于録俾不致泯没于後焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e318f4b741cba2da7082e5fae51c3b8bd8234098534538c73339232499be2684

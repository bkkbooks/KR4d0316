body:
  text: 東澗集卷七宋許應龍撰劄子論君德人心劄子臣聞國於天地必有與立一曰君德二曰人心夫天下至大也王業至重也所賴憑藉而扶持者固亦多術矣而臣獨以君德人心為先者蓋君德厚薄乃安危之兆人心向背實理亂之基君德茍正則朝廷清明治功振起於寬厚宏博之中而隱然有不可犯之勢人心茍固則尊君親上如手足之捍頭目雖危疑緩急之秋亦無解散動搖之患故先聖人不慮國勢之不強惟慮已德之不修不慮外侮之難禦惟慮人心之未附蓋敵國外患何世無之雖虞朝之盛猶有弗率之苗民周治之隆猶有不服之崇國然舜文之心曷嘗以是為患哉文德之敷民心之洽既足以致風動之休則蠢兹有苗何慮其不格敬止之德懷保之恩足以格子來之衆則崇墉言言亦因壘而自降矣漢唐之君雖非帝王比然漢能以公恕統天下而四百年之間舉無二志唐以仁厚結人心雖屢更變故皆不旋踵而定是知君德人心乃國家之元氣而長治久安未有不本諸此請復以國朝之事明之恭惟藝祖立極聖聖相承講學行仁求賢納諫下情通而無壅蔽之患公論伸而絶好惡之偏其正君德有如此者戒藩侯以撫養厭將臣之殺降緩故縱之誅重誤入之辟蠲河北之鹽寬陜西之稅其結民心有如此者是以朝廷尊安基業鞏固雖澶淵西夏之驚智高果莊之黠皆隨起隨仆卒晏然而無患是果何以得此哉以兵而言則無大兵威以操制生人之命以刑而言則無深責重罰以禁遏姦宄之心疑若委靡而不振矣而二百年之間主威國勢隱如雷霆固若磐石亦惟君德明於上人心固於下足以消姦邪之萌而杜禍亂之原也陛下纂承丕緒尊奉慈極親近儒生開廣言路聽斷訪問未嘗少懈出入起居罔有不欽皆所以正君德也大風之變首議蠲免洪水之災加倍賑恤旌廉抑貪敷宣德意赦過宥罪務行寬大皆所以結人心也是以天地和應雨暘時若年穀順成民生豐裕將以建大政而興太平而疆場之防猶關宸慮然大明當天魑魅自伏今聖德昭明賢才萃聚豈無運籌帷幄以決勝千里之外者乎人心愛戴中外和協豈無賢於長城者為吾之捍禦乎昔裴度言於憲宗之朝謂淮西蕩定河北底寧豈朝廷之力能制其命直以區處得宜能服其心耳今日之事茍區處得宜隨機而應變強本而弱支則進退伸縮無不如意尚何外患之足慮哉雖然君德人心固所以固國之本而君德之修又所以固人心之本然人心不難固而君德為易虧茍德修於上有加而無己則民戴於下無時而或釋臣願陛下法乾之健體恆之久不以躬行為己至而或怠於力行不以日新為己盛而益期於又新則澤流而益深仁增而益高民之戴德永永無窮將使外薄四海無思不服國勢增安猶太山而四維之矣臣不勝拳拳取進止論當然之理劄子臣聞天下有當然之理不可有所激尤不可有所狗激則矯枉以過正故不合乎中徇則迎合以茍容又豈復有至當之論哉古之君子平心以應物毋固毋我惟視夫理之如何耳其行已則中不倚而和不流其待人則上不諂而下不瀆論事則明辨是非而不立異以求勝事上則將順正救不以訐而為直外不為人之所忌中不失吾之所守安見其所謂激而又孰得以議其徇乎此乃時中之道士大夫之所當尚也奈何人無定守視時變遷見夫激之可以立名也則假公以濟私惡常而好異互相矛盾不問是非若是者固不能以成事而祇見其多事又見夫徇之可以媒進也則揣摩而求合阿附以取容同聲相應無復可否若是者雖不至於生事而必至於誤事握風俗之樞者將欲約其偏而歸之中可不示之以好惡而使之知所趨避哉仰惟陛下以中正履位以道德同俗建用皇極以革偏陂之私並用才德以示翕受之公保合太和以杜分朋植黨之漸既不使之過於激復不使之流於徇可為得大中之道而明善俗之方矣然士大夫之心既不至於激則必至於和賢和於朝固帝治之盛然和而不同斯謂之君子焉一或茍同則其弊復流於徇是又不可不察也利害可言也復恐時好之不合姦弊當革也復患吏強而難制難從之請恐有所拂而曲從之不可行之事或有所迫而強行之薦舉則多徇於私屬豫決則或持於兩可若是之類皆未免有所徇也轉而移之誠不容緩今陛下不倦於聽納大臣方切於延訪以公滅私屢形於戒飭用例破法纍見於申明固未嘗不欲聞正論而明公道也然作之而未應倡之而未隨者何耶昔人有言曰人臣事君之常情不從其令而從其意臣願陛下益開衆正杜絶羣枉奬端方之士振委靡之習使天下昭然知上意之所向則觀感之下孰不精白一心以承休德在位正直之風當不愧於羔羊矣狂瞽之言冒犯天威惟陛下赦其愚取進止論終始如一劄子臣聞人主有善始之意固天下之所深喜亦天下之所深望也夫飛龍在天萬物咸覩意諭色授而六服震動言傳號渙而萬里奔走茍意向之或偏舉措之不審則治忽之機實肇于此今也講學以進德求賢以輔治開言路以通下情此帝王盛德之事而皆舉行於臨政願治之初是其初意之善固足以聳動觀聽天下安得不以為喜然是意也易長亦易消易勤亦易怠必守之以堅行之以力則日就月將以極其緝熙之功言聽諫從以盡其施行之實求之必用用之必信而使賢者能者無不盡其才之嘆此豈非天下之所深望哉茍能為其所喜而復滿其所望則唐虞三代之盛有不難致者矣恭惟陛下以神聖之資紹延洪之業體元居正勵精思治謂多聞乃可以建事也則鋭情經術增置講官謂帝王之德莫大于納諫也則下明詔以求直言命羣臣以上封事謂邦基之立惟在于得賢也則播告中外各舉才識凡此設施無非治道之大端則善始之意固已不容言矣然臣惓惓之忠尤望堅守而不變焉蓋自昔人主固有留意於經理者矣而為黃老養性之説或欲以沮其勤不欲人主觀書又欲以售其術稍不加察則近便嬖之時多親儒生之時少而好學之勤不能如其初矣亦有鋭意於求言者矣然逆耳之諫難受順旨之言易從一或偏聽則剴切者謂之沽名忠直者疑其訕上而悅諫之心必不能如其初矣亦有汲汲於求賢者矣然君子鯁直而易疏小人柔順而易親親則莫見其非疏則莫見其是故積年信任或一朝疑而棄之則好賢之心復有始而無終矣凡若此者皆後世人主之通患茍非天德清明純一不己未有不蹈其轍者陛下退朝之暇猶勤觀覽切直之諫優加褒擢收召耆德之臣旌表清廉之守此皆真心實德之所形見固非勉強而行者而臣猶以堅守為言豈為是過計哉蓋自強不息斯可合乾德之大終始惟一乃可底日新之盛否則動搖于浮言而遷易於邪佞此心轉移一息間耳而治勢安危所關者大臣不復援引古昔請近述國朝之事以明之昔元祐初選擇明儒勸講經幄廣開言路增置諫員擢舊德於散地設十科以薦賢一時之治燦然更新疑若可以無遺慮矣而當時之臣猶有隱憂焉劉摯則曰已行之令持循無變則治道成王巖叟則曰惟當日篤此心不可少移初意以至日謹一日天下之事不足慮程頥言之終則念始不可不勉傅堯俞又言之無非欲其堅守不變以成其初政之美哲宗信用其言故元祐之盛度越今昔異時此論一搖或以紹述之説進或以調停之説進則事體非復前日矣然則進言於今日者可不以是為戒哉雖然人主一心攻者甚衆少懈而受其一則陷溺其中而不自覺太宗皇帝嘗曰人主當淡然無欲使嗜好不形於外則邪佞無自而入此先正其心之意也此心一正則私欲不足以亂其真而外物不足以更其所守以之講學則專而精以之聽言則公而明以之任賢使能則無所處而不當書曰監于先王成憲其永無愆惟陛下留神取進止論量能授官劄子臣聞量能而授官此古者用人之術也夫人之才不能皆全或純於道德或善於才幹優於理民者將略未必長精於心計者法律未必審校短量長惟器是適則事無不舉分職受任或乖其宜則績用不成故有虞之世能敷教者使作司徒能典禮者使作秩宗明五刑則命之作士諧八音則命之典樂各專一能各守一職未嘗迭遷而互用之故百工惟時庶績其凝而泰和之治亦由此而致奈何後世用人不問德之所宜才之稱否既使之治兵又使之理財方使之理財復使之典獄禮樂之任付之若而人工技之司付之若而人以一人之身而責之以百官之所為宜其人之難為也夫責之以所難為則人之能為者鮮遂相率而不為故典禮者雖未知禮而不以為愧典獄者雖未知律而不以為慊其意蓋曰百司庶府皆然也吾何以知為哉固有才稱其職得以究其所長者至於遷擢或又移之他職矣所職之事茍非其所素習則不得不委之吏故吏得以容其姦而本末源流蠧弊根深蓋有不及察者流弊至此故居官者皆不度其才之短長德之小大朝欲為此暮欲為彼而有不安厥職之心然則為官擇人者其可無以處之乎昔司馬光屢言於祖宗之朝欲博選在位之士使德行者掌教化政術者為守長勇略者為將帥明法者典刑明禮者典禮此正量能授官之意在今日所當講明者而或者又曰雖量其能當久其任善於其職者增秩加賞而不徙其官茍數遷數易則心懷去就事復茍且是固然耳然好進者常情之所不能免儻積歲不遷將有十年不調之嗟從事獨賢之嘆怠惰之心必生廢事之弊猶故是則久任之説固未易以遽行也為今之䇿惟精於財計者必使之理財逮其遷也復以精於財計者代之長於銓綜者必使之典銓逮其遷也復以長於銓綜者代之至於典禮典兵莫不皆然雖不久其任而前後相繼者莫非其才之所長則亦何事之不舉何職之不稱哉今日用人試金科者多處以刑法之官歷邊事者率付以邊陲之寄此固因才授任之美意也尤願陛下明詔大臣益廣此意精加采擇於百司庶府之間莫不各隨其才而無強其所不能則人人各盡所長復循名責實考其幽明而黜陟之則庶官無曠當匹休於前古矣取進止論薦舉劄子臣聞薦舉而不拘其數此朝廷之美意也薦舉而或失其實此士大夫之私心也因士大夫之私心而失朝廷之美意豈可不思所以處之乎臣請先原其弊而後僣陳所以變革之術夫一郡之吏察于太守一路之吏察于諸司滿一期則有關升之薦逾三考則有京削之薦歲有常員截然一定固不患其濫也至若政績則聽其剡上初無定數豈故縱其猥濫而無紀極哉蓋以效績顯著固未易得若拘以歲薦茍未有其人必以庸常之流勉強充數其謹重之意蓋可見矣是以剡牘來上悉從其請或與升擢或令審察或付中書籍記使賢者知所勸而不賢者亦知自勉進者以為榮而未進者亦有所慕得人之效大率由此豈非朝廷之美意乎奈何人情貪榮競欲速化不顧職事之修否而惟欲露章之薦引頭鑽肘刺不得不已以公道自任者旌别淑慝固不肯曲徇其請而樂於周旋者見其既無定數求者必與逮其甚也一章所薦或五六人或十數人載於邸報殆無虛日合一歲而論不知其幾非親故之夤緣則勢要之囑托非關升之所不及則京削之所未遍譽過其情則以鉛刀而為銛舉非其類則以薰蕕而同器此豈非士大夫之私心乎夫惟其出於私則賢否混淆真偽雜揉形於薦牘者未可盡信不免視為具文而一切不復用矣吁不意求才之美意而為士大夫之私心壞之也雖然變而通之夫豈無術一曰定剡薦之數二曰嚴保任之法昔皇祐初詔舉縣令而張易於逼替之際併薦一十六人上謂輔臣曰所舉猥多豈無干請可令裁定此定剡薦之數者也馮拯請司四品以上具表舉人若效績著明當特酬賞不如所舉依法加罪此嚴保任之法者也數既一定則不容妄舉以徇泛應之私法既加嚴則誰敢失實以干謬舉之罰如此則公論大明羣賢並進得以隨才器而使之百工允釐庶績咸熙蓋有不難致者抑又有當察者昔歐陽修有云善惡之人各以類舉廉謹者舉清幹贓汙者舉貪濁徇私者舉請求茍任是責者或非其人亦安能無妄舉哉太宗皇帝親閲班簿常曰不擇舉主何由得人此清源正本之論真萬世龜鑑也惟陛下與大臣亟圖之臣不勝拳拳取進止論用人劄子昔司馬光進言謂設官分職以待賢能大者道德器識以弼諧教化其次明察惠和以拊循州縣其次方略勇果以捍禦外侮小者刑獄錢穀以供給役使豈可專取文藝之人欲理萬事耶然則四方之人雖於文藝或有所短而其所長有益於公家之用者安可盡加棄斥使終身不仕耶又曰人各有所長或優於德而嗇於才或長於此而短於彼雖臯夔稷契尚各守一能况於中才安可求備故孔門以四科取士若專引知識則嫌於挾私難服衆心若止循資序則官匪其人何由致治乞朝廷設十科以舉士臣聞天下固有不一之才人主當無執一之見蓋人才之在天下若十指然小大長短雖若不齊而皆適於用兼收並蓄待用無遺則皆有以自見而天下無不舉之事茍用一而廢一則互相傾軋必有分朋植黨之弊昔臯陶謂翕受敷施九德咸事則俊乂在官可以撫五辰而凝庶績奈何後世之君不知出此文帝好清淨而豪傑之士難合武帝用才智而道德之士見遺宣帝尚刑名而儒學之士不用皆由所尚之偏故天下之才不能以盡用要之人主當與天同量栽培傾覆生育長養各隨其稟賦之自然而無容心於其間茍好惡之私先纍於其中則人才高下必不能隨宜器使而急於求進者必至迎合黨同而伐異俱欲求勝非惟不足以成事而清流濁流之患實基於此司馬光論任人欲取道德器識明達勇果刑獄錢穀者並用之而長於此短於彼者不可求備此乃器使人才之要術也嗟夫人才不同彼此異見其來非一日矣足一躡軍門視文士如仇讐首一戴儒冠輕武辨如草芥矯矯特立則以靜重為茍容處事詳審則以剛直為沽譽長於吏才則以明經術者為腐儒專於學問則以了官事者為俗吏少俊則以老成為遲鈍寬厚則以嚴明為苛刻各分黨與判乎其不相入也人主用才惟求以辨吾事濟吾治而已安可主一而廢一哉陛下建用皇極無黨無偏耆德者召之文學者用之吏事者任之或長於將略或精於財計或以循良稱或以讜直名莫不擢用固無一毫好惡之私然求賢之詔屢下剡薦之牘交馳而人心多私罕以實應靖退不競者無由自達單寒寡援者未免見遺臣願陛下開衆正而達四聰使任薦舉者悉參公論舉能其官則錫以進賢之賞稱匪其人則加以謬舉之罰如此則真才實能皆為吾用而何事不立中興之烈可指日以冀耳惟陛下與大臣亟圖之論久任劄子臣謂久任而責成功此用人之良法也夫人才各有所長因其長而任之遲之以歲月則可以自見茍數遷數易則人無固志事多茍且况更代之際意向或有不同施設未免相反蒞事方新蠧弊不能盡知胥吏必生欺誕內外之治所以不能具舉者職此之由也今內而百司庶府不問人才之能否惟以職任為資歷理財未幾則又易而典禮明刑未久則復使之典教一人之身無官不可為久而不遷則懷淹滯之歎如此則百事何由舉祇見其因循歲月耳外而司監太守或一歲而再遷或甫至而復易迎新送舊交錯於道人知吏之不久不率其令政吏知去之不遙不究其心力是以民瘼未蘇吏治不振其弊有不可勝言者矧邊陲之寄尤不容不久雖以三歲為期然邇日以來移彼易此殆無虛月縱有諳熟兵略留意邊備之人然效未成而已去兵卒何由而間習備守何由而堅固今多事之秋將欲興起治功其可不以久任為先乎內則量能而授官長於財計者則所遷者皆理財之職明於法理者則所擢者皆法理之任至於他官亦然克稱其職則優加旌擢使之知勸不必遽易以強其所不能仕於外者因其有風采則使之持節因其有政事則付以典郡庶各盡其才以圖績效治最上聞則遷秩升職以示甄别逮其既久則擢之以不次之職以酬其纍歲之勞夫有功見知則説孰不勉勵以稱上意吁此非難轉移者特在乎堅守而不變耳雖然任人固不可不久而擇人尤不可不精茍非其人則癃老者必致廢職疏謬者必致誤事而貪黷苛刻者必至為無窮之害必詳考之於其初而後可久任於其後此又澄源正本之論惟陛下與大臣亟圖之論法例劄子臣聞有法之弊有例之弊法之弊易見例之弊難革舍法而用例此今日之大患也夫著而為律疏而為令編次成書各有條目蓋截然而不可易也是雖有旁照有通用舞文弄法者固未免輕重出入於其間然使有司精明詳考而熟究之其姦莫能逃也豈不曰法之弊易見乎乃若例者或出於一時之特恩或出於一時之權宜有徇親故而開是例者有迫於勢要而創是例者揆之於法大相抵牾而後來者扳援不已案牘在胥吏之手有司不可得而知也執已行之比有司不可得而拒也豈不曰例之弊難革乎今日之弊百司庶府凡所施行固未嘗無一定之法然未免循積習之弊舍法而用例焉非不知三尺之背違也執而不行恐至於拂人情非不知冒濫之滋甚也抑而不豫慮至於召衆怨遂使胥吏得以執其柄而容其私厚賂以賈之則以為有例之可行請求之未至則匿其例而不用長吏知之而不能禁天下交病之而不敢言昔富弼有言曰近年綱紀甚紊隨事變更便為成例至使民力殫竭國用匱乏所以然者法制不立而習為例者淪胥至此也是則用例者豈非壞法之尤者乎今日之弊亦已極矣一切禁而惟法是用固為拔本塞源之論然循習之久遽爾盡革恐事勢有扞格而難行者若聽其冗濫而不為救止則轉相因仍必至於蕩然而無法矣昔韓琦每事用例吏持例在乎金錢之多寡以為去取琦目擊其弊取其可用者而刪其冗謬者是以吏無所容其姦事以職舉今莫若明詔有司搜求前後已用之例公共參酌可行者留之不可行者去之使之輕重得宜於法意不相違戾編為成書藏之有司凡有陳乞據此施行若是書之所不載者皆抑而不豫庶幾權不在吏而奔競妄求者無所容其巧矣此亦因時制宜之一䇿也惟陛下與大臣熟議而行之取進止破朋黨劄子孝宗皇帝嘗曰朋黨不難去惟賢是進惟不肖是退弗問其他則黨論自消漢唐末世朋黨皆數十年不能解以至禍亂其患在人君聽納之不明耳若能公是公非惟理適從何朋黨之有當時大臣因奏曰用人惟論賢否則自無朋黨如唐之牛李論者謂德裕之黨多君子宗閔之黨多小人然德裕之黨豈無白敏中之傾險宗閔之黨豈無周墀之正直但於兩黨中用賢者黜不肖者則其黨自破也臣聞朋黨之患其來久矣不患是非之難知而患考察之不審自古欲空人之國而盡去君子者必進朋黨之説欲孤人主之勢而蔽其聰明者亦進朋黨之説此言一入則無分可否不辨真偽一槩而去之遂至朋家作仇兆釁無已茍能公心無我靜觀潛察不問其黨與之有無而惟論其人之賢否使其奉公守正協志和衷雖更相稱譽豈為比周則信之任之何嫌其為黨使其同惡相濟假公濟私文飾姦言抵排善類則當斥之絶之以破其植黨如此則淑慝洞分疑似莫惑當使衆賢和於朝而小人無所容其迹矣尚何朋黨之足慮哉奈何世之人主意見或偏進一人焉則意其類之皆賢也並蓄兼收而不察其真與偽退一人焉則疑其徒之皆黨也斥逐無遺而不辨其是與否况進退之間或出一時之好惡未必合於天下至公烏可併其類而為之升黜縱使為君子之黨其間豈無讎偽假真而巧於附麗者乎安可例以為賢而是信是使縱使為小人之所引其間豈無和而不同而介然有守者乎安可疑以為不賢而盡屏盡棄然則孝宗聖訓所為若能公是公非惟理適從何朋黨之有真萬世之龜鑑也抑又聞高宗皇帝嘗謂朝廷用人止論其才不才言者好以朋黨罪士大夫乃朝廷使之為黨非所以奬賢才而厚風俗也然則為人上者惟當任賢勿二去邪勿疑以至公為心而盡破朋黨之論則君子道長小人道消可以常為泰而不為否矣惟陛下留意取進止謹命令劄子歐陽修曰今出令之初不加詳審行之未久尋又更改以不信之言行難從之令故每有處置之事州縣知朝廷未是一定之論官吏或相謂曰且未要行不久必改或曰備禮行下略與應破指揮符牒縱橫上下莫能遵守劉安世曰命令變更逺不過三歲近或期月甚者朝行夕改使民疑惑欲乞出令必使大臣協謀門下審覆臣聞言多變則不信命頻改則難從此昔人之格言也夫君者出令者也臣者行君之令而致之民者也必相與講明以求其是若順乎人心合於事宜然後布之天下其信則如四時之不移其行則如汗出而弗反若此則規模一定上下相孚為無不成政罔不舉而治效可以立致茍思之不精講之不詳聞斯行諸既不察其當否人或有言則又從而中輟前後抵牾莫知適從文移雖繁徒挂墻壁歐陽修謂出令不加詳審尋又更易上下莫能遵守劉安世謂朝行暮改使民疑惑欲乞出令必使大臣協謀門下審覆其意正為此爾今宵旰非不勤施行非不多然悠悠嵗月莫覩成緒豈積弊難遽革治功難驟成耶無亦數更數易而無一定之規耶履畝恐為民之擾則復令給還混試恐人物之繁而復分諸路雖曰更變靡定猶不失乎厚下以立本因時而施宜至若竄謫者當以漸移乃驟還其舊秩不與親民者未經赦宥乃遽與之注授邊功者既使之從軍而復與之參選居官者當俾之終秩而隨即改除稱提之令荐更鹽鈔之法屢變遂使人心皇惑雖令不從幸門一開扳援無己欲轉而移之亦無甚難惟當致謹於出令之初則不輕變於己行之後賢果可任則任而勿二邪若宜去則去而勿疑利所當興則不動搖於浮言弊所當革則不遷易於羣議如是則奉行之必虔事功之必立理內御外殆將無不如意然而人心不難孚國勢不難定惟在乎公與斷耳公則心無私主或用或舍悉參輿論必不至於以一人譽而召以一人毁而棄斷則不惑羣議或罷或行莫不當理何至輕於嘗試而遽為小不如意而輒沮為人上者茍能守之以至公行之以獨斷則發號施令罔有不臧人莫得以容其議則尚何變更之有此又要終原始之道惟陛下與大臣亟圖之則天下幸甚

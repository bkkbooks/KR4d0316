body:
  text: 東澗集卷十宋許應龍撰策問御試文舉策問朕以菲德紹休聖緒粵自更化以來總攬權綱厲精思治于今六稔莫覩成效外則多壘之未平內則羣生之寡遂豈朕之政有失而行有過歟抑規模之未定而議論之徒詳歟夫廣覽兼聽固欲通羣下之情而甲可乙否若何決擇旁搜博采固欲獲實才之用而讎僞假真若何考察官吏非不戒飭而茍且如故法令非不申嚴而奉行不䖍士氣當振何以為風勵之方民俗未厚何以為感化之術蠲免租賦則羣計必乏賑恤流移則廩給難繼楮幣折閲而稱提無策國用窘匱而科撥無已凡此十事皆當今之急務詎可不慮以不圖或欲循名責實或欲信賞必罰或欲久任而責成推而行之不知何者為先歟然此皆治內也而治外尤不容緩權時施宜雖欲息民思患預防盍先强本守江淮而防海道復侵疆而修關隘求將略而擇邊守綏御歸附之衆招集奔潰之卒置游擊以為應援改城壁以據險要此皆關於備禦之大計伊欲處置得宜夫豈無策而或者乃曰地利不如人和用儒則無敵於天下豈衆心成城而道德之威自能成安强歟夫毋恃其不來恃吾有以待之所謂待之者又果何術歟昔宣王任賢使能內修政事而中興之功不旋踵而至豈天下無難為之事特患夫無必為之志歟子大夫通達國體必有切時之論詳著於篇朕將親覽焉召試館職策問問當天下多事之秋而欲興起治功者其大要有四曰國論曰人才曰民心曰軍政蓋國論不定則無以為立治之規人才不擇則無以為濟時之用民心不固軍政不修則何以理內而禦外哉今之國論何如也言戰者則曰整師修戎可以挫敵鋒而強國勢而和豈足恃言守者則曰深溝固壘可以捍外侮而安邊境而戰未可輕言和者則曰與其驅民於鋒鏑而勝負未可知孰若結好以金繒而戰爭為可息而或者又曰和雖不足恃可以款敵而為備禦之圖戰固不可輕然或遭侵擾必不免兵刃之接又安能自守耶異論迭起規模不定其將何所適從歟今之人才何如也靜重者或譏其緘默論辨者或指為沽激夫無所可否固無益於成敗若不激不隨則似是而實非者也以訐為直固未免於矯亢而盡言無隱則又若同而實異者也使功不如使過以其必能立功以自贖也然奔軍之將不可以語勇其果足使乎才勝德為小人以其恃才而妄作也然非才不足以辦天下之事其果可棄乎知人則哲自古所難又將何以處此歟民心不可以不結今日賑流移之民恤焚毁之家固足以示德意矣然恐小惠之未孚減斛面之征蠲荒旱之賦亦足以寬民力矣復慮郡計之不給稱提楮幣而奉行太亟反至於折閲糾集保伍而處置失宜或至於紛撓軍政不可以不修今日招募雖多徒耗廩稍而脆弱難用豈訓練之不精耶抑紀律之不嚴耶官資多轉而兵不激勵遇敵輒退豈賞罰之不明耶抑號令之未孚耶以民兵而補官軍之闕額就使戍邊而口券之費可省不知其果樂從乎募民船以防江海之要衝分番更代而舟師之勢益壯不知其果無擾乎夫國論明則人才皆為吾用既為吾用則結民心修軍政當有任其責者何患治功之不立哉然天下無不可為之事特患乎人主無必為之志今勵精思治廣覽兼聽不為不勤而悠悠歲月未覩成效豈徇名失實而是非之未明耶抑惑於羣議而施行之不力耶作而新之必有至當之論悉著於篇以備上之采擇問守邊備塞當世之急務也築城壁固關隘修器械明斥候固不容緩乃若極邊之郡守沿邊之民兵尤有關於捍禦之計可不思所以區處之方且極邊之郡與敵對境使為守者資兼文武固能隨機而應變若素不知兵或遇警急豈不倉皇而退遁故邇日多用武臣豈非以其勇於攻戰足以當敵人之鋒耶苐民事或非素習儻以馭軍之法施之治民豈不為民之病昔李漢超守關南能禦契丹之悍郭進守西山能備并人之寇則任武臣以守邊郡乃已然之明驗也然侵掠之罪不法之訴當時俱不能免此又不容不慮毋亦付郡事於倅二而使之不得專焉苐兵民之事既分守倅之權相敵施行之間寧免扞格恐因爭以召釁其將何以處此沿邊之民習於鞍馬嫻於擊刺因而用之豈不足為官軍之助然官軍有月廩有口券至於臨敵猶逡巡而不進為民兵者自耕自食乃欲拘以團結豈能保其無擾驅之鋒鏑豈能責其用命然李抱真為懷澤留後三丁擇一蠲其徭租給其弓矢三年皆為雄邊子弟此又已試之成效也豈今日不可行乎而或者猶慮夫出戰則民兵當其鋒論功則官軍攘其賞又慮夫踐蹂之境田菜多荒廩食不繼而官又從而㸃集恐非所樂尚何望其協心以捍禦乎又將何以處此夫邊郡屬於制帥茍旌別淑慝加以勸懲孰不奉法而循理然拘以文法恐非所以待豪傑毋亦録其功而略其過可乎管𣙜貿易悉以與之使之募驍勇以為爪牙而許其便宜從事此乃待邊郡之法不知果可行否夫沿邊之民室廬妻子皆欲自保而官軍出戍惟欲思歸若給以糧食而俾之守禦必皆盡力又擇其願為兵者填刺官軍之闕額就使屯戍不惟免更代之勞又復省生券之費不知果可行否夫識時務在俊傑必有確論其悉陳之以備上之采擇問西掖演綸北門視草所以賁飾皇猷而黼黻政化非學問該洽詞章宏麗不足以膺是選此詞科之所由設也故必試之以駢儷律之以程度參之以記問合則取否則黜而真才實能皆可網羅收拾以為異日之用然唐人有言食垂餌者皆小魚就科目者皆小藝既曰宏博則豈容以是求之然唐世之設是科乃得人為盛不惟詞章典麗蔚有古風而操守端正者有人仁義論諫者有人望冠一時者又有人則是科之設豈不足以得異能哉然學如退之文如退之乃屢試而不中又何歟愈謂所試之文類於俳優使屈原孟軻與今之善進取者競於䝉昧之中必知其辱焉愈之為是言也其亦有激而云乎抑當時之預選者果未有可觀歟愈雖不預此選而鋪張揚厲之文乃編之詩書而無愧是則取人之道似未可以科目拘也恭惟國朝尤重是選或分二日而試以四題或分三日而試以六題多或取於十人少或取於二人或處以館職或畀以學官取之既精擢之復亟而名公巨卿多繇此出今日是科非不設而應者少命題非甚艱而中程者曠數舉而未聞焉豈人才獨盛於昔而嗇於今耶抑程度既拘而才識傑異者不肯屑屑以求合耶取之者既艱習之者必怠繼是益乏人焉則又不容不慮也或者欲寬其制謂無掩其所不備惟較其詞藻之工拙庶幾應之者多而取之者易或又謂以宏博設科而不責其記問則人人皆能又非所以籠傑異之才劑量輕重其將何適而可昔楊龜山謂宏詞之試乃以文學自售古人得已似不如此使士夫皆以是為戒則是科豈不為虛設哉不然其必有說也願併陳之以祛所惑武學公試策問問文事必有武備五材誰能去兵然兵凶器戰危事一勝一負強弱係焉故為國者莫難於擇將而為將者尤莫難於用兵茍無其法則何以先為不可勝而待敵之可勝是則六韜三略與夫孫吳等書豈非兵家之龜鑑乎用之則勝違之則敗斷斷乎其不可易也然歷觀史冊乃有取舍不同成敗變異又不能無疑焉教得其道士乃可用固也乃有非素拊循之士而能用以克敵何歟法令不明百萬何益固也乃有行無部曲未嘗遇害又何歟十則圍之五則攻之此量敵而進之意也或者乃以五千當百萬之師得無衆寡之不敵乎而淝水之戰乃以是而勝右背山陵前左水澤此審勢而陳之法也或者乃使萬人為背水之陳無乃捨安而就危乎而井陘之戰因此而捷四勝者弊五勝者禍是兵不貴於常勝也而七擊胸奴斬獲甚衆者卒能收河南而置朔方歸師勿遏窮寇勿追懼激之以生變也而輕騎夜追至二百餘里者乃能走單于而獲首鹵此皆不合兵書而自有以取勝豈竒正相生如循環之無端而不可窮耶抑隨機應變自有妙算不容膠柱而調瑟耶若然則兵書所載亦未可執之以為據也然謂其果不足據歟則張良得一編已能決千里之勝充國學兵法又能成降羌之功謂其果不可舍歟則趙括讀父書何不免長平之敗去病不學古兵法何亦成封狼居胥之勳此尤所未喻者然猶有可諉至於兵書所言乃有自相矛盾者又豈容無辨既曰攻其無備出其不意又曰待其成列而始鼓既曰啓於元龜吉而後舉又曰不卜筮而事吉既謂詭道矣復謂理之以義動之以禮既云使貪矣復云內貪外廉是謂盜端若是之類不一而止不知何者為當夫自黃帝以至於漢言兵者一百八十二家今存於世可以為兵家軌範者蓋亦無幾而其說猶未免有疑焉諸君講學待問其必有折衷之論願詳陳之以祛所惑問世之學為武者視書而考兵謀案圖而習陳法知此而已矣且兵之竒變左計右數出於臨時則書固有不能盡者方此之時不知圓機以接竒變則昔之所學者是古人之糟粕已尚安足以赴用哉今將試之以兵術而必使得書之所以言嘗之以陳法而必使得圖之所以教以稱上意則其為要如何其凡目安在其書與圖孰得孰失幸相為言之太學私試策問問郡守民之師帥也師帥賢則政平而田里無愁嘆之聲不賢則公私煩擾而稚耋失宅生之望有志於治者其可不知所擇乎然知人之道自昔所難不觀其貌則無以知其精力之盛衰不察以言則無以占其才智之優劣是必召見於殿陛之間咨訪於論奏之頃則賢否真僞庶不能為吾之惑矣漢之宣帝每拜守相輒親見問考其所行以質其言唐之元宗刺史陛辭皆令詣側門以俟進止宜若可以察人之能否矣意一時吏治皆如黃霸之守潁川真卿之守平原然八萬餘口猶得以肆其僞增之欺二十四年猶不能堅為守禦之計豈二君識見之未精耶抑臨遣之際徒能察其言貌而名實不相應者未容以遽知耶恭惟孝宗皇帝留意吏治郡守陛辭必加考察或以失儀而罷免或以稱旨而擢用或以疾病投置間散故循良之吏布滿郡國有以成乾道淳熙之治今日仰遵成憲凡未經陛對及已對在四載之外者皆令申審而邇臣復慮積官至守早達者罕精神識慮四年之久日異而歲不同恐有癃老疾病不任事之弊欲凡到闕者悉俾奏事睿旨諭之此誠為官擇人之要術也或者猶謂年餘七十者猶能息渤海之盜多病不出者亦能致東海之治則老疾者似未可以盡棄也然一見之頃未覩施設安保其尚可用耶議論持平者出守北地乃不免治郡不進之責辨論以義理之文者使守會稽乃莫逃久不聞問之譴則論奏之間亦未可以盡信也然使其言果有可聽又安能料其他日之不相副耶斟酌而區處之殆將何術而可願詳陳之有司將以獻焉宗學私試策問問得賢立邦家之基任賢享天下之福人主出而有為於天下其可不以是為先乎然一人之見有限四方之才無窮茍不采之公言求之薦舉則真才實能果何自而上達哉故唐虞之時必曰疇咨僉曰伯禹則使宅百揆僉曰伯夷則使作秩宗益作朕虞垂作共工亦皆於僉言之中求之薦舉若是固足以得人矣然登庸之任豈嚚訟者之所宜處而放齊舉之豫采之若豈象恭者之所能任而歡兜舉之湯湯洪水豈方命圮族者所能治而四嶽舉之夫明明在上穆穆在下賢否固易知也而所舉之人未免若是何耶曰吁曰咈固俱知其不可矣而績用弗成者猶待於試而後已何耶豈知人之道固自古之所難歟夫采之薦舉猶未足信則用人之道又將何所據歟逮至後世知人善任莫若高祖求文武如不及莫若武帝蕭何薦韓信則用之魏無知薦陳平則用之或以其善用兵或以其智有餘信而任之宜也然周昌白見四人既知其不能為將矣而封各千户是果何意豈創業之初急於用人不考其素不求其全耶不進賢者退不察廉者免蓋恐實行之士壅於上聞而搜求惟患其不廣也然薦人起家至二千石復不免君除吏盡未之責何耶豈招賢乃人主之柄而人臣非所當專耶不然其必有說也恭惟主上以上聖之資膺維新之命勵精思治側席求賢乃者渙發綸言播告中外使舉賢能才識以備選用猗歟休哉雖禹之勤求賢士湯之立賢無方何以過此然薦牘交馳其比如櫛將悉加旌擢則清資華秩固不能遍將拔尤取穎則名美實乖者亦未易辨以薦舉之多者而用之歟則頭鑽肘刺巧於經營者或得以售其欺即達官之所薦者而用之歟然為官擇人惟才是適又不當以所主之人為輕重也况夫親故之夤緣勢要之囑託又有所當察者若所用非所舉所舉未必用則詔旨丁寧又豈直為觀美哉今欲在朝無幸位在野無遺賢將何術而可願聞至當之論有司將以獻焉省試策問問有循吏有能吏奉法循理愛民厚俗者循吏也治劇剸繁發姦擲伏者能吏也然優游和緩者多悶悶之政振厲奮發者有赫赫之聲能者固可與集事矣乃若漢文之世吏皆廉平而黎民至於醇厚武帝之吏罕以治化稱而海內謂之虛耗則循者又豈不足與共治哉宣帝留意吏治黃霸龔遂朱邑之徒既以循而用廣漢翁歸張敞之徒復以能而進是以吏稱其職民安其業然賊殺不辜者復拜刺史僞增户口者亦䝉顯賞不幾於濫乎豈使功不如使過而賞疑從豫固不害為近厚耶夫曰循曰能皆有可紀史臣乃獨傳循吏而不及能吏豈循吏以德能吏以才才固非德之比耶今日循吏雖不乏人而以能名者比比皆是豈循吏不矜伐百姓無稱而多多益辦者每易於自見耶但用人之道不可偏尚事功之未集有才者固所當用至於化民成俗厚下立本所以壽國家之脈者又豈才勝德者所能為哉然寬厚有餘者鄰於委靡每為人所厭振厲敢為者事罔不辦多為人所喜而識者之論則曰委靡之弊止於廢事趣辦之過必至病民一或不審則相師成風其害有不可勝言者今九重厲精思治為官擇人用循吏以惠民而不至廢事用能吏以辦事而不至病民其將何術而可諸君通達國體豈無至當之論願詳陳之有司將以獻焉問當理內御外之日思患而豫防隨機而應變固足以為彊本折衝之計然將不擇兵不練功不賞亦不能以集事夫安邊境立功名在於良將是將不容於不擇也而敗諸崤者乃能決焚舟之勝少不更事者亦能奏淝水之捷豈能否難以逆料成敗不可論人未可預擇於其初必要終而後見耶士不素厲難使死敵是兵不容於不練也而非素拊循之士反能成背水之功無部曲行陳者亦能使胸奴之畏豈兵無強弱惟顧所用亦不在於搜練之有素將茍得人自可以計而取勝耶慶賞信必則有功者勸是有功不可以不賞也然黥布一見即王淮南趙壯士一見封各千户初無尺寸之勞而遽獲不次之賞若幾於濫矣而當時之臣顧稱其善將將豈駕馭豪傑當有操縱而或輕或重固不可以一律拘耶邇者強冦憑陵疆埸不靜所恃以備守而驅攘者惟諸將是賴乃有望風畏懾莫能固守者其勢亦廩廩矣今安豐之戰既勝齊安之捷荐聞而䕫門亦復其舊聲勢寖張中外胥懌非將勇而兵鋭何以收功若是其速論功行賞曾不踰時固足以為將士之勸矣使沿邊之地將皆有謀兵俱用命而慶賞所加各當其功則感激思奮戰必勝攻必取尚奚外患之足慮哉奈何勇怯之無別差升之不公以豢養為安以貪進為能其間固有驍雄無敵沈鷙善謀者亦不能以自見教閲之不嚴激厲之無術無事則驕蹇而難制有警則退縮而不前其間固有精於技擊奮不顧身者亦莫能以自效推原其故豈非爵賞間猶有所當察者乎有功者未必盡録則宣力者怠無功者反先獲賞則當得者怨或經營求據以為就試之階或泛濫妄申以徇親故之求為弊若此雖恩賞日增果足以示激厲乎比者詔旨丁寧今薦舉曉暢兵機俾招足闕額教閲而誕謾欺罔者戒以毋干邦憲是固欲擇將練兵而革冒濫之弊也然人情多私未必實應積弊滋久未易遽革作而新之夫豈無術而或者乃曰將固當擇若考其素求其全恐未易得用人之智去其詐用人之勇去其貪而使功不如使過亦可以責其後效不知其說果可行否臨邊之民熟於戰鬬招使戍守必能遇敵不懾而或慮其未必樂從拘繫之囚亡賴輕生刺充敢勇必能摧鋒陷陳而或恐其難御不知何以處此至若功賞之申責之主帥而不實者責罰則孰敢為欺然六級之差繩之以法而或以罰太重議之僞冒者窮究追毁而為之營求者罰亦併及則必知所警然賞疑從豫所以廣恩若考核太嚴恐當得者亦因而沮遏此又不可不慮也諸君通達國體必有至當可行之策願詳陳之有司將以獻焉問國於天地必有與立所恃以憑藉扶持者固不一而止而大要則曰國論曰人才曰民心蓋國論者政令之所從始人才者事功之所由立民心者又有關於理亂安危之機也夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門則國論其可以不定乎定則不搖於浮議而無輕變之患然入粟之議反覆論難而不決屯田之議前後依違而不定而識者乃謂其議盡天下之心何耶德勝才為君子才勝德為小人則人才其可以不辨乎辨則賢否不容於並進然跅弛之士能立功名尾生孝巳之行無益於勝負則才勝德者似亦未可以輕棄也民心無常惟惠之懷大賚四海萬姓恱服是民心不可以不結也然濟人於溱洧者乃譏其不知為政遺衣遺食者或謂其所惠之未廣豈善政善教足以得民而不遍愛者初無損聖人之仁歟恭惟主上下詔求言和顔受諫或令集議或令看詳固欲國論之一定也為官擇人求賢用吉而曉兵機通財計與夫堪充將才者又令薦舉固欲人才之不遺也發粟散財寬租已責而蹂踐之區流離之氓復勞來而安集之又所以固結斯民之心也然戰守之議彼此異見稱提之令前後屢更履畝未幾慮其紛擾而隨罷混試方行恐其叢雜而復分議論若不一矣豈因時施宜固不容於固執耶然昔人謂先定規模而後從事又謂天下之事惟審其是定而不移乃可成務以是而主國論不知果可以一定而不易乎闊論高談者若善謀輕舉妄動者若敢為露才揚已者若多多而益辦視事遷就者若隨機而應變其真僞固未易辨也而人才因事而後見亦安可遽疑而不之用耶然論辨官才者必論定然後官而知人之道亦在於聽其言而觀其行以是說而選任果可以得人否乎斛面方減而挨究復行逋負方蠲而催督如故貧困當恤而廩給難繼告戒非不切而奉行不䖍是民瘼猶未蘇也然得其心有道惟在於所欲與聚所惡勿施而仁義公恕以統天下自可使無異志即是理而行之果可以得民心否乎然是三者雖若不同而脈絡未嘗不相通國論定則無好尚之偏而有才者皆可以自涀人才既有以自見則凡所施設必合於人心而孰不愛戴或者又謂天下無難為之事惟患乎無可用之才茍衆賢和於朝則同聲相應國論不期而自定合三者而言之又不知何者為先歟夫識時務在俊傑諸君博古通今其必有以處此詳著於篇以備上之采擇
